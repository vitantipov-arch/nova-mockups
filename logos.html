<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Nova — искра-сеть C</title>
<style>
  :root{ --bg:#141413; --card:#1f1f1d; --text:#ececea; --muted:#86857e; --acc:#5aa9ff; --border:rgba(255,255,255,0.12); }
  *{box-sizing:border-box;}
  html,body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;}
  .wrap{max-width:480px;margin:0 auto;padding:18px 14px 40px;}
  h1{font-size:18px;font-weight:500;margin:0 0 4px;}
  .sub{font-size:13px;color:var(--muted);margin:0 0 18px;line-height:1.5;}
  .card{background:var(--card);border:0.5px solid var(--border);border-radius:14px;padding:18px;margin-bottom:14px;}
  .tag{display:inline-block;font-size:12px;font-weight:500;color:var(--acc);border:0.5px solid var(--acc);border-radius:6px;padding:2px 9px;margin-bottom:14px;}
  .lock{display:flex;align-items:center;gap:14px;}
  .word{font-size:34px;font-weight:600;letter-spacing:-1px;color:#ececea;}
  .lbl{font-size:12.5px;color:var(--muted);margin-top:12px;}
</style>
</head>
<body>
<div class="wrap">
  <h1>Nova — искра-сеть, цветные лучи + красный центр</h1>
  <p class="sub">Вариант C по твоей правке + два микро-тюнинга. Назови C1 / C2 / C3.</p>

  <div class="card">
    <div class="tag">C1</div>
    <div class="lock">
      <svg width="64" height="64" viewBox="0 0 56 56"><g stroke-width="1.7" stroke-linecap="round"><line x1="28" y1="28" x2="28" y2="10" stroke="#ffb24d"/><line x1="28" y1="28" x2="46" y2="22" stroke="#ff5db1"/><line x1="28" y1="28" x2="40" y2="44" stroke="#8a5cff"/><line x1="28" y1="28" x2="16" y2="44" stroke="#4d8dff"/><line x1="28" y1="28" x2="10" y2="22" stroke="#38e1d6"/></g><circle cx="28" cy="10" r="3" fill="#ffb24d"/><circle cx="46" cy="22" r="3" fill="#ff5db1"/><circle cx="40" cy="44" r="3" fill="#8a5cff"/><circle cx="16" cy="44" r="3" fill="#4d8dff"/><circle cx="10" cy="22" r="3" fill="#38e1d6"/><circle cx="28" cy="28" r="5" fill="#ff3b3b"/></svg>
      <span class="word">Nova</span>
    </div>
    <div class="lbl">Центр ярко-красный, каждый луч и узел своего цвета.</div>
  </div>

  <div class="card">
    <div class="tag">C2</div>
    <div class="lock">
      <svg width="64" height="64" viewBox="0 0 56 56"><g stroke-width="1.7" stroke-linecap="round"><line x1="28" y1="28" x2="28" y2="10" stroke="#ffb24d"/><line x1="28" y1="28" x2="46" y2="22" stroke="#ff5db1"/><line x1="28" y1="28" x2="40" y2="44" stroke="#8a5cff"/><line x1="28" y1="28" x2="16" y2="44" stroke="#4d8dff"/><line x1="28" y1="28" x2="10" y2="22" stroke="#38e1d6"/></g><circle cx="28" cy="10" r="3" fill="#ffb24d"/><circle cx="46" cy="22" r="3" fill="#ff5db1"/><circle cx="40" cy="44" r="3" fill="#8a5cff"/><circle cx="16" cy="44" r="3" fill="#4d8dff"/><circle cx="10" cy="22" r="3" fill="#38e1d6"/><circle cx="28" cy="28" r="9" fill="none" stroke="#ff3b3b" stroke-width="1.4" opacity="0.45"/><circle cx="28" cy="28" r="5" fill="#ff3b3b"/></svg>
      <span class="word">Nova</span>
    </div>
    <div class="lbl">То же + красный ореол вокруг ядра (горячее).</div>
  </div>

  <div class="card">
    <div class="tag">C3</div>
    <div class="lock">
      <svg width="64" height="64" viewBox="0 0 56 56"><g stroke-width="1.7" stroke-linecap="round"><line x1="28" y1="28" x2="28" y2="10" stroke="#ffb24d"/><line x1="28" y1="28" x2="46" y2="22" stroke="#ff5db1"/><line x1="28" y1="28" x2="40" y2="44" stroke="#8a5cff"/><line x1="28" y1="28" x2="16" y2="44" stroke="#4d8dff"/><line x1="28" y1="28" x2="10" y2="22" stroke="#38e1d6"/></g><circle cx="28" cy="10" r="2.8" fill="#ececea"/><circle cx="46" cy="22" r="2.8" fill="#ececea"/><circle cx="40" cy="44" r="2.8" fill="#ececea"/><circle cx="16" cy="44" r="2.8" fill="#ececea"/><circle cx="10" cy="22" r="2.8" fill="#ececea"/><circle cx="28" cy="28" r="5" fill="#ff3b3b"/></svg>
      <span class="word">Nova</span>
    </div>
    <div class="lbl">Лучи цветные, узлы белые, центр красный — чище.</div>
  </div>

</div>
</body>
</html>
