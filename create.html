<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Nova — создание агрегата</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<script src="nova-scheme.js"></script>
<style>
body{margin:0;background:#E8E6E1;font-family:'IBM Plex Sans',system-ui,sans-serif;display:flex;justify-content:center}
#nsc-root{--bg:#F4F3F0;--surface:#FFFFFF;--surface2:#E7E5E0;--text:#1B1D21;--muted:#55585E;--hint:#9A9DA3;--border:#E4E2DD;--border2:#CDCAC3;--info:#2A6FDB;--info-bg:#EAF1FB;--info-bd:#BCD4F2;--danger:#C6483A;--warn:#C8891A;--canvas:#FBFAF8;width:100%;max-width:440px;height:100vh;height:100dvh;position:relative;overflow:hidden;display:flex;flex-direction:column;background:var(--bg);color:var(--text);font-family:'IBM Plex Sans',system-ui,sans-serif}
#nsc-root[data-theme="dark"]{--bg:#15171B;--surface:#20232A;--surface2:#2A2E36;--text:#ECEEF1;--muted:#A9AEB6;--hint:#6E747E;--border:#31353D;--border2:#3E434C;--info:#85B7EB;--info-bg:rgba(55,138,221,.16);--info-bd:rgba(55,138,221,.5);--danger:#E5675A;--warn:#E0B24A;--canvas:#191C22}
#nsc-root *{box-sizing:border-box}
.nsc-hd{display:flex;align-items:center;gap:12px;padding:14px 16px 12px;border-bottom:1px solid var(--border)}
.nsc-ic{width:32px;height:32px;border-radius:99px;display:flex;align-items:center;justify-content:center;font-size:17px;color:var(--muted);cursor:pointer}
.nsc-ttl{font-size:16px;font-weight:600}
.nsc-sttl{font-size:11.5px;color:var(--hint);margin-top:1px}
.nsc-body{padding:16px;flex:1;overflow-y:auto}
.nsc-field{margin-bottom:14px}
.nsc-lbl{display:block;font-size:11.5px;color:var(--hint);margin-bottom:6px}
.nsc-inp{width:100%;height:42px;background:var(--surface);border:1px solid var(--border);border-radius:11px;color:var(--text);font-size:15px;padding:0 13px;font-family:inherit}
.nsc-inp:focus{outline:none;border-color:var(--info-bd)}
.nsc-seg{display:flex;gap:5px;background:var(--surface2);border-radius:11px;padding:4px;margin-bottom:14px}
.nsc-seg button{flex:1;height:36px;border:none;border-radius:8px;background:transparent;color:var(--muted);font-size:13px;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;font-weight:500}
.nsc-seg button.on{background:var(--surface);color:var(--text);font-weight:600;box-shadow:0 1px 3px rgba(0,0,0,.12)}
.nsc-choice-lbl{font-size:11.5px;color:var(--hint);margin:2px 0 8px}
.nsc-choice{display:flex;flex-direction:column;gap:10px}
.nsc-cch{display:flex;align-items:center;gap:13px;padding:15px 15px;border:1px solid var(--border);border-radius:14px;cursor:pointer;background:var(--surface)}
.nsc-cch.hi{border:1.5px solid var(--info-bd);background:var(--info-bg)}
.nsc-cch .g{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:19px;flex:0 0 auto;background:var(--surface2)}
.nsc-cch.hi .g{background:rgba(42,111,219,.12)}
.nsc-cch .pn{font-size:14px;font-weight:600}
.nsc-cch .pd{font-size:11.5px;color:var(--hint);margin-top:2px}
.nsc-canvas{background:var(--canvas);border:1px solid var(--border);border-radius:14px;padding:8px;overflow:auto}
.nsc-toolbar{display:flex;gap:8px;margin-top:10px}
.nsc-toolbar button{flex:1;height:42px;border:1px dashed var(--border2);background:transparent;color:var(--text);border-radius:11px;font-size:13px;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;font-weight:500}
.nsc-toolbar button.clone{border:1px solid var(--info-bd);color:var(--info);background:var(--info-bg)}
.nsc-note{font-size:12px;color:var(--hint);margin-top:12px;display:flex;gap:7px;align-items:flex-start;line-height:1.45}
.nsc-panel{margin-top:16px;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px}
.nsc-panel.hidden{display:none}
.nsc-prow{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.nsc-pname{font-size:15px;font-weight:600}
.nsc-sublbl{font-size:11.5px;color:var(--hint);margin:14px 0 8px}
.nsc-mrow{display:flex;align-items:center;gap:8px;background:var(--surface2);border-radius:11px;padding:8px 10px;margin-bottom:8px;flex-wrap:wrap}
.nsc-mdot{width:10px;height:10px;border-radius:3px;flex:0 0 auto}
.nsc-mname{flex:1;font-size:13.5px;min-width:80px}
.nsc-seg2{display:flex;gap:4px;background:var(--bg);border-radius:8px;padding:3px}
.nsc-seg2 button{border:none;background:transparent;color:var(--hint);font-size:11px;font-family:inherit;border-radius:6px;padding:5px 8px;cursor:pointer}
.nsc-seg2 button.on{background:var(--info-bg);color:var(--info);font-weight:600}
.nsc-trash{font-size:16px;color:var(--danger);cursor:pointer;line-height:1}
.nsc-addbtn{width:100%;display:flex;align-items:center;justify-content:center;gap:8px;height:40px;background:transparent;border:1px dashed var(--border2);border-radius:11px;color:var(--text);font-size:13px;font-family:inherit;cursor:pointer;margin-top:4px}
.nsc-pgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.nsc-pf label{display:block;font-size:11px;color:var(--hint);margin-bottom:4px}
.nsc-pf input{width:100%;height:38px;background:var(--surface2);border:1px solid var(--border);border-radius:9px;color:var(--text);font-size:14px;padding:0 10px;font-family:inherit}
.nsc-pf input:focus{outline:none;border-color:var(--info-bd)}
.nsc-pf input:read-only{color:var(--hint)}
.nsc-freq{margin-top:12px;background:var(--info-bg);border:1px solid var(--info-bd);border-radius:10px;padding:10px 12px;font-size:12.5px;color:var(--info);display:flex;align-items:center;gap:8px}
.nsc-foot{padding:14px 16px;border-top:1px solid var(--border)}
.nsc-steps{display:flex;align-items:center;gap:8px;margin:0 0 16px}
.nsc-step{display:flex;align-items:center;gap:6px;font-size:11.5px;color:var(--hint);font-weight:500}
.nsc-step .n{width:19px;height:19px;border-radius:99px;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700}
.nsc-step.on{color:var(--info)}
.nsc-step.on .n{border-color:var(--info);background:var(--info);color:#fff}
.nsc-stepline{flex:1;height:1.5px;background:var(--border)}
.nsc-issues{display:flex;align-items:flex-start;gap:7px;font-size:12px;color:var(--warn);margin-bottom:10px;line-height:1.4}
.nsc-pf .inbox{position:relative;display:flex;align-items:center}
.nsc-pf .inbox input{padding-right:44px}
.nsc-suffix{position:absolute;right:11px;font-size:12px;color:var(--hint);pointer-events:none}
.nsc-step2b{display:flex;align-items:center;gap:8px}
.nsc-stepbtn{width:38px;height:38px;border-radius:9px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:19px;font-family:inherit;cursor:pointer;flex:0 0 auto;display:flex;align-items:center;justify-content:center}
.nsc-stepbtn:active{background:var(--info-bg)}
.nsc-stepval{flex:1;text-align:center;font-size:15px;font-weight:600}
.nsc-presets{display:flex;gap:6px;margin:2px 0 8px;flex-wrap:wrap}
.nsc-chip{border:1px solid var(--border2);background:var(--surface2);color:var(--muted);border-radius:8px;padding:8px 12px;font-size:12.5px;font-family:inherit;cursor:pointer}
.nsc-chip.on{border-color:var(--info-bd);background:var(--info-bg);color:var(--info);font-weight:600}
.nsc-zoom{display:flex;gap:6px;align-items:center;justify-content:flex-end;margin-top:8px}
.nsc-zoom button{width:34px;height:30px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:16px;cursor:pointer;font-family:inherit}
.nsc-zoom .z{font-size:11.5px;color:var(--hint);min-width:40px;text-align:center}
.nsc-draft{display:flex;align-items:center;gap:8px;background:var(--info-bg);border:1px solid var(--info-bd);border-radius:10px;padding:9px 12px;font-size:12.5px;color:var(--info);margin-bottom:12px}
.nsc-draft button{margin-left:auto;border:none;background:transparent;color:var(--info);font-size:12.5px;cursor:pointer;font-family:inherit;text-decoration:underline}
.nsc-next{width:100%;height:50px;border-radius:13px;border:1.5px solid var(--info-bd);background:var(--info-bg);color:var(--info);font-size:16px;font-weight:600;font-family:inherit;cursor:pointer}
.nsc-next:disabled{opacity:.45;border-color:var(--border2);background:transparent;color:var(--hint);cursor:default}
.nsc-backdrop{position:absolute;inset:0;background:rgba(0,0,0,.45);opacity:0;pointer-events:none;transition:opacity .2s;z-index:10}
.nsc-backdrop.on{opacity:1;pointer-events:auto}
.nsc-sheet{position:absolute;left:0;right:0;bottom:0;background:var(--surface);border-top-left-radius:20px;border-top-right-radius:20px;border-top:1px solid var(--border);padding:8px 16px 24px;transform:translateY(110%);transition:transform .26s cubic-bezier(.2,.8,.2,1);z-index:11;max-height:82%;overflow-y:auto}
.nsc-sheet.on{transform:translateY(0)}
.nsc-grab{width:38px;height:4px;border-radius:9px;background:var(--border2);margin:6px auto 10px}
.nsc-sheet h3{font-size:15px;font-weight:600;margin:2px 0 12px}
.nsc-opt{display:flex;align-items:center;gap:13px;padding:11px 12px;border-radius:12px;cursor:pointer;border:1.5px solid transparent}
.nsc-opt:active{background:var(--surface2)}
.nsc-opt.on{border-color:var(--info-bd);background:var(--info-bg)}
.nsc-pic{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex:0 0 auto;background:var(--surface2);font-size:17px;font-weight:700}
.nsc-pn{font-size:14.5px;font-weight:600}
.nsc-pd{font-size:12px;color:var(--hint);margin-top:1px}
.nsc-lparams{margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
.nsc-dirrow{display:flex;gap:10px;margin-bottom:10px}
.nsc-dirrow .dg{flex:1}
.nsc-dirrow .dg>div{font-size:11px;color:var(--hint);margin-bottom:5px}
.nsc-thumb{width:58px;height:38px;border:1px solid var(--border);border-radius:7px;background:var(--canvas);flex:0 0 auto;overflow:hidden}
</style>
</head>
<body>
<div id="nsc-root" data-theme="light"></div>

<script>
/* ---------- реальная модель приложения ---------- */
function getList(){ try{ return JSON.parse(localStorage.getItem('nova_list'))||[]; }catch(e){ return []; } }

/* Экран «Создание агрегата». Логика/схема — из hi-fi дизайна Designer (NovaScheme2),
   точки интеграции (donors/save/edit/issues/back) переписаны на реальную модель nova_agg/nova_list. */
class CreateAggregate {
  constructor(){
    this.props = { theme: 'auto', defaultOrient: 'h' };
    this.units = []; this.trans = []; this.sel = null; this.orient = this.props.defaultOrient;
    this.aggName = ''; this.curLink = null; this.addSide = 'r'; this.curMach = -1; this.curSup = {}; this.curSlot = 0;
    this.zoom = 1; this._restored = false; this.DRAFT_KEY = 'nova_draft_create'; this.editId = null;
  }

  MT = {
    motor: { name: 'Двигатель', color: '#4d8dff', gl: 'Д' },
    pump:  { name: 'Насос',      color: '#22b8ac', gl: 'Н' },
    fan:   { name: 'Вентилятор', color: '#e0559f', gl: 'В' },
    comp:  { name: 'Компрессор', color: '#e0912b', gl: 'К' },
    gen:   { name: 'Генератор',  color: '#8a63e6', gl: 'Г' }
  };
  MPARAMS = {
    motor: [ { k: 'power', l: 'Мощность', u: 'кВт' }, { k: 'poles', l: 'Число полюсов', step: 2, min: 2 }, { k: 'zs', l: 'Пазы статора', step: 1, min: 0 }, { k: 'zr', l: 'Стержни ротора', step: 1, min: 0 } ],
    pump:  [ { k: 'flow', l: 'Расход', u: 'м³/ч' }, { k: 'head', l: 'Напор', u: 'м' }, { k: 'blades', l: 'Число лопастей', step: 1, min: 1 } ],
    fan:   [ { k: 'flow', l: 'Расход', u: 'м³/ч' }, { k: 'head', l: 'Давление', u: 'Па' }, { k: 'blades', l: 'Число лопастей', step: 1, min: 1 } ],
    comp:  [ { k: 'flow', l: 'Производит.', u: 'м³/мин' }, { k: 'head', l: 'Давление', u: 'бар' }, { k: 'blades', l: 'Число лопастей', step: 1, min: 1 } ],
    gen:   [ { k: 'power', l: 'Мощность', u: 'кВт' }, { k: 'poles', l: 'Число полюсов', step: 2, min: 2 } ]
  };
  BRGP = { motor: [], pump: [], fan: [], comp: [], gen: [] };  // типовые подшипники убраны для всех типов
  RPM_PRESETS = [3000, 1500, 1000, 750, 600];
  LINKS = {
    rigid:   { name: 'Муфта жёсткая', desc: 'соосно, 1:1', off: false, params: [] },
    elastic: { name: 'Муфта упругая', desc: 'соосно, пальцы + центровка', off: false, params: [{ k: 'pins', l: 'Число пальцев', step: 1, min: 0 }, { k: 'radial', l: 'Радиальное', u: 'мм' }] },
    belt:    { name: 'Ремённая', desc: 'перпендикулярно, шкивы + ремень', off: true, params: [{ k: 'd1', l: 'Ø ведущего', u: 'мм' }, { k: 'd2', l: 'Ø ведомого', u: 'мм' }, { k: 'len', l: 'Длина ремня', u: 'мм' }] },
    gear:    { name: 'Зубчатая', desc: 'перпендикулярно, шестерни', off: true, params: [{ k: 'z1', l: 'Зубья ведущей', step: 1, min: 1 }, { k: 'z2', l: 'Зубья ведомой', step: 1, min: 1 }] }
  };
  BRG = [
    { id: '6206', n: '6206', t: 'Шариковый радиальный', kind: 'rolling' },
    { id: '6207', n: '6207', t: 'Шариковый радиальный', kind: 'rolling' },
    { id: '6208', n: '6208', t: 'Шариковый радиальный', kind: 'rolling' },
    { id: '6209', n: '6209', t: 'Шариковый радиальный', kind: 'rolling' },
    { id: '6210', n: '6210', t: 'Шариковый радиальный', kind: 'rolling' },
    { id: '6305', n: '6305', t: 'Шариковый радиальный', kind: 'rolling' },
    { id: '6308', n: '6308', t: 'Шариковый радиальный', kind: 'rolling' },
    { id: '6309', n: '6309', t: 'Шариковый радиальный', kind: 'rolling' },
    { id: '6310', n: '6310', t: 'Шариковый радиальный', kind: 'rolling' },
    { id: 'NU309', n: 'NU309', t: 'Роликовый цилиндрический', kind: 'rolling' },
    { id: 'NJ308', n: 'NJ308', t: 'Роликовый цилиндрический', kind: 'rolling' },
    { id: 'NU2308', n: 'NU2308', t: 'Роликовый цилиндрический 2-ряд.', kind: 'rolling' },
    { id: '22310', n: '22310', t: 'Роликовый сферич. 2-ряд.', kind: 'rolling' },
    { id: '22312', n: '22312', t: 'Роликовый сферич. 2-ряд.', kind: 'rolling' },
    { id: '7308', n: '7308', t: 'Радиально-упорный шариковый', kind: 'rolling' },
    { id: '7310', n: '7310', t: 'Радиально-упорный шариковый', kind: 'rolling' },
    { id: '30308', n: '30308', t: 'Роликовый конический', kind: 'rolling' },
    { id: '30310', n: '30310', t: 'Роликовый конический', kind: 'rolling' },
    { id: '1308', n: '1308', t: 'Шариковый сферич. 2-ряд.', kind: 'rolling' },
    { id: 'sl-rad', n: 'Радиальный', t: 'Скольжения, радиальный', kind: 'journal' },
    { id: 'sl-thr', n: 'Упорный', t: 'Скольжения, упорный', kind: 'journal' },
    { id: 'sl-seg', n: 'Сегментный (баббит)', t: 'Скольжения, сегментный радиальный', kind: 'journal' }
  ];
  PALS = {
    light: { shaft: '#6b6a63', tick: '#b6b4ab', warn: '#c8891a', supFill: '#ffffff', supRing: 'rgba(0,0,0,.26)', supText: '#55585e', label: '#55585e', metal1: '#b4b1a8', metal2: '#9a988f', pulleyFill: '#ffffff', pulleyStroke: '#8f8d84', belt: '#a8a69d', sel: '#2a6fdb', rpmFg: '#2a6fdb', rpmBg: '#eaf1fb', rpmBd: '#bcd4f2' },
    dark:  { shaft: '#9a988f', tick: '#565b64', warn: '#e0b24a', supFill: '#20232a', supRing: 'rgba(255,255,255,.26)', supText: '#a9aeb6', label: '#a9aeb6', metal1: '#55534c', metal2: '#6e6c64', pulleyFill: '#20232a', pulleyStroke: '#8f8d84', belt: '#86857e', sel: '#85b7eb', rpmFg: '#85b7eb', rpmBg: 'rgba(55,138,221,.18)', rpmBd: 'rgba(55,138,221,.5)' }
  };

  /* доноры для клонирования = реальные агрегаты из nova_list */
  donors() {
    return getList().map((it, i) => {
      let a = {}; try { a = typeof it.agg === 'string' ? JSON.parse(it.agg) : (it.agg || {}); } catch (e) {}
      return { id: String(i), name: it.name || 'Агрегат', desc: this.descOf(a), orient: (a.orient === 'v' ? 'v' : 'h'), units: a.units || [], trans: a.trans || [] };
    }).filter(d => d.units.length);
  }
  descOf(a) {
    const nu = (a.units || []).length; let ns = 0; (a.units || []).forEach(u => ns += (u.supports || []).length);
    const types = []; (a.units || []).forEach(u => (u.machines || []).forEach(m => { const nm = (this.MT[m.type] || {}).name; if (nm && types.indexOf(nm) < 0) types.push(nm); }));
    return nu + (nu === 1 ? ' вал' : ' вала') + ' · ' + ns + ' опор' + (types.length ? ' · ' + types.join('+') : '');
  }

  // ---------- запуск ----------
  init() {
    this.root = document.getElementById('nsc-root');
    this.applyTheme();
    this.buildShell();
    this.bind();
    const editing = /(?:[?&])load=1(?:&|$)/.test(location.search);
    if (editing) this.loadForEdit(); else this.loadDraft();
    const n0 = this.q('#nsc-name'); if (n0) n0.value = this.aggName || '';
    this.render();
    if (window.matchMedia) { this._mq = window.matchMedia('(prefers-color-scheme: dark)'); this._mqh = () => { if ((this.props.theme || 'light') === 'auto') { this.applyTheme(); this.renderScheme(); } }; this._mq.addEventListener ? this._mq.addEventListener('change', this._mqh) : this._mq.addListener(this._mqh); }
  }
  loadForEdit() {
    try { const a = JSON.parse(localStorage.getItem('nova_agg')); if (a && a.units && a.units.length) { this.units = a.units; this.trans = a.trans || []; this.orient = a.orient || 'h'; this.aggName = a.name || ''; this.sel = null; } } catch (e) {}
    const eid = localStorage.getItem('nova_editId'); this.editId = (eid != null && eid !== '' && !isNaN(+eid)) ? +eid : null;
    this._restored = false;
  }
  applyTheme() { let t = this.props.theme || 'light'; if (t === 'auto') t = (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light'; this.theme = t; if (this.root) this.root.setAttribute('data-theme', t); }
  pal() { return this.PALS[this.theme] || this.PALS.light; }
  q(sel) { return this.root.querySelector(sel); }

  buildShell() {
    this.root.innerHTML =
      '<div class="nsc-hd"><div class="nsc-ic" data-act="back">‹</div>'
      + '<div style="flex:1"><div class="nsc-ttl">Новый агрегат</div><div class="nsc-sttl">валы · машины · передачи</div></div>'
      + '<div class="nsc-ic" data-act="save" style="color:var(--info)">✓</div></div>'
      + '<div class="nsc-body">'
      + '<div class="nsc-steps"><div class="nsc-step on"><span class="n">1</span>Схема</div><div class="nsc-stepline"></div><div class="nsc-step"><span class="n">2</span>Дефекты</div></div>'
      + '<div id="nsc-draft"></div>'
      + '<div class="nsc-field"><label class="nsc-lbl">Название агрегата</label><input class="nsc-inp" id="nsc-name" placeholder="Например, Насосный агрегат Н-3" data-inp="aggname"/></div>'
      + '<div class="nsc-seg"><button id="nsc-bh" data-act="orient" data-v="h">⇆ Горизонтальный</button><button id="nsc-bv" data-act="orient" data-v="v">⇅ Вертикальный</button></div>'
      + '<div id="nsc-choice"></div>'
      + '<div id="nsc-canvas" class="nsc-canvas" style="display:none"></div>'
      + '<div id="nsc-zoom" class="nsc-zoom" style="display:none"></div>'
      + '<div id="nsc-toolbar" class="nsc-toolbar" style="display:none"></div>'
      + '<div id="nsc-hint" class="nsc-note" style="display:none"></div>'

  renderScheme() {

        + '<button class="nsc-stepbtn" data-act="' + stepAct + '" ' + extraAttrs + ' data-key="' + pp.k + '" data-d="' + pp.step + '" data-min="' + (pp.min || 0) + '">＋</button></div>';

  openClone() { this.cloneQuery = ''; this.elSTitle.textContent = 'Клонировать агрегат из базы'; this.elSBody.innerHTML = '<div style="margin-bottom:10px"><input class="nsc-inp" placeholder="Поиск: имя, тип, участок…" data-inp="cloneSearch"/></div><div id="nsc-clonelist"></div><div class="nsc-note" style="margin-top:8px"><span>ⓘ</span><span>Копируется весь агрегат, кроме уникального названия — задайте его в поле сверху.</span></div>'; this.fillClones(); this.openSheet(); }
  fillClones() { const q = (this.cloneQuery || '').toLowerCase(); const list = this.donors().filter(d => !q || (d.name + ' ' + d.desc).toLowerCase().includes(q)); let h = ''; list.forEach(d => { h += '<div class="nsc-opt" data-act="clonePick" data-id="' + d.id + '"><div class="nsc-thumb">' + this.thumb(d) + '</div><div><div class="nsc-pn">' + d.name + '</div><div class="nsc-pd">' + d.desc + '</div></div></div>'; }); if (!list.length) h = '<div class="nsc-pd" style="padding:14px 4px">Ничего не найдено</div>'; const el = this.q('#nsc-clonelist'); if (el) el.innerHTML = h; }
  thumb(d) { const el = document.createElement('div'); window.NovaScheme2.render(el, { orient: d.orient, units: d.units, trans: d.trans }, { pal: this.pal(), maxH: 38 }); return el.innerHTML; }
  doClone(id) { const d = this.donors().find(x => x.id === id); if (!d) return; this.units = JSON.parse(JSON.stringify(d.units)); this.trans = JSON.parse(JSON.stringify(d.trans)); this.orient = d.orient; this.aggName = ''; this.editId = null; this.sel = 0; this._restored = false; this.closeSheet(); this.render(); const n = this.q('#nsc-name'); if (n) { n.value = ''; setTimeout(() => { n.focus(); }, 60); } }

  // ---------- шторки ----------
  openSheet() { this.elSheet.classList.add('on'); this.elBackdrop.classList.add('on'); }
  closeSheet() { this.elSheet.classList.remove('on'); this.elBackdrop.classList.remove('on'); }

  machPalette(j) { this.curMach = j; this.elSTitle.textContent = (j >= 0 ? 'Тип машины' : 'Добавить машину'); let h = ''; for (const k in this.MT) { const t = this.MT[k]; h += '<div class="nsc-opt" data-act="pickMach" data-v="' + k + '"><div class="nsc-pic" style="background:' + t.color + '22;color:' + t.color + '">' + t.gl + '</div><div><div class="nsc-pn">' + t.name + '</div></div></div>'; } this.elSBody.innerHTML = h; this.openSheet(); }
  pickMach(type) { if (this.curMach >= 0) this.units[this.sel].machines[this.curMach].type = type; else this.units[this.sel].machines.push({ type: type, pos: 'center' }); this.closeSheet(); this.render(); }

  openSupport(ui, si) { this.sel = ui; this.curSup = { u: ui, s: si }; this.render(); this.buildSupport(); this.openSheet(); }
  buildSupport() {
    const u = this.curSup.u, si = this.curSup.s, sup = this.units[u].supports[si];
    this.elSTitle.textContent = 'Опора №' + this.supNum(u, si) + ' · ' + this.units[u].name;
    const mt = (this.units[u].machines[0] && this.units[u].machines[0].type) || 'motor';
    const pres = this.BRGP[mt] || [];
    let ph = pres.length ? '<div class="nsc-choice-lbl" style="margin:2px 0 6px">Типовые для «' + this.MT[mt].name.toLowerCase() + '»</div><div class="nsc-presets">' + pres.map(id => '<button class="nsc-chip' + (sup.brgs.indexOf(id) >= 0 ? ' on' : '') + '" data-act="pickBrgPreset" data-id="' + id + '">' + this.brgName(id) + '</button>').join('') + '</div>' : '';
    let h = ph + '<div class="nsc-mrow"><span class="nsc-mname">Подшипников: ' + sup.brgs.length + ' (макс. 3)</span><div class="nsc-seg2"><button data-act="setBrgCnt" data-v="-1">−</button><button data-act="setBrgCnt" data-v="1">+</button></div></div>';
    sup.brgs.forEach((b, j) => { const nm = b ? (this.brgName(b) + ' · ' + this.brgType(b)) : 'не выбран — тапните'; h += '<div class="nsc-opt" data-act="openCatalog" data-j="' + j + '"><div class="nsc-pic" style="color:' + (b ? 'var(--info)' : 'var(--hint)') + '">◎</div><div><div class="nsc-pn">Подшипник ' + (j + 1) + '</div><div class="nsc-pd">' + nm + '</div></div></div>'; });
    this.elSBody.innerHTML = h;
  }
  setBrgCnt(d) { const sup = this.units[this.curSup.u].supports[this.curSup.s]; const n = Math.max(1, Math.min(3, sup.brgs.length + d)); while (sup.brgs.length > n) sup.brgs.pop(); while (sup.brgs.length < n) sup.brgs.push(''); this.render(); this.buildSupport(); }
  openCatalog(j) { this.curSlot = j; this.elSTitle.textContent = 'Тип подшипника'; this.elSBody.innerHTML =
    '<div class="nsc-opt" data-act="brgKind" data-v="rolling"><div class="nsc-pic" style="color:var(--info)">◎</div><div><div class="nsc-pn">Качения</div><div class="nsc-pd">шариковые и роликовые — из базы</div></div></div>'
    + '<div class="nsc-opt" data-act="brgKind" data-v="journal"><div class="nsc-pic" style="color:var(--info)">◍</div><div><div class="nsc-pn">Скольжения</div><div class="nsc-pd">радиальный или упорный</div></div></div>'; }
  brgKind(v) { if (v === 'rolling') this.openRolling(); else this.openJournal(); }
  openRolling() { this.brgQuery = ''; this.elSTitle.textContent = 'Подшипник качения'; this.elSBody.innerHTML = '<div style="margin-bottom:10px"><input class="nsc-inp" placeholder="Поиск: 6208, роликовый…" data-inp="brgSearch"/></div><div id="nsc-brglist"></div>'; this.fillRolling(); }
  fillRolling() { const q = (this.brgQuery || '').toLowerCase(); const list = this.BRG.filter(b => b.kind === 'rolling' && (!q || (b.n + ' ' + b.t).toLowerCase().includes(q))); let h = ''; list.forEach(b => { h += '<div class="nsc-opt" data-act="pickBrg" data-id="' + b.id + '"><div class="nsc-pic" style="color:var(--info)">◎</div><div><div class="nsc-pn">' + b.n + '</div><div class="nsc-pd">' + b.t + '</div></div></div>'; }); if (!list.length) h = '<div class="nsc-pd" style="padding:14px 4px">Ничего не найдено</div>'; const el = this.q('#nsc-brglist'); if (el) el.innerHTML = h; }
  openJournal() { this.elSTitle.textContent = 'Подшипник скольжения'; let h = ''; this.BRG.filter(b => b.kind === 'journal').forEach(b => { h += '<div class="nsc-opt" data-act="pickBrg" data-id="' + b.id + '"><div class="nsc-pic" style="color:var(--info)">◍</div><div><div class="nsc-pn">' + b.n + '</div><div class="nsc-pd">' + b.t + '</div></div></div>'; }); this.elSBody.innerHTML = h; }
  pickBrg(id) { this.units[this.curSup.u].supports[this.curSup.s].brgs[this.curSlot] = id; this.render(); this.buildSupport(); }

  openTransSheet() { this.elSTitle.textContent = 'Чем соединить новый вал'; let h = ''; for (const k in this.LINKS) { const t = this.LINKS[k]; h += '<div class="nsc-opt" data-act="pickLink" data-v="' + k + '"><div class="nsc-pic">' + this.connIcon(k) + '</div><div><div class="nsc-pn">' + t.name + '</div><div class="nsc-pd">' + t.desc + '</div></div></div>'; } this.elSBody.innerHTML = h; this.openSheet(); }
  addUnitWith(type) { const T = { type: type }; if (this.LINKS[type].off) { T.beltDir = 'down'; T.nextDir = 'right'; } const nu = { name: 'Вал ' + (this.units.length + 1), rpm: '1450', machines: [{ type: 'pump', pos: 'center' }], supports: [{ brgs: [''] }, { brgs: [''] }] }; if (this.addSide === 'r') { this.units.push(nu); this.trans.push(T); this.sel = this.units.length - 1; } else { this.units.unshift(nu); this.trans.unshift(T); this.sel = 0; } this.closeSheet(); this.render(); }

  openLink(i) { this.curLink = i; this.elSTitle.textContent = 'Передача между валами'; this.buildLink(i); this.openSheet(); }
  buildLink(i) {
    const L = this.trans[i]; let h = '';
    for (const k in this.LINKS) { const t = this.LINKS[k]; h += '<div class="nsc-opt' + (L.type === k ? ' on' : '') + '" data-act="setLink" data-v="' + k + '"><div class="nsc-pic">' + this.connIcon(k) + '</div><div><div class="nsc-pn">' + t.name + '</div><div class="nsc-pd">' + t.desc + '</div></div></div>'; }
    const sch = this.LINKS[L.type];
    if (sch.off) {
      h += '<div class="nsc-lparams"><div class="nsc-dirrow">'
        + '<div class="dg"><div>Ремень</div><div class="nsc-seg2"><button class="' + (L.beltDir === 'up' ? 'on' : '') + '" data-act="setDir" data-key="beltDir" data-v="up">' + (this.orient === 'h' ? '↑ вверх' : '◄ влево') + '</button><button class="' + (L.beltDir === 'down' ? 'on' : '') + '" data-act="setDir" data-key="beltDir" data-v="down">' + (this.orient === 'h' ? '↓ вниз' : 'вправо ►') + '</button></div></div>'
        + '<div class="dg"><div>Следующий вал</div><div class="nsc-seg2"><button class="' + (L.nextDir === 'left' ? 'on' : '') + '" data-act="setDir" data-key="nextDir" data-v="left">' + (this.orient === 'h' ? '◄ влево' : '↑ вверх') + '</button><button class="' + (L.nextDir === 'right' ? 'on' : '') + '" data-act="setDir" data-key="nextDir" data-v="right">' + (this.orient === 'h' ? 'вправо ►' : '↓ вниз') + '</button></div></div>'
        + '</div><div class="nsc-pgrid">';
      sch.params.forEach(pp => { h += '<div class="nsc-pf">' + this.paramField(L[pp.k], pp, 'linkParam', 'stepLink', '') + '</div>'; });
      h += '</div>'; const cf = this.charFreq(i); h += '<div class="nsc-freq" id="nsc-cf" style="' + (cf ? '' : 'display:none') + '">〜 ' + (cf || '') + '</div>';
      h += '<div class="nsc-note" style="margin-top:10px"><span>ⓘ</span><span>Параметры пусты → частоту вала после передачи задайте вручную в его панели.</span></div></div>';
    } else if (sch.params.length) {
      h += '<div class="nsc-lparams"><div class="nsc-pgrid">';
      sch.params.forEach(pp => { h += '<div class="nsc-pf">' + this.paramField(L[pp.k], pp, 'linkParam', 'stepLink', '') + '</div>'; });
      h += '</div></div>';
    }
    this.elSBody.innerHTML = h;
  }
  charFreq(i) { const L = this.trans[i], n = parseFloat(this.units[i].rpm) || 0; if (L.type === 'belt') { const d1 = parseFloat(L.d1), len = parseFloat(L.len); if (d1 && len) return 'Частота ремня ≈ ' + (Math.PI * d1 * (n / 60) / len).toFixed(1) + ' Гц'; } if (L.type === 'gear') { const z1 = parseFloat(L.z1); if (z1) return 'Зубцовая GMF ≈ ' + (z1 * n / 60).toFixed(1) + ' Гц'; } return null; }
  setLink(type) { const L = this.trans[this.curLink]; L.type = type; if (this.LINKS[type].off) { if (!L.beltDir) L.beltDir = 'down'; if (!L.nextDir) L.nextDir = 'right'; } this.render(); this.buildLink(this.curLink); }
  setDir(k, v) { this.trans[this.curLink][k] = v; this.render(); this.buildLink(this.curLink); }
  updFreq() { const el = this.q('#nsc-cf'); const cf = this.charFreq(this.curLink); if (el && cf) { el.textContent = '〜 ' + cf; el.style.display = 'flex'; } }

  connIcon(t) { const g = this.pal().shaft; const s = (b) => '<svg width="26" height="34" viewBox="0 0 26 40">' + b + '</svg>';
    if (t === 'belt') return s('<circle cx="13" cy="12" r="5" fill="none" stroke="' + g + '" stroke-width="2"/><circle cx="13" cy="28" r="5" fill="none" stroke="' + g + '" stroke-width="2"/><line x1="8" y1="12" x2="8" y2="28" stroke="' + g + '" stroke-width="1.5"/><line x1="18" y1="12" x2="18" y2="28" stroke="' + g + '" stroke-width="1.5"/>');
    if (t === 'gear') return s('<circle cx="13" cy="13" r="5" fill="none" stroke="' + g + '" stroke-width="1.8"/><circle cx="13" cy="24" r="5" fill="none" stroke="' + g + '" stroke-width="1.8"/>');
    if (t === 'elastic') return s('<line x1="2" y1="20" x2="24" y2="20" stroke="' + g + '" stroke-width="2.3"/><rect x="9" y="13" width="2.4" height="14" fill="' + g + '"/><rect x="15" y="13" width="2.4" height="14" fill="' + g + '"/>');
    return s('<line x1="2" y1="20" x2="24" y2="20" stroke="' + g + '" stroke-width="2.3"/><rect x="10" y="13" width="2.4" height="14" fill="' + g + '"/><rect x="14" y="13" width="2.4" height="14" fill="' + g + '"/>');
  }

  /* Далее → дефекты: пишем nova_agg, чистим черновик, переходим (nova_editId сохраняется для write-back в program) */
  save() {
    const { block } = this.issues(); if (block) return;
    try {
      localStorage.setItem('nova_agg', JSON.stringify({ name: this.aggName, orient: this.orient, units: this.units, trans: this.trans }));
      localStorage.removeItem(this.DRAFT_KEY);
    } catch (e) {}
    location.href = 'defects.html';
  }
}

document.addEventListener('DOMContentLoaded', function () { new CreateAggregate().init(); });
</script>
