<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Nova — настройки измерений</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
body{margin:0;background:#E8E6E1;font-family:'IBM Plex Sans',system-ui,sans-serif;display:flex;justify-content:center}
#nms-root{--bg:#F4F3F0;--surface:#FFFFFF;--surface2:#E7E5E0;--text:#1B1D21;--muted:#55585E;--hint:#9A9DA3;--border:#E4E2DD;--border2:#CDCAC3;--info:#2A6FDB;--info-bg:#EAF1FB;--info-bd:#BCD4F2;--danger:#C6483A;--warn:#C8891A;--ok:#1F8A5B;--canvas:#FBFAF8;width:100%;max-width:440px;height:100vh;height:100dvh;position:relative;overflow:hidden;display:flex;flex-direction:column;background:var(--bg);color:var(--text);font-family:'IBM Plex Sans',system-ui,sans-serif}
#nms-root[data-theme="dark"]{--bg:#15171B;--surface:#20232A;--surface2:#2A2E36;--text:#ECEEF1;--muted:#A9AEB6;--hint:#6E747E;--border:#31353D;--border2:#3E434C;--info:#85B7EB;--info-bg:rgba(55,138,221,.16);--info-bd:rgba(55,138,221,.5);--danger:#E5675A;--warn:#E0B24A;--ok:#4FB784;--canvas:#191C22}
#nms-root *{box-sizing:border-box}
.nms-hd{display:flex;align-items:center;gap:12px;padding:14px 16px 12px;border-bottom:1px solid var(--border)}
.nms-ic{width:32px;height:32px;border-radius:99px;display:flex;align-items:center;justify-content:center;font-size:19px;color:var(--muted);cursor:pointer;flex:0 0 auto}
.nms-ttl{font-size:16px;font-weight:600}
.nms-sttl{font-size:11.5px;color:var(--hint);margin-top:1px}
.nms-badge{font-size:10.5px;font-weight:700;padding:4px 9px;border-radius:99px;background:var(--info-bg);color:var(--info);border:1px solid var(--info-bd);flex:0 0 auto}
.nms-body{padding:16px;flex:1;overflow-y:auto}
.nms-step{font-size:11.5px;color:var(--hint);margin-bottom:6px}
.nms-stepbar{display:flex;gap:4px;margin-bottom:16px}
.nms-stepbar span{height:3px;border-radius:2px;flex:1;background:var(--border)}
.nms-stepbar span.done{background:var(--info-bd)}
.nms-stepbar span.on{background:var(--info)}
.nms-def{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:16px}
.nms-defhd{display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.nms-defhd .t{font-size:14px;font-weight:600;display:flex;align-items:center;gap:8px}
.nms-defhd .c{font-size:11.5px;color:var(--hint)}
.nms-defbody{margin-top:12px;display:none}
.nms-defbody.open{display:block}
.nms-sec{font-size:11.5px;color:var(--hint);margin:14px 0 8px;font-weight:500}
.nms-sec:first-child{margin-top:0}
.nms-presets{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:4px}
.nms-chip{border:1px solid var(--border2);background:var(--surface2);color:var(--muted);border-radius:8px;padding:8px 12px;font-size:12.5px;font-family:inherit;cursor:pointer;white-space:nowrap}
.nms-chip.on{border-color:var(--info-bd);background:var(--info-bg);color:var(--info);font-weight:600}
.nms-row2{display:flex;align-items:center;justify-content:space-between;padding:9px 0;font-size:13.5px;border-top:1px solid var(--border)}
.nms-row2:first-of-type{border-top:none}
.nms-row2 .k{color:var(--muted)}
.nms-seg{display:flex;gap:3px;background:var(--surface2);border-radius:9px;padding:3px}
.nms-seg button{border:none;background:transparent;color:var(--hint);font-size:12px;font-family:inherit;border-radius:6px;padding:6px 10px;cursor:pointer}
.nms-seg button.on{background:var(--surface);color:var(--text);font-weight:600;box-shadow:0 1px 2px rgba(0,0,0,.12)}
.nms-toggle{width:42px;height:25px;border-radius:99px;background:var(--border2);position:relative;cursor:pointer;flex:0 0 auto;transition:background .15s}
.nms-toggle.on{background:var(--info)}
.nms-toggle .k{position:absolute;top:2.5px;left:2.5px;width:20px;height:20px;border-radius:99px;background:#fff;transition:left .15s}
.nms-toggle.on .k{left:19.5px}
.nms-actions{display:flex;gap:8px;margin-bottom:14px}
.nms-actions button{flex:1;height:40px;border:1px solid var(--border);background:var(--surface);color:var(--text);border-radius:11px;font-size:12.5px;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;font-weight:500}
.nms-plabel{font-size:11.5px;color:var(--hint);margin-bottom:8px;font-weight:500}
.nms-sseg button{flex:1;text-align:center}
.nms-shint{font-size:11px;color:var(--hint);margin:6px 2px 0;line-height:1.35}
.nms-supgrp{margin-bottom:16px}
.nms-suphd{display:flex;align-items:baseline;gap:8px;margin-bottom:8px;padding-left:2px}
.nms-suphd .s{font-size:13px;font-weight:700}
.nms-suphd .m{font-size:11.5px;color:var(--hint)}
.nms-pt{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:13px 14px;margin-bottom:10px;cursor:pointer}
.nms-pt-hd{display:flex;align-items:center;gap:10px}
.nms-pt-dir{width:34px;height:34px;border-radius:9px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:var(--muted);flex:0 0 auto}
.nms-pt-dir.vert{background:var(--info-bg);color:var(--info)}
.nms-pt-nm{font-size:14.5px;font-weight:600}
.nms-pt-sub{font-size:11.5px;color:var(--hint);margin-top:1px}
.nms-pt-ch{margin-left:auto;font-size:11px;color:var(--hint);text-align:right;flex:0 0 auto}
.nms-pt-meas{display:flex;gap:5px;flex-wrap:wrap;margin-top:10px}
.nms-tag{font-size:11px;padding:3px 8px;border-radius:6px;background:var(--surface2);color:var(--muted);white-space:nowrap}
.nms-tag.acc{background:rgba(42,111,219,.1);color:var(--info)}
.nms-tag.vel{background:rgba(31,138,91,.12);color:var(--ok)}
.nms-tag.sig{background:rgba(200,137,26,.12);color:var(--warn)}
.nms-tag.phase{background:rgba(140,90,220,.14);color:#8c5adc}
.nms-tag.off{opacity:.5}
.nms-chan{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 13px;margin-bottom:9px}
.nms-chan.off{opacity:.55}
.nms-chan-hd{display:flex;align-items:center;gap:10px}
.nms-chan-ax{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex:0 0 auto}
.nms-chan-nm{font-size:14px;font-weight:600}
.nms-chan-t{font-size:11px;color:var(--hint)}
.nms-meas{margin-top:10px;display:flex;flex-direction:column;gap:7px}
.nms-mcard{display:flex;align-items:center;gap:10px;background:var(--surface2);border-radius:10px;padding:9px 11px;cursor:pointer}
.nms-mcard .mi{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;flex:0 0 auto;font-size:14px}
.nms-mcard .mn{font-size:13px;font-weight:600}
.nms-mcard .md{font-size:11px;color:var(--hint);margin-top:1px}
.nms-mcard .mx{margin-left:auto;color:var(--hint);font-size:16px;padding:2px 4px}
.nms-addm{width:100%;height:38px;border:1px dashed var(--border2);background:transparent;border-radius:10px;color:var(--muted);font-size:12.5px;font-family:inherit;cursor:pointer;margin-top:8px}
.nms-fs{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 13px;margin-bottom:14px}
.nms-foot{border-top:1px solid var(--border);background:var(--surface)}
.nms-bud{padding:11px 16px;display:flex;align-items:center;gap:14px;cursor:pointer}
.nms-bud .col{display:flex;flex-direction:column}
.nms-bud .bl{font-size:10px;color:var(--hint);text-transform:uppercase;letter-spacing:.4px}
.nms-bud .bv{font-size:15px;font-weight:700;font-family:'IBM Plex Mono',monospace}
.nms-bud .bar{flex:1;height:6px;border-radius:99px;background:var(--surface2);overflow:hidden;min-width:30px}
.nms-bud .bar i{display:block;height:100%;background:var(--ok);border-radius:99px}
.nms-bud .chev{color:var(--hint);font-size:15px}
.nms-budx{padding:0 16px 12px;font-size:11.5px;color:var(--hint);line-height:1.5;display:none}
.nms-budx.open{display:block}
.nms-next{margin:0 16px 14px;height:50px;width:calc(100% - 32px);border-radius:13px;border:1.5px solid var(--info-bd);background:var(--info-bg);color:var(--info);font-size:16px;font-weight:600;font-family:inherit;cursor:pointer}
.nms-backdrop{position:absolute;inset:0;background:rgba(0,0,0,.45);opacity:0;pointer-events:none;transition:opacity .2s;z-index:10}
.nms-backdrop.on{opacity:1;pointer-events:auto}
.nms-sheet{position:absolute;left:0;right:0;bottom:0;background:var(--surface);border-top-left-radius:20px;border-top-right-radius:20px;border-top:1px solid var(--border);padding:8px 16px 24px;transform:translateY(110%);transition:transform .26s cubic-bezier(.2,.8,.2,1);z-index:11;max-height:86%;overflow-y:auto}
.nms-sheet.on{transform:translateY(0)}
.nms-grab{width:38px;height:4px;border-radius:9px;background:var(--border2);margin:6px auto 12px}
.nms-sheet h3{font-size:15px;font-weight:600;margin:2px 0 4px}
.nms-sheet .sh-sub{font-size:12px;color:var(--hint);margin:0 0 12px}
.nms-opt{display:flex;align-items:center;gap:12px;padding:12px;border-radius:12px;cursor:pointer;border:1.5px solid transparent}
.nms-opt.on{border-color:var(--info-bd);background:var(--info-bg)}
.nms-opt .oi{width:38px;height:38px;border-radius:10px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:17px;flex:0 0 auto}
.nms-opt .on1{font-size:14px;font-weight:600}
.nms-opt .od{font-size:11.5px;color:var(--hint);margin-top:1px}
.nms-fld{margin-bottom:12px}
.nms-fld>label{display:block;font-size:11.5px;color:var(--hint);margin-bottom:7px}
.nms-step2b{display:flex;align-items:center;gap:8px}
.nms-stepbtn{width:38px;height:38px;border-radius:9px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:19px;font-family:inherit;cursor:pointer;flex:0 0 auto;display:flex;align-items:center;justify-content:center}
.nms-stepval{flex:1;text-align:center;font-size:15px;font-weight:600;font-family:'IBM Plex Mono',monospace}
.nms-sheetbtn{width:100%;height:48px;border-radius:12px;border:none;background:var(--info);color:#fff;font-size:15px;font-weight:600;font-family:inherit;cursor:pointer;margin-top:6px}
.nms-cklist{display:flex;flex-direction:column;gap:2px;margin-bottom:4px}
.nms-ckrow{display:flex;align-items:center;gap:11px;padding:11px 4px;cursor:pointer;border-top:1px solid var(--border)}
.nms-ckrow:first-child{border-top:none}
.nms-ck{width:22px;height:22px;border-radius:6px;border:1.5px solid var(--border2);flex:0 0 auto;display:flex;align-items:center;justify-content:center;font-size:14px;color:#fff}
.nms-ck.on{background:var(--info);border-color:var(--info)}
.nms-ckrow .cn{font-size:13.5px;font-weight:500}
</style>
</head>
<body>
<div id="nms-root" data-theme="light"></div>
<script src="nova-sensors.js"></script>
<script>
/* ---------- реальная модель приложения ---------- */
function getList(){ try{ return JSON.parse(localStorage.getItem('nova_list'))||[]; }catch(e){ return []; } }
function pj(s,d){ try{ return typeof s==='string'?JSON.parse(s):(s||d); }catch(e){ return d; } }
var MT_NAME={ motor:'Двигатель', pump:'Насос', fan:'Вентилятор', comp:'Компрессор', gen:'Генератор' };
var FALL_AGG={ name:'Агрегат (пример)', orient:'h', units:[{name:'Вал 1',machines:[{type:'motor'}],supports:[{brgs:['6308']},{brgs:['6308']}]},{name:'Вал 2',machines:[{type:'pump'}],supports:[{brgs:['sl-rad']},{brgs:['6308']}]}], trans:[{type:'elastic'}] };
function sensorHf(){ try{ var s=JSON.parse(localStorage.getItem('nova_sensors')); if(s&&typeof s.hf==='boolean') return s.hf; }catch(e){} return true; }  // датчик v2 по умолчанию (мягкая деградация при v1)

/* Экран «Настройки измерений». Логика/дизайн — из hi-fi пакета Designer;
   интеграция (точки из nova_agg, hasHf от датчика, сохранение в nova_list[i].program) — на реальную модель. */
class MeasSettings {
  CH = {
    aX: { nm: 'Акселерометр X', kind: 'acc', ax: 'X' }, aY: { nm: 'Акселерометр Y', kind: 'acc', ax: 'Y' }, aZ: { nm: 'Акселерометр Z', kind: 'acc', ax: 'Z' },
    gX: { nm: 'Гироскоп X', kind: 'gyro', ax: 'X' }, gY: { nm: 'Гироскоп Y', kind: 'gyro', ax: 'Y' }, gZ: { nm: 'Гироскоп Z', kind: 'gyro', ax: 'Z' },
    hf: { nm: 'ВЧ-канал (±100g)', kind: 'hf', ax: '↯' }
  };
  QTY = { acc: [{ k: 'acc', l: 'Ускорение', u: 'м/с²' }, { k: 'vel', l: 'Скорость', u: 'мм/с' }, { k: 'disp', l: 'Перемещение', u: 'мкм' }], gyro: [{ k: 'avel', l: 'Угл. скорость', u: '°/с' }, { k: 'aacc', l: 'Угл. ускорение', u: '°/с²' }], hf: [{ k: 'acc', l: 'Ускорение', u: 'g' }] };
  QLABEL = { acc: 'ускорение', vel: 'виброскорость', disp: 'перемещение', avel: 'угл. скорость', aacc: 'угл. ускорение' };
  WINS = ['Хеннинга', 'Хэмминга', 'Прямоуг.', 'Флэттоп'];
  ODRS = [{ v: 4000, band: '~1,5 кГц' }, { v: 8000, band: '~3 кГц' }];
  ACC_FS = ['±2g', '±4g', '±8g', '±16g']; GYRO_FS = ['±250 °/с', '±500 °/с', '±1000 °/с', '±2000 °/с'];
  DF_OPT = [1, 0.5, 0.3, 0.1];
  BAND_OPT = [[2, 1000], [2, 2000], [10, 5000], [10, 10000]];
  DUR_OPT = [0.5, 1, 2, 5];
  BLE_KBPS = 40;

  init() {
    this.AGG = pj(localStorage.getItem('nova_agg'), null); if (!this.AGG || !this.AGG.units || !this.AGG.units.length) this.AGG = FALL_AGG;
    this.aggOrient = this.AGG.orient === 'v' ? 'v' : 'h';
    this.view = 'list'; this.curPt = 0; this.defOpen = false; this.budOpen = false; this._extra = null; this.editM = null;
    // восстановление ранее сохранённой программы (новая форма) или посев из структуры
    this.editId = null; var eid = localStorage.getItem('nova_editId');
    if (eid != null && eid !== '' && !isNaN(+eid)) this.editId = +eid;
    var loaded = null;
    if (this.editId != null) { var it = getList()[this.editId]; if (it) loaded = pj(it.program, null); }
    if (!loaded) loaded = pj(localStorage.getItem('nova_program'), null);
    // датчик вибрации: из программы (оверрайд) или глобальное умолчание оператора
    var sid = (loaded && loaded.sensor && NovaSensors.CATALOG[loaded.sensor]) ? loaded.sensor : NovaSensors.current();
    this.phaseRef = (loaded && typeof loaded.phaseRef === 'boolean') ? loaded.phaseRef : NovaSensors.tacho();
    this.applySensor(sid, true);            // задаёт SENSOR, ODRS/FS/BAND, def по умолчанию датчика
    if (loaded && loaded.def) Object.assign(this.def, loaded.def);
    if (loaded && loaded.points && loaded.points[0] && loaded.points[0].channels) this.points = loaded.points;
    else this.points = this.seedPoints();
    this.root = document.getElementById('nms-root');
    this.applyTheme(); this.bindOnce(); this.render();
    if (window.matchMedia) { this._mq = matchMedia('(prefers-color-scheme: dark)'); this._mq.addEventListener ? this._mq.addEventListener('change', () => { this.applyTheme(); this.render(); }) : this._mq.addListener(() => { this.applyTheme(); this.render(); }); }
  }
  applySensor(id, reseedDef) {
    this.sensorId = id; this.SENSOR = NovaSensors.get(id);
    this.hasHf = this.SENSOR.hasHf; this.hasGyro = this.SENSOR.hasGyro;
    this.ODRS = this.SENSOR.odrs; this.ACC_FS = this.SENSOR.accFs; this.GYRO_FS = this.SENSOR.gyroFs; this.BAND_OPT = this.SENSOR.bandOpt;
    if (reseedDef || !this.def) this.def = Object.assign({ detail: false }, this.SENSOR.def);
  }
  defOnFor(ck, radial) { const kind = this.CH[ck].kind; if (kind === 'hf') return true; if (kind === 'gyro') return !!radial; return radial ? true : (ck === 'aZ'); }
  applyTheme() { var t = (window.matchMedia && matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light'; this.theme = t; if (this.root) this.root.setAttribute('data-theme', t); }
  q(s) { return this.root.querySelector(s); }
  dirNames() { return this.aggOrient === 'v' ? ['R1', 'R2', 'О'] : ['В', 'П', 'О']; }
  machName(u) { var m = (u.machines || [])[0]; return (m && MT_NAME[m.type]) ? MT_NAME[m.type] : (u.name || 'Узел'); }

  _uid() { return 'p' + (this._pc = (this._pc || 0) + 1); }
  mkPoint(sup, mach, name, radial) {
    const chans = [];
    this.SENSOR.chans.forEach(ck => { const on = this.defOnFor(ck, radial); chans.push({ ch: ck, on, meas: on ? this.defMeas(ck) : [] }); });
    return { id: this._uid(), sup, mach, name, radial, fs: { accFs: this.def.accFs, gyroFs: this.hasGyro ? this.def.gyroFs : null }, odr: this.def.odr, df: this.def.df, avg: this.def.avg, detail: false, channels: chans };
  }
  seedPoints() {
    var pts = [], supNo = 0, self = this;
    (this.AGG.units || []).forEach(function (u) { var mach = self.machName(u);
      (u.supports || []).forEach(function () { supNo++; self.dirNames().forEach(function (nm, di) { pts.push(self.mkPoint(supNo, mach, nm, di === 0)); }); });
    });
    if (!pts.length) pts.push(this.mkPoint(1, 'Узел', this.dirNames()[0], true));
    return pts;
  }
  defMeas(ck) {
    const kind = this.CH[ck].kind;
    if (kind === 'gyro') return [{ type: 'spectrum', qty: 'avel', f0: 2, f1: 1000, df: 0.3, win: 'Хеннинга', avg: 2 }];
    if (kind === 'hf') return [{ type: 'spectrum', qty: 'acc', f0: 10, f1: 10000, df: 1, win: 'Хеннинга', avg: 2 }];
    // канал ускорения
    if (this.sensorId === 'v0') {
      const m = [{ type: 'spectrum', qty: 'vel', f0: 2, f1: 1000, df: 0.3, win: 'Хеннинга', avg: 2 },
                 { type: 'spectrum', qty: 'acc', f0: 2, f1: 1000, df: 0.5, win: 'Хеннинга', avg: 2 }];
      if (this.phaseRef) m.push({ type: 'phase', qty: 'vel', ord: 1, avg: 4 });   // балансировка: амплитуда+фаза 1×
      return m;
    }
    const m = [{ type: 'spectrum', qty: 'vel', f0: 2, f1: 1000, df: 0.3, win: 'Хеннинга', avg: 2 }];
    if (!this.hasHf) m.push({ type: 'spectrum', qty: 'acc', f0: 2, f1: 2000, df: 0.5, win: 'Хеннинга', avg: 2 });
    return m;
  }
  supGroups() { const g = []; this.points.forEach((p, i) => { let s = g.find(x => x.sup === p.sup); if (!s) { s = { sup: p.sup, mach: p.mach, idx: [] }; g.push(s); } s.idx.push(i); }); return g; }

  ptBytes(p) { let samples = 0; p.channels.forEach(c => { if (!c.on) return; c.meas.forEach(m => { if (m.type === 'spectrum') samples += (p.odr / m.df) * (m.avg || 1); else if (m.type === 'phase') samples += 512 * (m.avg || 1); else samples += (m.dur || 1) * p.odr; }); }); return samples * 2; }
  budget() { let bytes = 0, maxBand = 0, chans = 0; this.points.forEach(p => { bytes += this.ptBytes(p); p.channels.forEach(c => { if (c.on) { chans++; maxBand = Math.max(maxBand, c.ch === 'hf' ? 10000 : (p.odr / 2.56)); } }); }); const kb = bytes / 1024; return { bytes, kb, chans, band: maxBand, secs: kb / this.BLE_KBPS }; }
  fmtSize(kb) { return kb >= 1024 ? (kb / 1024).toFixed(1) + ' МБ' : Math.round(kb) + ' КБ'; }
  fmtTime(s) { if (s >= 60) return Math.floor(s / 60) + ' мин ' + Math.round(s % 60) + ' с'; return Math.round(s) + ' с'; }
  fmtBand(hz) { return hz >= 1000 ? (hz / 1000).toFixed(hz % 1000 ? 1 : 0).replace('.0', '') + ' кГц' : Math.round(hz) + ' Гц'; }

  chanOnCount(p) { return p.channels.filter(c => c.on).length; }
  ptMeasTags(p) { const set = [], seen = {}; p.channels.forEach(c => { if (!c.on) return; c.meas.forEach(m => { const key = m.type + m.qty; if (seen[key]) return; seen[key] = 1; set.push(m); }); }); return set; }
  measTitle(m) { if (m.type === 'signal') return 'Осц. ' + (this.QLABEL[m.qty] || m.qty); if (m.type === 'phase') return 'Ампл-фаза ' + (m.ord || 1) + '×'; return 'Спектр ' + (this.QLABEL[m.qty] || m.qty); }
  measSub(m) { if (m.type === 'signal') return m.dur + ' с · ' + this.qtyUnit(m); if (m.type === 'phase') return 'опорная метка · ' + (this.QLABEL[m.qty] || m.qty) + ' · ' + (m.avg || 1) + '× усредн.'; return m.f0 + '–' + m.f1 + ' Гц · Δf ' + m.df + ' · ' + (m.avg || 1) + '× · ' + m.win; }
  qtyUnit(m) { const kind = (m.qty === 'avel' || m.qty === 'aacc') ? 'gyro' : 'acc'; const arr = this.QTY[kind] || this.QTY.acc; const f = arr.find(x => x.k === m.qty); return f ? f.u : ''; }
  tagClass(m) { if (m.type === 'signal') return 'sig'; if (m.type === 'phase') return 'phase'; if (m.qty === 'vel') return 'vel'; return 'acc'; }

  render() { if (this.view === 'point') return this.renderPoint(); this.renderList(); }

  chrome(bodyHtml, footHtml) {
    const p = this.points[this.curPt];
    return '<div class="nms-hd">'
      + '<div class="nms-ic" data-act="' + (this.view === 'point' ? 'toList' : 'back') + '">‹</div>'
      + '<div style="flex:1"><div class="nms-ttl">' + (this.view === 'point' ? (p.mach + ' · оп. ' + p.sup + ' · ' + p.name) : 'Настройки измерений') + '</div><div class="nms-sttl">' + (this.view === 'point' ? 'точка установки · направление Z⊥' : 'опоры · точки · каналы · измерения') + '</div></div>'
      + (this.view === 'point' ? '<div class="nms-ic" data-act="renamePt" style="font-size:16px">✎</div>' : '')
      + '</div>'
      + '<div class="nms-body">' + bodyHtml + '</div>'
      + footHtml
      + '<div class="nms-backdrop" id="nms-backdrop" data-act="closeSheet"></div>'
      + '<div class="nms-sheet" id="nms-sheet"><div class="nms-grab"></div><div id="nms-sbody"></div></div>';
  }

  footer() {
    const b = this.budget(), cap = 4096, pct = Math.min(1, b.kb / cap);
    const col = pct < 0.66 ? 'var(--ok)' : (pct < 0.9 ? 'var(--warn)' : 'var(--danger)');
    return '<div class="nms-foot">'
      + '<div class="nms-bud" data-act="toggleBud">'
      + '<div class="col"><span class="bl">Объём</span><span class="bv">' + this.fmtSize(b.kb) + '</span></div>'
      + '<div class="col"><span class="bl">Выгрузка</span><span class="bv">' + this.fmtTime(b.secs) + '</span></div>'
      + '<div class="bar"><i style="width:' + (pct * 100).toFixed(0) + '%;background:' + col + '"></i></div>'
      + '<span class="chev">' + (this.budOpen ? '⌄' : '›') + '</span></div>'
      + '<div class="nms-budx ' + (this.budOpen ? 'open' : '') + '">Сырьё пишется в PSRAM датчика и выгружается пачкой по BLE (~' + this.BLE_KBPS + ' КБ/с). Сейчас активно ' + b.chans + ' каналов, макс. полоса ' + this.fmtBand(b.band) + '. Ориентир комфортной выгрузки — до ' + this.fmtSize(cap) + '.</div>'
      + '<button class="nms-next" data-act="next">Далее → Критерии состояния</button>'
      + '</div>';
  }

  renderList() {
    let pts = '';
    this.supGroups().forEach(g => {
      let rows = '';
      g.idx.forEach(i => {
        const p = this.points[i];
        const tags = this.ptMeasTags(p).map(m => '<span class="nms-tag ' + this.tagClass(m) + '">' + this.measTitle(m) + '</span>').join('');
        rows += '<div class="nms-pt" data-act="openPt" data-i="' + i + '">'
          + '<div class="nms-pt-hd">'
          + '<div class="nms-pt-dir ' + (p.radial ? 'vert' : '') + '">' + p.name + '</div>'
          + '<div style="flex:1"><div class="nms-pt-nm">Точка ' + p.name + '</div><div class="nms-pt-sub">' + this.chanOnCount(p) + ' кан. · ' + this.fmtSize(this.ptBytes(p) / 1024) + '</div></div>'
          + '<div class="nms-pt-ch" style="align-self:flex-start">›</div>'
          + '</div>'
          + '<div class="nms-pt-meas">' + tags + '</div></div>';
      });
      const addBtn = g.idx.length < 3 ? '<button class="nms-addm" data-act="addPt" data-sup="' + g.sup + '" style="margin-top:2px">＋ Точка на опоре</button>' : '';
      pts += '<div class="nms-supgrp"><div class="nms-suphd"><span class="s">Опора ' + g.sup + '</span><span class="m">' + g.mach + '</span></div>' + rows + addBtn + '</div>';
    });
    const d = this.def;
    const body =
      '<div class="nms-step">Шаг 3 из 5</div><div class="nms-stepbar"><span class="done"></span><span class="done"></span><span class="on"></span><span></span><span></span></div>'
      + this.sensorBlock()
      + '<div class="nms-def" style="margin-top:14px">'
      + '<div class="nms-defhd" data-act="toggleDef"><div class="t">⚙ Профиль по умолчанию</div><div class="c">' + d.odr / 1000 + ' кГц · Δf ' + d.df + ' · ' + d.accFs + (this.hasGyro ? ' / ' + d.gyroFs : '') + ' ' + (this.defOpen ? '⌄' : '›') + '</div></div>'
      + '<div class="nms-defbody ' + (this.defOpen ? 'open' : '') + '">' + this.defBodyHtml() + '</div></div>'
      + '<div class="nms-actions"><button data-act="applyAll">⇊ Применить ко всем</button><button data-act="profiles">☰ Профили</button></div>'
      + '<div class="nms-plabel">Опоры и точки · из структуры агрегата</div>'
      + pts;
    this.root.innerHTML = this.chrome(body, this.footer());
  }

  sensorBlock() {
    const cur = this.SENSOR;
    const segs = NovaSensors.list().map(s => '<button class="' + (s.id === this.sensorId ? 'on' : '') + '" data-act="setSensor" data-v="' + s.id + '">' + s.short + '</button>').join('');
    return '<div class="nms-plabel" style="margin-top:2px">Датчик вибрации</div>'
      + '<div class="nms-seg nms-sseg">' + segs + '</div>'
      + '<div class="nms-shint">' + cur.desc + '</div>'
      + '<div class="nms-row2" style="margin:8px 2px 0"><span class="k">Фазовая привязка (тахометр)</span><div class="nms-toggle ' + (this.phaseRef ? 'on' : '') + '" data-act="togglePhase"><div class="k"></div></div></div>'
      + (this.phaseRef ? '<div class="nms-shint">Опорная метка тахометра: 1× амплитуда-фаза + порядковый анализ. Обороты в замере — по тахо.</div>' : '');
  }
  defBodyHtml() {
    const d = this.def;
    return ''
      + '<div class="nms-sec">Частота дискретизации (ODR)</div>'
      + '<div class="nms-seg">' + this.ODRS.map(o => '<button class="' + (o.v === d.odr ? 'on' : '') + '" data-act="defOdr" data-v="' + o.v + '">' + (o.v / 1000) + ' кГц · ' + o.band + '</button>').join('') + '</div>'
      + '<div class="nms-row2"><span class="k">Разрешение Δf</span>' + this.segChips('defDf', this.DF_OPT, d.df, x => x + ' Гц') + '</div>'
      + '<div class="nms-row2"><span class="k">Усреднений</span>' + this.stepInline('defAvg', d.avg) + '</div>'
      + '<div class="nms-row2"><span class="k">Детально (Δf 0,1 Гц)</span><div class="nms-toggle ' + (d.detail ? 'on' : '') + '" data-act="defDetail"><div class="k"></div></div></div>'
      + '<div class="nms-sec">Диапазон измерения (на блок осей)</div>'
      + '<div class="nms-row2"><span class="k">Акселерометр</span>' + this.segChips('defAccFs', this.ACC_FS, d.accFs) + '</div>'
      + (this.hasGyro ? '<div class="nms-row2"><span class="k">Гироскоп</span>' + this.segChips('defGyroFs', this.GYRO_FS, d.gyroFs) + '</div>' : '');
  }
  segChips(act, opts, cur, fmt) { return '<div class="nms-presets">' + opts.map(o => '<button class="nms-chip ' + (String(o) === String(cur) ? 'on' : '') + '" data-act="' + act + '" data-v="' + o + '">' + (fmt ? fmt(o) : o) + '</button>').join('') + '</div>'; }
  stepInline(act, val) { return '<div class="nms-step2b" style="width:120px"><button class="nms-stepbtn" data-act="' + act + '" data-d="-1">−</button><span class="nms-stepval">' + val + '</span><button class="nms-stepbtn" data-act="' + act + '" data-d="1">＋</button></div>'; }

  renderPoint() {
    const p = this.points[this.curPt];
    let chans = '';
    p.channels.forEach((c, ci) => {
      if (this.SENSOR.chans.indexOf(c.ch) < 0) return;   // канал недоступен текущему датчику
      const meta = this.CH[c.ch];
      const col = meta.kind === 'gyro' ? 'var(--warn)' : (meta.kind === 'hf' ? 'var(--danger)' : 'var(--info)');
      const bg = meta.kind === 'gyro' ? 'rgba(200,137,26,.12)' : (meta.kind === 'hf' ? 'rgba(198,72,58,.12)' : 'var(--info-bg)');
      let meas = '';
      if (c.on) {
        c.meas.forEach((m, mi) => {
          meas += '<div class="nms-mcard" data-act="editMeas" data-ci="' + ci + '" data-mi="' + mi + '">'
            + '<div class="mi nms-tag ' + this.tagClass(m) + '">' + (m.type === 'signal' ? '∿' : (m.type === 'phase' ? '∠' : '⊹')) + '</div>'
            + '<div style="flex:1"><div class="mn">' + this.measTitle(m) + '</div><div class="md">' + this.measSub(m) + '</div></div>'
            + '<div class="mx" data-act="delMeas" data-ci="' + ci + '" data-mi="' + mi + '">×</div></div>';
        });
        meas += '<button class="nms-addm" data-act="addMeas" data-ci="' + ci + '">＋ Добавить измерение</button>';
      }
      chans += '<div class="nms-chan ' + (c.on ? '' : 'off') + '">'
        + '<div class="nms-chan-hd"><div class="nms-chan-ax" style="background:' + bg + ';color:' + col + '">' + meta.ax + '</div>'
        + '<div style="flex:1"><div class="nms-chan-nm">' + meta.nm + '</div><div class="nms-chan-t">' + (c.on ? c.meas.length + ' измерен.' : 'выключен') + '</div></div>'
        + '<div class="nms-toggle ' + (c.on ? 'on' : '') + '" data-act="chanToggle" data-ci="' + ci + '"><div class="k"></div></div></div>'
        + (c.on ? '<div class="nms-meas">' + meas + '</div>' : '')
        + '</div>';
    });
    const body =
      '<div class="nms-fs">'
      + '<div class="nms-sec" style="margin-top:0">Частота и диапазон точки</div>'
      + '<div class="nms-row2"><span class="k">ODR</span>' + this.segChips('ptOdr', this.ODRS.map(o => o.v), p.odr, v => (v / 1000) + ' кГц') + '</div>'
      + '<div class="nms-row2"><span class="k">Разрешение Δf</span>' + this.segChips('ptDf', this.DF_OPT, p.df, x => x + ' Гц') + '</div>'
      + '<div class="nms-row2"><span class="k">Усреднений</span>' + this.stepInline('ptAvg', p.avg) + '</div>'
      + '<div class="nms-row2"><span class="k">Акс. диапазон</span>' + this.segChips('ptAccFs', this.ACC_FS, p.fs.accFs) + '</div>'
      + (this.hasGyro ? '<div class="nms-row2"><span class="k">Гиро диапазон</span>' + this.segChips('ptGyroFs', this.GYRO_FS, p.fs.gyroFs) + '</div>' : '')
      + '</div>'
      + '<div class="nms-actions"><button data-act="copyPt">⧉ Копировать на точки…</button><button data-act="delPt" style="flex:0 0 auto;color:var(--danger);border-color:var(--border)">🗑 Удалить точку</button></div>'
      + '<div class="nms-plabel">Каналы датчика · ' + this.chanOnCount(p) + ' активно</div>'
      + chans;
    this.root.innerHTML = this.chrome(body, this.footer());
  }

  handle(a, t) {
    const ci = +t.getAttribute('data-ci'), mi = +t.getAttribute('data-mi'), i = +t.getAttribute('data-i'), v = t.getAttribute('data-v'), d = +t.getAttribute('data-d');
    const p = this.points[this.curPt];
    const M = {
      back: () => { location.href = 'defects.html'; },
      toList: () => { this.view = 'list'; this.render(); },
      next: () => this.saveNext(),
      toggleDef: () => { this.defOpen = !this.defOpen; this.render(); },
      toggleBud: () => { this.budOpen = !this.budOpen; this.render(); },
      openPt: () => { this.curPt = i; this.view = 'point'; this.render(); },
      addPt: () => this.addPoint(+t.getAttribute('data-sup')),
      delPt: () => this.delPoint(),
      renamePt: () => this.renamePoint(),
      applyAll: () => this.applyAll(), profiles: () => this.openProfiles(), copyPt: () => this.openCopy(),
      setSensor: () => this.pickSensor(v), togglePhase: () => this.togglePhase(),
      defOdr: () => { this.def.odr = +v; this.render(); }, defDf: () => { this.def.df = +v; this.render(); },
      defAvg: () => { this.def.avg = Math.max(1, Math.min(16, this.def.avg + d)); this.render(); },
      defDetail: () => { this.def.detail = !this.def.detail; if (this.def.detail) this.def.df = 0.1; this.render(); },
      defAccFs: () => { this.def.accFs = v; this.render(); }, defGyroFs: () => { this.def.gyroFs = v; this.render(); },
      ptOdr: () => { p.odr = +v; this.render(); }, ptDf: () => { p.df = +v; this.render(); },
      ptAvg: () => { p.avg = Math.max(1, Math.min(16, p.avg + d)); this.render(); },
      ptAccFs: () => { p.fs.accFs = v; this.render(); }, ptGyroFs: () => { p.fs.gyroFs = v; this.render(); },
      chanToggle: () => { const c = p.channels[ci]; c.on = !c.on; if (c.on && !c.meas.length) c.meas = this.defMeas(c.ch); this.render(); },
      addMeas: () => this.openAddMeas(ci),
      editMeas: () => this.openEditMeas(ci, mi),
      delMeas: () => { p.channels[ci].meas.splice(mi, 1); this.render(); },
      closeSheet: () => this.closeSheet()
    };
    if (M[a]) M[a]();
  }

  bindOnce() {
    if (this._bound) return; this._bound = true;
    this.root.addEventListener('click', (e) => {
      const t = e.target.closest('[data-act]'); if (!t || !this.root.contains(t)) return;
      const a = t.getAttribute('data-act');
      if (this._extra && this._extra[a]) { this._extra[a](t); return; }
      this.handle(a, t);
    });
  }

  /* сохранить программу (новая форма) в nova_list[i].program → перейти на критерии */
  saveNext() {
    const list = getList();
    const prog = { sensor: this.sensorId, phaseRef: this.phaseRef, def: this.def, points: this.points };
    const entry = { name: (this.AGG.name || 'Агрегат'), agg: localStorage.getItem('nova_agg') || JSON.stringify(this.AGG), defects: localStorage.getItem('nova_defects') || '[]', program: JSON.stringify(prog) };
    let idx = -1; const eid = localStorage.getItem('nova_editId'); if (eid != null && eid !== '' && !isNaN(+eid) && list[+eid]) idx = +eid;
    if (idx >= 0) { if (list[idx] && list[idx].criteria) entry.criteria = list[idx].criteria; list[idx] = entry; } else { list.push(entry); idx = list.length - 1; }
    try { localStorage.setItem('nova_list', JSON.stringify(list)); localStorage.setItem('nova_program', JSON.stringify(prog)); localStorage.removeItem('nova_editId'); } catch (e) {}
    location.href = 'criteria.html?id=' + idx;
  }

  openSheet(html) { this.q('#nms-sbody').innerHTML = html; this.q('#nms-sheet').classList.add('on'); this.q('#nms-backdrop').classList.add('on'); }
  closeSheet() { this._extra = null; this.q('#nms-sheet').classList.remove('on'); this.q('#nms-backdrop').classList.remove('on'); this.render(); }

  addPoint(sup) {
    const grp = this.points.filter(p => p.sup === sup); if (grp.length >= 3) return;
    const mach = grp.length ? grp[0].mach : '';
    const used = grp.map(p => p.name); const free = this.dirNames().find(n => used.indexOf(n) < 0) || ('Т' + (grp.length + 1));
    const np = this.mkPoint(sup, mach, free, false);
    let last = -1; this.points.forEach((p, i) => { if (p.sup === sup) last = i; });
    this.points.splice(last + 1, 0, np);
    this.curPt = last + 1; this.view = 'point'; this.render();
    setTimeout(() => this.renamePoint(), 60);
  }
  delPoint() {
    const p = this.points[this.curPt];
    this.openSheet('<h3>Удалить точку ' + p.name + '?</h3><p class="sh-sub">' + p.mach + ' · опора ' + p.sup + '. Настройки каналов и измерений этой точки будут удалены.</p>'
      + '<div class="nms-opt on" data-act="doDelPt" style="border-color:var(--danger);background:rgba(198,72,58,.08)"><div class="oi">🗑</div><div><div class="on1">Удалить</div><div class="od">действие необратимо</div></div></div>'
      + '<button class="nms-sheetbtn" data-act="closeSheet" style="background:var(--surface2);color:var(--text)">Отмена</button>');
    this._extra = { doDelPt: () => { this.points.splice(this.curPt, 1); this.closeSheet(); this.view = 'list'; this.render(); } };
  }
  renamePoint() {
    const p = this.points[this.curPt];
    const chips = this.dirNames().concat(['Свой…']).map(n => '<button class="nms-chip ' + (n === p.name ? 'on' : '') + '" data-act="rnPick" data-v="' + n + '">' + n + '</button>').join('');
    this.openSheet('<h3>Имя точки</h3><p class="sh-sub">Направление установки датчика. Имена — как принято на предприятии.</p>'
      + '<div class="nms-fld"><label>Стандартные</label><div class="nms-presets">' + chips + '</div></div>'
      + '<div class="nms-fld"><label>Своё имя</label><input id="nms-rn" value="' + p.name + '" style="width:100%;height:42px;background:var(--surface2);border:1px solid var(--border);border-radius:11px;color:var(--text);font-size:15px;padding:0 13px;font-family:inherit"/></div>'
      + '<button class="nms-sheetbtn" data-act="rnSave">Сохранить</button>');
    this._extra = {
      rnPick: (t) => { const v = t.getAttribute('data-v'); const el = this.q('#nms-rn'); if (v === 'Свой…') { if (el) el.focus(); return; } if (el) el.value = v; },
      rnSave: () => { const el = this.q('#nms-rn'); const v = (el && el.value.trim()) || p.name; p.name = v; p.radial = (v === this.dirNames()[0]); this.closeSheet(); this.render(); }
    };
  }
  applyAll() {
    this.openSheet('<h3>Применить профиль ко всем точкам?</h3><p class="sh-sub">ODR, Δf, усреднения и диапазоны из «Профиля по умолчанию» будут записаны во все ' + this.points.length + ' точек. Наборы измерений на каналах сохранятся.</p>'
      + '<div class="nms-opt on" data-act="doApplyAll"><div class="oi">⇊</div><div><div class="on1">Да, применить</div><div class="od">перезапишет частоту и диапазоны точек</div></div></div>'
      + '<button class="nms-sheetbtn" data-act="closeSheet" style="background:var(--surface2);color:var(--text)">Отмена</button>');
    this._extra = { doApplyAll: () => { this.points.forEach(p => { p.odr = this.def.odr; p.df = this.def.df; p.avg = this.def.avg; p.fs = { accFs: this.def.accFs, gyroFs: this.def.gyroFs }; }); this.closeSheet(); this.render(); } };
  }
  pickSensor(id) {
    if (!NovaSensors.CATALOG[id] || id === this.sensorId) return;
    const s = NovaSensors.get(id);
    this.openSheet('<h3>Сменить датчик на ' + s.short + '?</h3><p class="sh-sub">' + s.desc + '. Каналы и измерения всех точек пересоберутся под возможности датчика: недоступные каналы удалятся, новые получат измерения по умолчанию.</p>'
      + '<div class="nms-opt on" data-act="doSetSensor" data-v="' + id + '"><div class="oi">⇄</div><div><div class="on1">Пересобрать под ' + s.short + '</div><div class="od">частоты и диапазоны точек приведутся к датчику</div></div></div>'
      + '<button class="nms-sheetbtn" data-act="closeSheet" style="background:var(--surface2);color:var(--text)">Отмена</button>');
    this._extra = { doSetSensor: (t) => { this.applySensor(t.getAttribute('data-v'), true); this.retargetPoints(); this.closeSheet(); this.view = 'list'; this.render(); } };
  }
  togglePhase() { this.phaseRef = !this.phaseRef; this.retargetPhase(); this.render(); }
  retargetPhase() {
    this.points.forEach(p => { p.channels.forEach(c => {
      if (this.CH[c.ch].kind !== 'acc') return;
      const has = c.meas.some(m => m.type === 'phase');
      if (this.phaseRef && this.sensorId === 'v0' && c.on && !has) c.meas.push({ type: 'phase', qty: 'vel', ord: 1, avg: 4 });
      if (!this.phaseRef && has) c.meas = c.meas.filter(m => m.type !== 'phase');
    }); });
  }
  retargetPoints() {
    this.points.forEach(p => {
      const old = {}; (p.channels || []).forEach(c => old[c.ch] = c);
      const chans = [];
      this.SENSOR.chans.forEach(ck => {
        // сохраняем вкл/выкл канала, но измерения пересобираем под дефолты нового датчика
        const on = old[ck] ? !!old[ck].on : this.defOnFor(ck, p.radial);
        chans.push({ ch: ck, on, meas: on ? this.defMeas(ck) : [] });
      });
      p.channels = chans;
      if (this.ODRS.map(o => o.v).indexOf(p.odr) < 0) p.odr = this.def.odr;
      if (this.ACC_FS.indexOf(p.fs.accFs) < 0) p.fs.accFs = this.def.accFs;
      if (!this.hasGyro) p.fs.gyroFs = null; else if (this.GYRO_FS.indexOf(p.fs.gyroFs) < 0) p.fs.gyroFs = this.def.gyroFs;
    });
    this.retargetPhase();
  }
  openProfiles() {
    const profs = [
      { nm: 'Базовый мониторинг', d: 'ODR 4 кГц · Δf 0,3 · ±16g' },
      { nm: 'Детальный (муфта/подшипник)', d: 'ODR 8 кГц · Δf 0,1 · ±8g' },
      { nm: 'ВЧ подшипник', d: 'ВЧ до 10 кГц · Δf 1 · ±16g' }
    ];
    this.openSheet('<h3>Профили измерений</h3><p class="sh-sub">Готовый набор частот и диапазонов. Применяется к профилю по умолчанию, затем можно править.</p>'
      + profs.map((pr, k) => '<div class="nms-opt" data-act="pickProfile" data-v="' + k + '"><div class="oi">☰</div><div><div class="on1">' + pr.nm + '</div><div class="od">' + pr.d + '</div></div></div>').join('')
      + '<button class="nms-sheetbtn" data-act="closeSheet" style="background:var(--surface2);color:var(--text);margin-top:10px">Закрыть</button>');
    this._extra = { pickProfile: (t) => { const k = +t.getAttribute('data-v'); const P = [{ odr: 4000, df: 0.3, accFs: '±16g', gyroFs: '±250 °/с' }, { odr: 8000, df: 0.1, accFs: '±8g', gyroFs: '±250 °/с' }, { odr: 4000, df: 1, accFs: '±16g', gyroFs: '±250 °/с' }][k]; Object.assign(this.def, P); this.defOpen = true; this.closeSheet(); this.render(); } };
  }
  openCopy() {
    const rows = this.points.map((p, i) => i === this.curPt ? '' : '<div class="nms-ckrow" data-act="tgtToggle" data-i="' + i + '"><div class="nms-ck" data-i="' + i + '"></div><div class="cn">Оп. ' + p.sup + ' · точка ' + p.name + '</div><div style="margin-left:auto;font-size:11px;color:var(--hint)">' + p.mach + '</div></div>').join('');
    this._copyTgt = {};
    const cur = this.points[this.curPt];
    this.openSheet('<h3>Копировать настройку точки</h3><p class="sh-sub">С «оп. ' + cur.sup + ' · точка ' + cur.name + '» на выбранные — каналы, измерения, частоты и диапазоны.</p>'
      + '<div class="nms-cklist">' + rows + '</div>'
      + '<button class="nms-sheetbtn" data-act="doCopy">Копировать</button>');
    this._extra = {
      tgtToggle: (t) => { const i = +t.getAttribute('data-i'); this._copyTgt[i] = !this._copyTgt[i]; const ck = this.q('.nms-ck[data-i="' + i + '"]'); ck.classList.toggle('on', this._copyTgt[i]); ck.textContent = this._copyTgt[i] ? '✓' : ''; },
      doCopy: () => { const src = this.points[this.curPt]; Object.keys(this._copyTgt).forEach(i => { if (!this._copyTgt[i]) return; const dst = this.points[+i]; const cp = JSON.parse(JSON.stringify(src)); dst.odr = cp.odr; dst.df = cp.df; dst.avg = cp.avg; dst.fs = cp.fs; dst.channels = cp.channels; }); this.closeSheet(); this.render(); }
    };
  }
  openAddMeas(ci) {
    const chKind = this.CH[this.points[this.curPt].channels[ci].ch].kind;
    const phaseOpt = (this.phaseRef && chKind === 'acc') ? '<div class="nms-opt" data-act="addType" data-v="phase" data-ci="' + ci + '"><div class="oi">∠</div><div><div class="on1">Амплитуда-фаза</div><div class="od">порядок 1× · опорная метка тахо</div></div></div>' : '';
    this.openSheet('<h3>Новое измерение</h3><p class="sh-sub">' + this.CH[this.points[this.curPt].channels[ci].ch].nm + '</p>'
      + '<div class="nms-opt" data-act="addType" data-v="spectrum" data-ci="' + ci + '"><div class="oi">⊹</div><div><div class="on1">Спектр</div><div class="od">величина · диапазон · Δf · усреднения · окно</div></div></div>'
      + '<div class="nms-opt" data-act="addType" data-v="signal" data-ci="' + ci + '"><div class="oi">∿</div><div><div class="on1">Сигнал / осциллограмма</div><div class="od">длительность · величина</div></div></div>'
      + phaseOpt);
    this._extra = { addType: (t) => { const type = t.getAttribute('data-v'); const cci = +t.getAttribute('data-ci'); const ch = this.points[this.curPt].channels[cci]; const kind = this.CH[ch.ch].kind; const q0 = (this.QTY[kind] || this.QTY.acc)[kind === 'acc' ? 1 : 0].k; const m = type === 'spectrum' ? { type: 'spectrum', qty: q0, f0: 2, f1: 1000, df: this.points[this.curPt].df, win: 'Хеннинга', avg: this.points[this.curPt].avg } : (type === 'phase' ? { type: 'phase', qty: 'vel', ord: 1, avg: 4 } : { type: 'signal', qty: q0, dur: 1 }); ch.meas.push(m); this.closeSheet(); this.render(); setTimeout(() => this.openEditMeas(cci, ch.meas.length - 1), 60); } };
  }
  openEditMeas(ci, mi) { this.editM = { ci, mi }; this.buildEditMeas(); this.q('#nms-sheet').classList.add('on'); this.q('#nms-backdrop').classList.add('on'); }
  buildEditMeas() {
    const p = this.points[this.curPt], ch = p.channels[this.editM.ci], m = ch.meas[this.editM.mi], kind = this.CH[ch.ch].kind;
    const qtys = this.QTY[kind] || this.QTY.acc;
    const title = m.type === 'signal' ? 'Осциллограмма' : (m.type === 'phase' ? 'Амплитуда-фаза' : 'Спектр');
    let h = '<h3>' + title + '</h3><p class="sh-sub">' + this.CH[ch.ch].nm + '</p>';
    h += '<div class="nms-fld"><label>Величина</label>' + this.segChips('mQty', qtys.map(x => x.k), m.qty, k => qtys.find(x => x.k === k).l) + '</div>';
    if (m.type === 'spectrum') {
      h += '<div class="nms-fld"><label>Диапазон частот, Гц</label>' + this.segChips('mBand', this.BAND_OPT.map(b => b.join('–')), m.f0 + '–' + m.f1) + '</div>';
      h += '<div class="nms-fld"><label>Разрешение Δf</label>' + this.segChips('mDf', this.DF_OPT, m.df, x => x + ' Гц') + '</div>';
      h += '<div class="nms-fld"><label>Усреднений</label>' + this.stepInline('mAvg', m.avg || 1) + '</div>';
      h += '<div class="nms-fld"><label>Окно</label>' + this.segChips('mWin', this.WINS, m.win) + '</div>';
    } else if (m.type === 'phase') {
      h += '<div class="nms-fld"><label>Порядок (× оборотов)</label>' + this.segChips('mOrd', [1, 2, 3], m.ord || 1, x => x + '×') + '</div>';
      h += '<div class="nms-fld"><label>Усреднений</label>' + this.stepInline('mAvg', m.avg || 1) + '</div>';
      h += '<p class="sh-sub" style="margin-top:2px">Опорная метка тахометра обязательна. Амплитуда и фаза на выбранном порядке — для балансировки/центровки.</p>';
    } else {
      h += '<div class="nms-fld"><label>Длительность</label>' + this.segChips('mDur', this.DUR_OPT, m.dur, x => x + ' с') + '</div>';
    }
    h += '<button class="nms-sheetbtn" data-act="closeSheet">Готово</button>';
    this.q('#nms-sbody').innerHTML = h;
    this._extra = {
      mQty: (t) => { m.qty = t.getAttribute('data-v'); this.reflectMeas(); },
      mBand: (t) => { const parts = t.getAttribute('data-v').split('–').map(Number); m.f0 = parts[0]; m.f1 = parts[1]; this.reflectMeas(); },
      mDf: (t) => { m.df = +t.getAttribute('data-v'); this.reflectMeas(); },
      mAvg: (t) => { m.avg = Math.max(1, Math.min(16, (m.avg || 1) + (+t.getAttribute('data-d')))); this.reflectMeas(); },
      mOrd: (t) => { m.ord = +t.getAttribute('data-v'); this.reflectMeas(); },
      mWin: (t) => { m.win = t.getAttribute('data-v'); this.reflectMeas(); },
      mDur: (t) => { m.dur = +t.getAttribute('data-v'); this.reflectMeas(); }
    };
  }
  reflectMeas() { this.buildEditMeas(); this.q('#nms-sheet').classList.add('on'); this.q('#nms-backdrop').classList.add('on'); this.updBudFooter(); }
  updBudFooter() { const old = this.root.querySelector('.nms-foot'); if (!old) return; const tmp = document.createElement('div'); tmp.innerHTML = this.footer(); const fresh = tmp.firstElementChild; old.replaceWith(fresh); }
}

document.addEventListener('DOMContentLoaded', function () { new MeasSettings().init(); });
</script>
</body>
</html>
