<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Nova — сессия измерений</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.24.0/dist/tabler-icons.min.css">
<style>
  :root{ --bg:#141413; --primary:#1f1f1d; --secondary:#2a2a27; --text:#ececea; --muted:#b4b2a9; --hint:#86857e;
         --border:rgba(255,255,255,0.12); --border2:rgba(255,255,255,0.22); --info:#85b7eb; --info-bg:rgba(55,138,221,0.16); --info-bd:rgba(55,138,221,0.55);
         --success:#97c459; --warning:#ef9f27; --danger:#e24b4a; }
  *{box-sizing:border-box;}
  html,body{margin:0;background:var(--bg);}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;color:var(--text);display:flex;justify-content:center;min-height:100vh;}
  .screen{width:100%;max-width:480px;display:flex;flex-direction:column;min-height:100vh;}
  a{color:inherit;text-decoration:none;}
  .hd{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:0.5px solid var(--border);}
  .hd .ti{font-size:23px;color:var(--muted);}
  .ttl{font-size:16px;font-weight:500;}
  .sttl{font-size:12px;color:var(--hint);}
  .stbar{display:flex;flex-wrap:wrap;gap:7px;padding:11px 16px;border-bottom:0.5px solid var(--border);}
  .schip{font-size:11.5px;color:var(--muted);background:var(--secondary);border-radius:7px;padding:5px 9px;display:inline-flex;align-items:center;gap:5px;cursor:pointer;}
  .body{flex:1;padding:8px 12px;}
  .canvas{background:var(--primary);border:0.5px solid var(--border);border-radius:12px;overflow:auto;padding:10px 8px 4px;}
  .canvas svg{display:block;margin:0 auto;}
  .leg{display:flex;gap:12px;justify-content:center;padding:8px 0 2px;font-size:11px;color:var(--hint);}
  .leg span{display:inline-flex;align-items:center;gap:5px;}
  .ld{width:9px;height:9px;border-radius:50%;}
  .twrap{margin-top:10px;overflow-x:auto;}
  .tgrid{display:grid;gap:6px;min-width:100%;}
  .thead{font-size:11.5px;color:var(--hint);text-align:center;padding:2px 0;align-self:end;}
  .thead.hl{color:var(--info);}
  .trow{font-size:12.5px;color:var(--muted);display:flex;align-items:center;justify-content:center;}
  .cell{height:46px;background:var(--secondary);border:1px solid transparent;border-radius:9px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;min-width:56px;}
  .cell:active{transform:scale(0.97);}
  .cell.act{border-color:var(--info-bd);background:var(--info-bg);}
  .cell.dis{opacity:0.35;cursor:default;}
  .cell .v{font-size:14.5px;font-weight:600;line-height:1.1;}
  .cell .ti{font-size:18px;color:var(--hint);}
  .cell.act .ti{color:var(--info);}
  @keyframes sp{to{transform:rotate(360deg)}}
  .cell .spin{animation:sp .8s linear infinite;color:var(--info);}
  .panel{margin:10px 12px 0;background:var(--primary);border:1px solid var(--info-bd);border-radius:12px;padding:13px;}
  .panel.hidden{display:none;}
  .pname{font-size:15px;font-weight:500;}
  .pprog{font-size:12px;color:var(--hint);margin-top:4px;line-height:1.5;}
  .pprog .chg{color:var(--info);cursor:pointer;}
  .presult{display:flex;align-items:center;gap:9px;margin-top:9px;font-size:13px;}
  .zdot{width:11px;height:11px;border-radius:50%;flex:0 0 auto;}
  .pbtns{display:flex;gap:9px;margin-top:11px;}
  .pb{flex:1;height:44px;border-radius:10px;border:none;font-size:14px;font-weight:500;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;}
  .pb.go{background:#2f7d4f;color:#fff;}
  .pb.alt{background:transparent;border:0.5px solid var(--border2);color:var(--info);}
  .pb.mut{background:transparent;border:0.5px solid var(--border2);color:var(--muted);flex:0 0 auto;padding:0 16px;}
  .foot{padding:13px 16px;border-top:0.5px solid var(--border);}
  .fin{width:100%;height:50px;border-radius:12px;border:2px solid var(--info-bd);background:var(--info-bg);color:var(--info);font-size:16px;font-weight:500;font-family:inherit;cursor:pointer;}
</style>
</head>
<body>
<div class="screen">
  <div class="hd">
    <a href="javascript:void(0)" onclick="tryLeave()"><i class="ti ti-chevron-left"></i></a>
    <div style="flex:1;"><div class="ttl" id="aggName">Сессия</div><div class="sttl">Обход по программе · схема и таблица</div></div>
    <i class="ti ti-bolt" style="color:var(--info);"></i>
  </div>
  <div class="stbar" id="stbar"></div>
  <div class="body">
    <div class="canvas" id="canvas"></div>
    <div class="leg"><span><span class="ld" style="background:var(--secondary);border:1px solid var(--border2)"></span>не снято</span><span><span class="ld" style="background:var(--success)"></span>норма</span><span><span class="ld" style="background:var(--warning)"></span>повышено</span><span><span class="ld" style="background:var(--danger)"></span>недопустимо</span></div>
    <div class="twrap"><div class="tgrid" id="tgrid"></div></div>
  </div>
  <div class="panel hidden" id="panel"></div>
  <div class="foot"><button class="fin" onclick="finish()">Завершить сессию</button></div>
</div>

<div id="leave" style="position:fixed;inset:0;background:rgba(0,0,0,0.6);display:none;align-items:flex-end;justify-content:center;z-index:20;">
  <div style="background:var(--primary);border-top-left-radius:18px;border-top-right-radius:18px;width:100%;max-width:480px;padding:18px 16px 24px;border-top:0.5px solid var(--border)">
    <div style="font-size:15px;font-weight:500;margin-bottom:6px">Сессия не сохранена</div>
    <div style="font-size:13px;color:var(--hint);margin-bottom:16px">Есть незаписанные замеры. Завершите сессию, чтобы они попали в журнал.</div>
    <button onclick="finish()" style="width:100%;height:46px;border-radius:11px;border:none;background:#2f7d4f;color:#fff;font-size:15px;font-weight:500;font-family:inherit;margin-bottom:9px">Завершить и сохранить</button>
    <button onclick="leaveNoSave()" style="width:100%;height:44px;border-radius:11px;border:0.5px solid var(--border2);background:transparent;color:var(--danger);font-size:14px;font-family:inherit;margin-bottom:9px">Выйти без сохранения</button>
    <button onclick="closeLeave()" style="width:100%;height:44px;border-radius:11px;border:0.5px solid var(--border2);background:transparent;color:var(--text);font-size:14px;font-family:inherit">Остаться</button>
  </div>
</div>

<script src="nova-scheme.js"></script>
<script>
  function tryLeave(){ if(!Object.keys(sess).length){ location.href='measure.html'; return; } document.getElementById('leave').style.display='flex'; }
  function leaveNoSave(){ location.href='measure.html'; }
  function closeLeave(){ document.getElementById('leave').style.display='none'; }
</script>
<script>
  var ZC={g:'#97c459',y:'#ef9f27',r:'#e24b4a'}, ZN={g:'норма',y:'повышено',r:'недопустимо'};
  var MIDN={vel:'Скорость',acc:'Ускорение',disp:'Перемещение'};

  function qid(){ var m=location.search.match(/id=(\d+)/); return m?parseInt(m[1]):-1; }
  var list=[]; try{ list=JSON.parse(localStorage.getItem('nova_list'))||[]; }catch(e){}
  var it=list[qid()]||null, AGG=null, prog={points:[]};
  try{ AGG=(typeof it.agg==='string'?JSON.parse(it.agg):it.agg); }catch(e){}
  try{ prog=(typeof it.program==='string'?JSON.parse(it.program):it.program)||{points:[]}; }catch(e){}
  var units=(AGG&&AGG.units)||[], trans=(AGG&&AGG.trans)||[], orient=(AGG&&AGG.orient==='v')?'v':'h';
  document.getElementById('aggName').textContent=(it&&it.name)||'Сессия';
  var operator=localStorage.getItem('nova_operator')||'';
  var sess={};        // ключ pi_dir -> {zone,rms,data,q}
  var active=-1, measuring=-1;
  var UNIT={vel:{a:'мм/с',g:'°/с'},acc:{a:'м/с²',g:'°/с²'},disp:{a:'мкм',g:'°'}};
  function srcIdx(){ for(var i=0;i<units.length;i++) if((units[i].machines||[]).some(function(m){return m.type==='motor';})) return i; return 0; }
  var driveRpm=(units[srcIdx()]&&parseFloat(units[srcIdx()].rpm))||2940;
  var FR=driveRpm/60;
  function axisMap(dir){ var rads=orient==='v'?['R1','R2']:['В','П'], ax='О'; if(dir===ax) return {Z:ax,X:rads[0],Y:rads[1]}; var other=rads[0]===dir?rads[1]:rads[0]; return {Z:dir,X:ax,Y:other}; }
  function sc(q,s){ var b=q==='acc'?1.2:(q==='disp'?40:3.5); if(s==='g') b*=(q==='disp'?0.02:0.12); return b; }
  function cmps(q,s,kind,fmax){ var k=sc(q,s); fmax=fmax||1000;
    if(kind==='env'){ var bp=(7+Math.random())*FR; return [{n:'BPFO',f:bp,a:(0.5+Math.random()*0.6)*k},{n:'2·BPFO',f:2*bp,a:(0.25+Math.random()*0.35)*k}]; }
    var base=[{n:'0.5×',f:0.5*FR,a:(0.04+Math.random()*0.16)*k},{n:'1×',f:FR,a:(0.4+Math.random()*0.6)*k},{n:'2×',f:2*FR,a:(0.15+Math.random()*0.45)*k},{n:'3×',f:3*FR,a:(0.05+Math.random()*0.25)*k}];
    // ВЧ-канал ускорения (широкая полоса): резонанс корпуса + подшипниковые боковые до ~0,6·fmax
    if(q==='acc'&&fmax>3000){ var res=fmax*(0.42+Math.random()*0.12), bp2=(7+Math.random())*FR;
      base.push({n:'рез.',f:res,a:(0.8+Math.random()*0.7)*k});
      base.push({n:'рез+',f:res+bp2,a:(0.35+Math.random()*0.3)*k});
      base.push({n:'рез−',f:Math.max(res-bp2,4*FR),a:(0.35+Math.random()*0.3)*k});
      base.push({n:'2·рез',f:Math.min(res*1.65,fmax*0.92),a:(0.25+Math.random()*0.25)*k}); }
    return base; }
  function vals(q,s,fmax){ fmax=fmax||1000; var cm=cmps(q,s,'spec',fmax), ecm=cmps(q,s,'env',fmax), rms=Math.sqrt(cm.reduce(function(a,k){return a+0.5*k.a*k.a;},0)+0.02), peak=rms*1.414*(1.4+Math.random()*0.5);
    return {rms:rms,unit:UNIT[q][s],comps:cm,ecomps:ecm,peak:peak,pp:peak*1.9,fmax:fmax}; }
  var CHMAP={aX:{s:'a',ax:'X'},aY:{s:'a',ax:'Y'},aZ:{s:'a',ax:'Z'},gX:{s:'g',ax:'X'},gY:{s:'g',ax:'Y'},gZ:{s:'g',ax:'Z'},hf:{s:'a',ax:'Z'}};
  var QMID={vel:'vel',acc:'acc',disp:'disp',avel:'vel',aacc:'acc'};
  function genPoint(n){ var pt=n.pt||{}, amap=axisMap(n.dir||'В'), chans=[];
    (pt.channels||[]).forEach(function(c){ if(!c.on) return; var meta=CHMAP[c.ch]; if(!meta) return; var vv={};
      (c.meas||[]).forEach(function(m){ var q=QMID[m.qty]||'vel', fm=(m.type==='spectrum'&&m.f1)?parseFloat(m.f1):1000;
        if(!vv[q]||fm>(vv[q].fmax||0)) vv[q]=vals(q,meta.s,fm); });
      if(!Object.keys(vv).length) vv.vel=vals('vel',meta.s,1000);
      var any=vv.vel||vv[Object.keys(vv)[0]];
      // ВЧ-канал — отдельная дорожка во вьюере (иначе слипается с вибро aZ по ключу a_Z)
      chans.push({s:meta.s,ax:(c.ch==='hf'?'ВЧ':meta.ax),dir:amap[meta.ax]||meta.ax,vals:vv,amp1:any?any.comps[1].a:0,phase:Math.random()*360}); });
    if(!chans.length) chans=[{s:'a',ax:'Z',dir:amap.Z,vals:{vel:vals('vel','a')},amp1:0,phase:0}];
    return {channels:chans}; }
  function viewerChannels(channels,q){ return channels.map(function(c){ var vq=c.vals[q]?q:Object.keys(c.vals)[0], v=c.vals[vq]; if(!v) return null;
    return {s:c.s,ax:c.ax,qty:vq,unit:v.unit,comps:v.comps,ecomps:v.ecomps,rms:v.rms,peak:v.peak,pp:v.pp,amp1:c.amp1,phase:c.phase,fmax:v.fmax}; }).filter(Boolean); }

  // ---- точки программы (новая модель): узел = точка (опора × направление) ----
  var sup2ik={}, nodes=[];
  units.forEach(function(u,i){ (u.supports||[]).forEach(function(sp,k){ sup2ik[NovaScheme2.supNum(units,i,k)]=[i,k]; }); });
  (prog.points||[]).forEach(function(pt,pi){ if(!sup2ik[pt.sup]) return;
    nodes.push({pi:pi, dir:pt.name, sup:pt.sup, pt:pt, label:'Опора №'+pt.sup}); });
  var SUPS=[]; nodes.forEach(function(n){ if(SUPS.indexOf(n.sup)<0) SUPS.push(n.sup); }); SUPS.sort(function(a,b){return a-b;});
  var DIRORD=orient==='v'?['R1','R2','О']:['В','П','О'];
  var DIRS=[]; nodes.forEach(function(n){ if(DIRS.indexOf(n.dir)<0) DIRS.push(n.dir); });
  DIRS.sort(function(a,b){ var ia=DIRORD.indexOf(a), ib=DIRORD.indexOf(b); if(ia<0)ia=99; if(ib<0)ib=99; return ia-ib; });
  var cellIdx={}; nodes.forEach(function(n,idx){ cellIdx[n.sup+'_'+n.dir]=idx; });
  function nkey(n){ return n.pi+'_'+n.dir; }
  function chanCount(sp){ var c=0; (sp.meas||[]).forEach(function(m){ c+=(m.chans||[]).length; }); return c; }
  var QLBL={acc:'Ускорение',vel:'Скорость',disp:'Перемещение',avel:'Угл. скорость',aacc:'Угл. ускорение'};
  function progLine(n){ var pt=n.pt||{}, names=[], nch=0;
    (pt.channels||[]).forEach(function(c){ if(!c.on) return; nch++;
      (c.meas||[]).forEach(function(m){ var nm=m.type==='signal'?'Осц.':(QLBL[m.qty]||m.qty); if(names.indexOf(nm)<0) names.push(nm); }); });
    return (names.join(' + ')||'—')+' · '+nch+' кан · ≈'+(4*Math.max(1,names.length))+' с'; }

  // ---- отрисовка ----
  function worstOf(sup){ var w=null;
    nodes.forEach(function(n){ if(n.sup!==sup) return; var st=sess[nkey(n)]; if(!st||st.q==='overload') return;
      if(st.zone==='r') w='r'; else if(st.zone==='y'&&w!=='r') w='y'; else if(!w) w='g'; });
    return w; }
  var SPAL={ shaft:'#9a988f', tick:'#565b64', warn:'#e0b24a', supFill:'#20232a', supRing:'rgba(255,255,255,.26)', supText:'#a9aeb6', label:'#a9aeb6', metal1:'#55534c', metal2:'#6e6c64', pulleyFill:'#20232a', pulleyStroke:'#8f8d84', belt:'#86857e', sel:'#85b7eb', rpmFg:'#85b7eb', rpmBg:'rgba(55,138,221,.18)', rpmBd:'rgba(55,138,221,.5)' };
  function renderScheme(){
    var total=0; units.forEach(function(u){ total+=(u.supports||[]).length; });
    var states=[]; for(var s=1;s<=total;s++) states.push(worstOf(s));
    var activeSup=(active>=0&&nodes[active])?nodes[active].sup:-1;
    NovaScheme2.render(document.getElementById('canvas'), {orient:orient,units:units,trans:trans},
      {pal:SPAL, supStates:states, activeSup:activeSup, hit:true, brgWarn:false, maxH:200});
  }
  document.getElementById('canvas').addEventListener('click', function(e){ var t=e.target.closest('[data-act="openSup"]'); if(!t) return; supTap(+t.getAttribute('data-i'), +t.getAttribute('data-k')); });
  function supTap(i,k){ var num=NovaScheme2.supNum(units,i,k);
    var idx=-1; DIRS.some(function(d){ var ci=cellIdx[num+'_'+d]; if(ci!=null&&!sess[nkey(nodes[ci])]){ idx=ci; return true; } return false; });
    if(idx<0) DIRS.some(function(d){ var ci=cellIdx[num+'_'+d]; if(ci!=null){ idx=ci; return true; } return false; });
    if(idx>=0){ active=idx; renderAll(); } }
  function renderTable(){ var g=document.getElementById('tgrid');
    if(!nodes.length){ g.innerHTML='<div style="grid-column:1/-1;padding:20px;text-align:center;color:var(--hint);font-size:13px">В программе нет точек измерений.</div>'; g.style.gridTemplateColumns='1fr'; return; }
    g.style.gridTemplateColumns='30px repeat('+SUPS.length+', minmax(56px,1fr))';
    var activeSup=(active>=0&&nodes[active])?nodes[active].sup:-1;
    var h='<div></div>';
    SUPS.forEach(function(s){ h+='<div class="thead'+(s===activeSup?' hl':'')+'">№'+s+'</div>'; });
    DIRS.forEach(function(d){
      h+='<div class="trow">'+d+'</div>';
      SUPS.forEach(function(s){ var ci=cellIdx[s+'_'+d];
        if(ci==null){ h+='<div class="cell dis">—</div>'; return; }
        var n=nodes[ci], st=sess[nkey(n)], isA=(ci===active);
        var inner;
        if(measuring===ci) inner='<i class="ti ti-loader-2 spin"></i>';
        else if(st&&st.q==='overload') inner='<i class="ti ti-alert-triangle" style="color:var(--warning)"></i>';
        else if(st) inner='<span class="v" style="color:'+ZC[st.zone]+'">'+st.rms.toFixed(1)+'</span>';
        else inner='<i class="ti ti-player-play"></i>';
        h+='<div class="cell'+(isA?' act':'')+'" onclick="tapCell('+ci+')">'+inner+'</div>';
      });
    });
    g.innerHTML=h;
  }
  function renderBar(){ var done=nodes.filter(function(n){return sess[nkey(n)];}).length;
    document.getElementById('stbar').innerHTML=
      '<span class="schip"><i class="ti ti-gauge"></i> '+driveRpm+' об/мин (привод)</span>'
      +'<span class="schip" onclick="setOp()"><i class="ti ti-user"></i> '+(operator||'оператор?')+'</span>'
      +'<span class="schip"><i class="ti ti-checklist"></i> снято '+done+'/'+nodes.length+'</span>';
  }
  function renderPanel(){ var p=document.getElementById('panel');
    if(active<0||!nodes[active]){ p.classList.add('hidden'); return; }
    var n=nodes[active], st=sess[nkey(n)];
    var h='<div class="pname">Опора №'+n.sup+' · точка '+n.dir+'</div>'
      +'<div class="pprog"><i class="ti ti-checklist" style="font-size:13px"></i> По программе: '+progLine(n)+' · <span class="chg" onclick="chgCfg()">изменить</span></div>';
    if(measuring===active) h+='<div class="presult"><i class="ti ti-loader-2 spin" style="color:var(--info);font-size:16px"></i> идёт замер…</div>';
    else if(st&&st.q==='overload') h+='<div class="presult"><span class="zdot" style="background:var(--warning)"></span><b>⚠ Перегруз датчика</b>&nbsp;— проверьте крепление и повторите (в тренды не идёт)</div>';
    else if(st) h+='<div class="presult"><span class="zdot" style="background:'+ZC[st.zone]+'"></span><b>'+st.rms.toFixed(2)+' мм/с</b>&nbsp;· '+ZN[st.zone]+' · СКЗ</div>';
    if(measuring!==active){
      if(st) h+='<div class="pbtns"><button class="pb go" onclick="doMeasure()"><i class="ti ti-refresh"></i> Повторить</button><button class="pb alt" onclick="openData()"><i class="ti ti-chart-histogram"></i> Данные</button></div>';
      else h+='<div class="pbtns"><button class="pb go" onclick="doMeasure()"><i class="ti ti-player-play"></i> Измерить</button><button class="pb mut" onclick="skipCell()">Пропустить</button></div>';
    }
    p.innerHTML=h; p.classList.remove('hidden');
  }
  function renderAll(){ renderScheme(); renderTable(); renderBar(); renderPanel(); }

  function tapCell(idx){ if(measuring>=0) return;
    active=idx;
    if(!sess[nkey(nodes[idx])]) doMeasure(); else renderAll(); }
  function skipCell(){ var nxt=nextPending(); if(nxt>=0) active=nxt; renderAll(); }
  function chgCfg(){ alert('Разовое отклонение от программы (метод/каналы для этой точки) — появится вместе с настройкой методики. Сейчас замер идёт строго по программе.'); }
  function doMeasure(){ if(active<0||measuring>=0) return;
    measuring=active; renderAll();
    setTimeout(function(){
      var n=nodes[measuring], d=genPoint(n);
      var vch=d.channels.filter(function(c){return c.s==='a'&&c.vals.vel;})[0]||d.channels.filter(function(c){return c.vals.vel;})[0]||d.channels[0];
      var rms=(vch&&vch.vals.vel)?vch.vals.vel.rms:(2+Math.random()*5), zone=rms<2.8?'g':rms<7.1?'y':'r';
      var q=(Math.random()<0.16)?'overload':null;  // мок качества захвата (перегруз)
      sess[nkey(n)]={zone:zone,rms:rms,data:d,q:q};
      measuring=-1;
      if(!q){ var nxt=nextPending(); if(nxt>=0) active=nxt; }
      renderAll();
    }, 700);
  }
  function openData(){ if(active<0) return; var n=nodes[active], st=sess[nkey(n)]; if(!st||!st.data) return;
    var payload={ title:'Точка '+n.dir+' · Опора №'+n.sup, sub:((it&&it.name)||'')+' · '+driveRpm+' об/мин', qty:'vel', channels:viewerChannels(st.data.channels,'vel'), back:'session.html?id='+qid() };
    try{ localStorage.setItem('nova_view', JSON.stringify(payload)); }catch(e){}
    location.href='spectrum.html?mode=view';
  }
  function nextPending(){ if(!nodes.length) return -1;
    for(var d=1;d<=nodes.length;d++){ var idx=(active+d)%nodes.length; if(!sess[nkey(nodes[idx])]) return idx; } return active; }
  function setOp(){ var v=prompt('Оператор:', operator||''); if(v!==null){ operator=v; try{ localStorage.setItem('nova_operator',v); }catch(e){} renderBar(); } }
  function finish(){ var meas=nodes.filter(function(n){return sess[nkey(n)];});
    if(!meas.length){ alert('Нет ни одного замера.'); return; }
    var pts=meas.map(function(n){ var st=sess[nkey(n)]; return {dir:n.dir, label:n.label, sup:n.sup, rms:st.rms, zone:st.zone, q:st.q, data:st.data}; });
    var arr=[]; try{ arr=JSON.parse(localStorage.getItem('nova_sessions'))||[]; }catch(e){}
    arr.push({agg:(it&&it.name)||'Агрегат', aggId:qid(), date:new Date().toLocaleString('ru'), operator:operator||'—', count:meas.length, total:nodes.length, points:pts});
    try{ localStorage.setItem('nova_sessions', JSON.stringify(arr)); }catch(e){}
    location.href='measure.html';
  }
  // авто-фокус на первую точку
  if(nodes.length) active=0;
  if(!units.length){ document.getElementById('canvas').innerHTML='<div style="padding:26px;text-align:center;color:var(--hint);font-size:13px">Нет структуры агрегата</div>'; renderTable(); renderBar(); renderPanel(); }
  else renderAll();
</script>
</body>
</html>
