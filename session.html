<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Nova — сессия измерений</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.24.0/dist/tabler-icons.min.css">
<style>
  :root{ --bg:#141413; --primary:#1f1f1d; --secondary:#2a2a27; --text:#ececea; --muted:#b4b2a9; --hint:#86857e;
         --border:rgba(255,255,255,0.12); --border2:rgba(255,255,255,0.22); --info:#85b7eb; --info-bg:rgba(55,138,221,0.16); --info-bd:rgba(55,138,221,0.55);
         --success:#97c459; --warning:#ef9f27; --danger:#e24b4a; }
  *{box-sizing:border-box;}
  html,body{margin:0;background:var(--bg);}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;color:var(--text);display:flex;justify-content:center;min-height:100vh;}
  .screen{width:100%;max-width:480px;display:flex;flex-direction:column;min-height:100vh;}
  a{color:inherit;text-decoration:none;}
  .hd{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:0.5px solid var(--border);}
  .hd .ti{font-size:23px;color:var(--muted);}
  .ttl{font-size:16px;font-weight:500;}
  .sttl{font-size:12px;color:var(--hint);}
  .stbar{display:flex;flex-wrap:wrap;gap:7px;padding:11px 16px;border-bottom:0.5px solid var(--border);}
  .schip{font-size:11.5px;color:var(--muted);background:var(--secondary);border-radius:7px;padding:5px 9px;display:inline-flex;align-items:center;gap:5px;cursor:pointer;}
  .body{flex:1;padding:8px 10px;}
  .canvas{background:var(--primary);border:0.5px solid var(--border);border-radius:12px;overflow:auto;padding:8px;}
  .canvas svg{display:block;}
  .leg{display:flex;gap:12px;justify-content:center;padding:9px 0 2px;font-size:11px;color:var(--hint);}
  .leg span{display:inline-flex;align-items:center;gap:5px;}
  .ld{width:9px;height:9px;border-radius:50%;}
  .panel{margin:6px 12px 0;background:var(--primary);border:1px solid var(--info-bd);border-radius:12px;padding:13px;}
  .panel.hidden{display:none;}
  .ptitle{display:flex;align-items:center;gap:8px;}
  .pname{font-size:15px;font-weight:500;flex:1;}
  .pmap{font-size:11px;color:var(--hint);margin-top:3px;}
  .presult{display:flex;align-items:center;gap:10px;margin-top:10px;font-size:13px;}
  .zdot{width:12px;height:12px;border-radius:50%;}
  .pbtns{display:flex;gap:9px;margin-top:12px;}
  .pb{flex:1;height:44px;border-radius:10px;border:none;font-size:14px;font-weight:500;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;}
  .pb.go{background:#2f7d4f;color:#fff;}
  .pb.alt{background:transparent;border:0.5px solid var(--border2);color:var(--info);}
  .foot{padding:13px 16px;border-top:0.5px solid var(--border);}
  .fin{width:100%;height:50px;border-radius:12px;border:2px solid var(--info-bd);background:var(--info-bg);color:var(--info);font-size:16px;font-weight:500;font-family:inherit;cursor:pointer;}
</style>
</head>
<body>
<div class="screen">
  <div class="hd">
    <a href="measure.html"><i class="ti ti-chevron-left"></i></a>
    <div style="flex:1;"><div class="ttl" id="aggName">Сессия</div><div class="sttl">Обход по программе · карта точек</div></div>
    <i class="ti ti-bolt" style="color:var(--info);"></i>
  </div>
  <div class="stbar" id="stbar"></div>
  <div class="body">
    <div class="canvas" id="canvas"></div>
    <div class="leg"><span><span class="ld" style="background:var(--secondary);border:1px solid var(--border2)"></span>не снято</span><span><span class="ld" style="background:var(--success)"></span>норма</span><span><span class="ld" style="background:var(--warning)"></span>повышено</span><span><span class="ld" style="background:var(--danger)"></span>недопустимо</span></div>
  </div>
  <div class="panel hidden" id="panel"></div>
  <div class="foot"><button class="fin" onclick="finish()">Завершить сессию</button></div>
</div>

<script>
  var MT={ motor:{name:'Двигатель',color:'#4d8dff'}, pump:{name:'Насос',color:'#38e1d6'}, fan:{name:'Вентилятор',color:'#ff5db1'}, comp:{name:'Компрессор',color:'#ffb24d'}, gen:{name:'Генератор',color:'#9b6cff'} };
  var LINKS={ rigid:{off:false}, elastic:{off:false}, belt:{off:true}, gear:{off:true} };
  var RH=92, GAPC=30, SW=50, CW=44;
  var ZC={g:'#97c459',y:'#ef9f27',r:'#e24b4a'}, ZN={g:'норма',y:'повышено',r:'недопустимо'};

  function qid(){ var m=location.search.match(/id=(\d+)/); return m?parseInt(m[1]):-1; }
  var list=[]; try{ list=JSON.parse(localStorage.getItem('nova_list'))||[]; }catch(e){}
  var it=list[qid()]||null, AGG=null, prog={points:[]};
  try{ AGG=(typeof it.agg==='string'?JSON.parse(it.agg):it.agg); }catch(e){}
  try{ prog=(typeof it.program==='string'?JSON.parse(it.program):it.program)||{points:[]}; }catch(e){}
  var units=(AGG&&AGG.units)||[], trans=(AGG&&AGG.trans)||[], orient=(AGG&&AGG.orient==='v')?'v':'h';
  document.getElementById('aggName').textContent=(it&&it.name)||'Сессия';
  var operator=localStorage.getItem('nova_operator')||'';
  var sess={}; // ключ pi_dir -> {zone,rms}
  var active=-1;

  function supNum(i,k){ var n=0; for(var x=0;x<i;x++) n+=(units[x].supports||[]).length; return n+k+1; }

  // ---- движок схемы (порт из create.html) ----
  function locLayout(u){
    var L=u.machines.filter(function(m){return (m.pos||'center')==='left';});
    var C=u.machines.filter(function(m){return (m.pos||'center')==='center';});
    var R=u.machines.filter(function(m){return (m.pos||'center')==='right';});
    var x=6, mids=[], b1,b2;
    L.forEach(function(m){ mids.push({m:m,a:x+CW/2,w:CW,oh:1}); x+=CW+4; });
    b1=x+4; x+=(C.length?12:34);
    C.forEach(function(m){ mids.push({m:m,a:x+SW/2,w:SW,oh:0}); x+=SW+4; });
    b2=x+4; x+=12;
    R.forEach(function(m){ mids.push({m:m,a:x+CW/2,w:CW,oh:1}); x+=CW+4; });
    return {W:x+2, mids:mids, supStart:b1, supEnd:b2};
  }
  function shaftW(u){ return locLayout(u).W; }
  function layout(){ var P=[];
    units.forEach(function(u,i){ var W=shaftW(u), p={W:W};
      if(i===0){ p.aMin=0; p.aMax=W; p.c=0; p.dir=1; p.outA=W; }
      else { var T=trans[i-1]||{type:'elastic'}, pr=P[i-1];
        if(!LINKS[T.type].off){ p.dir=pr.dir; p.c=pr.c; if(p.dir>0){p.aMin=pr.outA+GAPC; p.aMax=p.aMin+W;} else {p.aMax=pr.outA-GAPC; p.aMin=p.aMax-W;} p.outA=(p.dir>0?p.aMax:p.aMin); p.coup=true; p.ca=(pr.outA+(p.dir>0?p.aMin:p.aMax))/2; }
        else { var bs=(T.beltDir==='up')?-1:1; p.c=pr.c+bs*RH; p.beltA=pr.outA; p.c1=pr.c; p.c2=p.c; p.dir=(T.nextDir==='left')?-1:1; if(p.dir>0){p.aMin=pr.outA; p.aMax=pr.outA+W;} else {p.aMax=pr.outA; p.aMin=pr.outA-W;} p.outA=(p.dir>0?p.aMax:p.aMin); p.belt=true; }
      }
      P.push(p);
    });
    return P;
  }
  function PT(a,c){ return orient==='h'?[a,c]:[c,a]; }
  function ln(a0,c0,a1,c1,st,w){ var p=PT(a0,c0),q=PT(a1,c1); return '<line x1="'+p[0]+'" y1="'+p[1]+'" x2="'+q[0]+'" y2="'+q[1]+'" stroke="'+st+'" stroke-width="'+w+'" stroke-linecap="round"/>'; }
  function rc(a0,a1,c0,c1,at){ var p=PT(a0,c0),q=PT(a1,c1); var x=Math.min(p[0],q[0]),y=Math.min(p[1],q[1]); return '<rect x="'+x+'" y="'+y+'" width="'+Math.abs(q[0]-p[0])+'" height="'+Math.abs(q[1]-p[1])+'" '+at+'/>'; }
  function tx(a,c,s,fill,sz){ var p=PT(a,c); return '<text x="'+p[0]+'" y="'+p[1]+'" font-size="'+(sz||10.5)+'" fill="'+fill+'" text-anchor="middle" dominant-baseline="middle">'+s+'</text>'; }
  function cir(a,c,r,at){ var p=PT(a,c); return '<circle cx="'+p[0]+'" cy="'+p[1]+'" r="'+r+'" '+at+'/>'; }
  function drawUnit(u,p,i){ var LL=locLayout(u), a0=p.aMin, c=p.c, a1=p.aMax, s='';
    s+=ln(a0,c,a1,c,'#9a988f',2.4);
    LL.mids.forEach(function(it2){ var am=a0+it2.a,col=MT[it2.m.type].color,h=it2.oh?22:30;
      s+=rc(am-it2.w/2,am+it2.w/2,c-h/2,c+h/2,'rx="4" fill="'+col+'" fill-opacity="0.2" stroke="'+col+'" stroke-width="1.5"');
      if(orient==='h') s+=tx(am, c+h/2+12, MT[it2.m.type].name, '#86857e', 9.5);
      else s+='<text x="'+(c+h/2+8)+'" y="'+am+'" font-size="9.5" fill="#86857e" text-anchor="start" dominant-baseline="middle">'+MT[it2.m.type].name+'</text>';
    });
    var ns=u.supports.length, s0=LL.supStart, s1=LL.supEnd;
    for(var k=0;k<ns;k++){ var ab=a0+(ns===1?(s0+s1)/2:s0+(s1-s0)*k/(ns-1));
      s+=ln(ab,c-12,ab,c-3,'#cfcdc4',2.4)+ln(ab,c+3,ab,c+12,'#cfcdc4',2.4);
    }
    return s;
  }
  function drawConn(p,i){ var T=trans[i-1]||{type:'elastic'}, c=p.c, g='#86857e';
    if(p.coup){ var ca=p.ca,s=ln(ca-13,c,ca+13,c,g,2.4)+rc(ca-3,ca-0.8,c-7,c+7,'fill="'+g+'"')+rc(ca+1,ca+3.2,c-7,c+7,'fill="'+g+'"'); return s; }
    if(p.belt){ var ba=p.beltA,c1=p.c1,c2=p.c2,s=cir(ba,c1,6,'fill="#1f1f1d" stroke="'+g+'" stroke-width="2"')+cir(ba,c2,6,'fill="#1f1f1d" stroke="'+g+'" stroke-width="2"')+ln(ba,c1,ba,c2,g,2.2); return s; }
    return '';
  }

  // ---- узлы-точки ----
  var LP=[], sup2ik={}, nodes=[];
  units.forEach(function(u,i){ (u.supports||[]).forEach(function(sp,k){ sup2ik[supNum(i,k)]=[i,k]; }); });
  (prog.points||[]).forEach(function(pt,pi){ var m=(pt.label||'').match(/№(\d+)/); if(!m) return; var ik=sup2ik[+m[1]]; if(!ik) return;
    (pt.spots||[]).forEach(function(sp){ nodes.push({pi:pi,dir:sp.dir,i:ik[0],k:ik[1],spot:sp,label:pt.label}); });
  });
  function supScreen(i,k){ var p=LP[i], u=units[i], LL=locLayout(u), ns=u.supports.length;
    var ab=p.aMin+(ns===1?(LL.supStart+LL.supEnd)/2:LL.supStart+(LL.supEnd-LL.supStart)*k/(ns-1)); var pt=PT(ab,p.c); return {x:pt[0],y:pt[1]}; }
  function nodePos(n){ var sp=supScreen(n.i,n.k), rad,axi;
    if(orient==='h'){ rad={x:0,y:-1}; axi={x:1,y:0}; } else { rad={x:-1,y:0}; axi={x:0,y:1}; }
    var R=26,A=24;
    if(n.dir==='О') return {x:sp.x+axi.x*A, y:sp.y+axi.y*A};
    if(n.dir==='В'||n.dir==='R1') return {x:sp.x+rad.x*R, y:sp.y+rad.y*R};
    return {x:sp.x-rad.x*R, y:sp.y-rad.y*R};
  }
  function nkey(n){ return n.pi+'_'+n.dir; }
  function chanCount(sp){ var c=0; (sp.meas||[]).forEach(function(m){ c+=(m.chans||[]).length; }); return c; }

  function render(){
    var P=layout(); LP=P;
    if(!units.length){ document.getElementById('canvas').innerHTML='<div style="padding:30px;text-align:center;color:var(--hint)">Нет структуры агрегата</div>'; renderBar(); return; }
    var aLo=1e9,aHi=-1e9,cLo=1e9,cHi=-1e9;
    P.forEach(function(p){ aLo=Math.min(aLo,p.aMin); aHi=Math.max(aHi,p.aMax); cLo=Math.min(cLo,p.c); cHi=Math.max(cHi,p.c); });
    var minX,minY,W,H, pad=34;
    if(orient==='h'){ minX=aLo-pad; minY=cLo-46-pad; W=(aHi+pad)-minX; H=(cHi+46+pad)-minY; }
    else { minX=cLo-50-pad; minY=aLo-pad; W=(cHi+95+pad)-minX; H=(aHi+pad)-minY; }
    var s='';
    P.forEach(function(p,i){ if(i>0) s+=drawConn(p,i); s+=drawUnit(units[i],p,i); });
    nodes.forEach(function(n,idx){ var pos=nodePos(n), st=sess[nkey(n)], isA=(idx===active);
      var fill=st?ZC[st.zone]:'#2a2a27', stroke=isA?'#ffffff':(st?'rgba(0,0,0,0.25)':'rgba(255,255,255,0.32)'), sw=isA?2.4:1, tcol=st?'#141413':'#b4b2a9';
      s+='<circle cx="'+pos.x+'" cy="'+pos.y+'" r="10" fill="'+fill+'" stroke="'+stroke+'" stroke-width="'+sw+'" style="cursor:pointer" onclick="tapNode('+idx+')"/>';
      s+='<text x="'+pos.x+'" y="'+(pos.y+0.5)+'" font-size="8.5" fill="'+tcol+'" text-anchor="middle" dominant-baseline="central" style="pointer-events:none">'+n.dir+'</text>';
      if(isA&&!st) s+='<circle cx="'+pos.x+'" cy="'+pos.y+'" r="15" fill="none" stroke="#85b7eb" stroke-width="1" opacity="0.6"/>';
      if(st) s+='<text x="'+pos.x+'" y="'+(pos.y+21)+'" font-size="8" fill="'+ZC[st.zone]+'" text-anchor="middle" style="pointer-events:none">'+st.rms.toFixed(1)+'</text>';
    });
    document.getElementById('canvas').innerHTML='<svg width="'+Math.max(W,300)+'" height="'+H+'" viewBox="'+minX+' '+minY+' '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg">'+s+'</svg>';
    renderBar(); renderPanel();
  }
  function renderBar(){ var done=nodes.filter(function(n){return sess[nkey(n)];}).length;
    document.getElementById('stbar').innerHTML=
      '<span class="schip"><i class="ti ti-gauge"></i> '+((units[0]&&units[0].rpm)||'—')+' об/мин</span>'
      +'<span class="schip" onclick="setOp()"><i class="ti ti-user"></i> '+(operator||'оператор?')+'</span>'
      +'<span class="schip"><i class="ti ti-checklist"></i> снято '+done+'/'+nodes.length+'</span>';
  }
  function renderPanel(){ var p=document.getElementById('panel');
    if(active<0||!nodes[active]){ p.classList.add('hidden'); return; }
    var n=nodes[active], st=sess[nkey(n)], m=(n.label||'').match(/№(\d+)/);
    var h='<div class="ptitle"><span class="pname">Точка '+n.dir+' · Опора '+(m?'№'+m[1]:'')+'</span></div>'
      +'<div class="pmap">'+(n.label||'')+' · '+chanCount(n.spot)+' каналов · '+( (n.spot.meas||[]).length )+' изм. (база)</div>';
    if(st) h+='<div class="presult"><span class="zdot" style="background:'+ZC[st.zone]+'"></span><b>'+st.rms.toFixed(2)+' мм/с</b> · '+ZN[st.zone]+' · СКЗ</div>';
    h+='<div class="pbtns"><button class="pb go" onclick="doMeasure()"><i class="ti ti-player-play"></i> '+(st?'Повторить':'Измерить')+'</button>'
      +'<button class="pb alt" onclick="location.href=\'spectrum.html?free=1\'"><i class="ti ti-wave-sine"></i> Диагностич.</button></div>';
    p.innerHTML=h; p.classList.remove('hidden');
  }
  function tapNode(idx){ active=idx; render(); }
  function doMeasure(){ if(active<0) return; var n=nodes[active], rms=2+Math.random()*7, zone=rms<2.8?'g':rms<7.1?'y':'r';
    sess[nkey(n)]={zone:zone,rms:rms};
    var nxt=nextPending(); if(nxt>=0) active=nxt;
    render();
  }
  function nextPending(){ for(var d=1;d<=nodes.length;d++){ var idx=(active+d)%nodes.length; if(!sess[nkey(nodes[idx])]) return idx; } return active; }
  function setOp(){ var v=prompt('Оператор:', operator||''); if(v!==null){ operator=v; try{ localStorage.setItem('nova_operator',v); }catch(e){} render(); } }
  function finish(){ var done=nodes.filter(function(n){return sess[nkey(n)];}).length;
    if(!done){ alert('Нет ни одного замера.'); return; }
    var arr=[]; try{ arr=JSON.parse(localStorage.getItem('nova_sessions'))||[]; }catch(e){}
    arr.push({agg:(it&&it.name)||'Агрегат', date:new Date().toLocaleString('ru'), operator:operator||'—', count:done, total:nodes.length});
    try{ localStorage.setItem('nova_sessions', JSON.stringify(arr)); }catch(e){}
    location.href='measure.html';
  }
  // авто-фокус на первую точку
  if(nodes.length) active=0;
  render();
</script>
</body>
</html>
