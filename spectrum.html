<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Nova — свободное измерение</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.24.0/dist/tabler-icons.min.css">
<style>
  :root{ --bg:#141413; --primary:#1f1f1d; --secondary:#2a2a27; --text:#ececea; --muted:#b4b2a9; --hint:#86857e;
         --border:rgba(255,255,255,0.12); --border2:rgba(255,255,255,0.22); --info:#85b7eb; --info-bg:rgba(55,138,221,0.16); --info-bd:rgba(55,138,221,0.55);
         --success:#97c459; --warning:#ef9f27; --danger:#e24b4a; }
  *{box-sizing:border-box;}
  html,body{margin:0;background:var(--bg);}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;color:var(--text);display:flex;justify-content:center;min-height:100vh;}
  .screen{width:100%;max-width:480px;display:flex;flex-direction:column;min-height:100vh;}
  a{color:inherit;text-decoration:none;}
  .hd{display:flex;align-items:center;gap:12px;padding:16px;border-bottom:0.5px solid var(--border);}
  .hd .ti{font-size:23px;color:var(--muted);}
  .ttl{font-size:16px;font-weight:500;}
  .sttl{font-size:12px;color:var(--hint);}
  .body{padding:14px 16px;flex:1;}
  .cfgbar{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:11px;cursor:pointer;}
  .cchip{font-size:11.5px;color:var(--muted);background:var(--secondary);border-radius:7px;padding:5px 9px;display:inline-flex;align-items:center;gap:5px;}
  .cchip.act{color:var(--info);background:var(--info-bg);}
  .vtabs{display:flex;gap:5px;background:var(--secondary);border-radius:9px;padding:3px;margin-bottom:9px;overflow-x:auto;}
  .vtabs button{flex:1 0 auto;min-width:64px;height:32px;border:none;border-radius:7px;background:transparent;color:var(--muted);font-size:12.5px;font-family:inherit;cursor:pointer;white-space:nowrap;}
  .vtabs button.on{background:var(--info-bg);color:var(--info);}
  .vchips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;}
  .cc2{font-size:12px;color:var(--muted);border:0.5px solid var(--border2);border-radius:7px;padding:5px 9px;display:inline-flex;align-items:center;gap:6px;cursor:pointer;}
  .cc2.on{border-color:var(--info-bd);color:var(--text);}
  .cdot{width:9px;height:9px;border-radius:50%;flex:0 0 auto;}
  .chart{background:var(--primary);border:0.5px solid var(--border);border-radius:12px;padding:10px 8px 6px;position:relative;min-height:150px;}
  .read{margin-top:12px;}
  .big{display:flex;align-items:center;gap:14px;background:var(--primary);border:0.5px solid var(--border);border-radius:12px;padding:14px;}
  .rms{font-size:26px;font-weight:600;line-height:1;}
  .rmsu{font-size:13px;color:var(--hint);}
  .zone{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;margin-top:5px;}
  .zdot{width:11px;height:11px;border-radius:50%;}
  .crow{display:flex;align-items:center;gap:10px;padding:9px 11px;background:var(--primary);border:0.5px solid var(--border);border-radius:9px;margin-top:6px;}
  .cn{font-size:13px;font-weight:500;width:84px;flex:0 0 auto;display:flex;align-items:center;gap:6px;}
  .cf{font-size:12px;color:var(--hint);flex:1;}
  .ca{font-size:13px;}
  .det{display:flex;gap:5px;background:var(--secondary);border-radius:8px;padding:3px;margin-bottom:8px;width:max-content;}
  .det button{height:28px;padding:0 12px;border:none;border-radius:6px;background:transparent;color:var(--muted);font-size:12px;font-family:inherit;cursor:pointer;}
  .det button.on{background:var(--info-bg);color:var(--info);}
  .foot{padding:14px 16px;border-top:0.5px solid var(--border);display:flex;gap:10px;}
  .meas{flex:1;height:50px;border-radius:12px;border:none;background:#2f7d4f;color:#fff;font-size:16px;font-weight:500;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:9px;}
  .diag{width:54px;height:50px;border-radius:12px;border:0.5px solid var(--border2);background:transparent;color:var(--info);font-size:22px;cursor:pointer;}
  .busy{position:absolute;inset:0;background:rgba(20,20,19,0.78);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--info);font-size:14px;border-radius:12px;}
  @keyframes sp{to{transform:rotate(360deg)}} .spin{animation:sp .9s linear infinite;font-size:26px;}
  .backdrop{position:fixed;inset:0;background:rgba(0,0,0,0.5);opacity:0;pointer-events:none;transition:opacity .2s;z-index:10;}
  .backdrop.on{opacity:1;pointer-events:auto;}
  .sheet{position:fixed;left:0;right:0;bottom:0;max-width:480px;margin:0 auto;background:var(--primary);border-top-left-radius:18px;border-top-right-radius:18px;border-top:0.5px solid var(--border);padding:14px 16px 22px;transform:translateY(110%);transition:transform .25s;z-index:11;max-height:92vh;overflow-y:auto;}
  .sheet.on{transform:translateY(0);}
  .sheet h3{font-size:15px;font-weight:500;margin:2px 0 6px;}
  .slbl{font-size:11px;color:var(--hint);margin:14px 0 7px;}
  .chips{display:flex;flex-wrap:wrap;gap:7px;}
  .chip{padding:7px 12px;border-radius:8px;border:0.5px solid var(--border2);font-size:12.5px;color:var(--muted);cursor:pointer;}
  .chip.on{background:var(--info-bg);border-color:var(--info-bd);color:var(--info);}
  .matrix{display:grid;grid-template-columns:54px 1fr 1fr 1fr;gap:6px;}
  .mh{font-size:11px;color:var(--hint);text-align:center;padding:3px 0;cursor:pointer;}
  .mrh{font-size:12.5px;color:var(--muted);display:flex;align-items:center;cursor:pointer;}
  .cell{height:40px;border-radius:8px;border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--info);}
  .cell.on{background:var(--info-bg);border-color:var(--info-bd);} .cell .ti{font-size:18px;}
  .g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .pf label{display:block;font-size:11px;color:var(--hint);margin-bottom:4px;}
  .pf input,.pf select{width:100%;height:38px;background:var(--secondary);border:0.5px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;padding:0 10px;font-family:inherit;}
  .sbtn{width:100%;height:46px;border-radius:11px;border:2px solid var(--info-bd);background:var(--info-bg);color:var(--info);font-size:15px;font-weight:500;font-family:inherit;cursor:pointer;margin-top:16px;}
</style>
</head>
<body>
<div class="screen">
  <div class="hd">
    <a href="measure.html"><i class="ti ti-chevron-left"></i></a>
    <div style="flex:1;"><div class="ttl">Свободное измерение</div><div class="sttl">Точка В · захват → любой вид</div></div>
    <i class="ti ti-adjustments" style="color:var(--info);cursor:pointer" onclick="openCfg()"></i>
  </div>
  <div class="body">
    <div class="cfgbar" id="cfgbar" onclick="openCfg()"></div>
    <div class="vtabs" id="vtabs"></div>
    <div class="vchips" id="vchips"></div>
    <div class="chart"><div id="view"></div><div class="busy" id="busy" style="display:none"><i class="ti ti-loader-2 spin"></i>идёт замер…</div></div>
    <div class="read" id="read"></div>
  </div>
  <div class="foot">
    <button class="meas" onclick="measure()"><i class="ti ti-player-play"></i> Измерить</button>
    <button class="diag" onclick="alert('Авто-диагностика — отдельный модуль (позже).')"><i class="ti ti-stethoscope"></i></button>
  </div>
</div>
<div class="backdrop" id="backdrop" onclick="closeSheet()"></div>
<div class="sheet" id="sheet"></div>

<script>
  var fr=49;
  var cfg={ chans:{a_Z:true,a_X:true,a_Y:true,g_Z:true,g_X:true,g_Y:true}, qty:'vel', fmin:'2', fmax:'1000', lines:'6400', window:'Hann' };
  var data=null, view='spectrum', viewChans={}, detector='rms', VIEWMODE=false;
  var QTY={vel:'Скорость',acc:'Ускорение',disp:'Перемещение'};
  var VIEW=[['spectrum','Спектр'],['wave','Сигнал'],['envelope','Огибающая'],['phase','Ампл-фаза'],['level','Уровень']];
  var DET={rms:'СКЗ',peak:'Пик',pp:'Размах'};
  var UNIT={vel:{a:'мм/с',g:'°/с'},acc:{a:'м/с²',g:'°/с²'},disp:{a:'мкм',g:'°'}};
  var SLAB={a:'Вибро',g:'Гиро'};
  var COL={a_Z:'#85b7eb',a_X:'#38e1d6',a_Y:'#97c459',g_Z:'#c79bff',g_X:'#ff5db1',g_Y:'#ffb24d'};
  function key(c){ return c.s+'_'+c.ax; }
  function chColor(c){ return COL[key(c)]||'#85b7eb'; }
  function chName(c){ return SLAB[c.s]+' '+c.ax; }
  function uOf(q,s){ return (UNIT[q]||UNIT.vel)[s]; }
  function rnd(a,b){ return a+Math.random()*(b-a); }
  function selChans(){ var a=[]; ['a','g'].forEach(function(s){ ['Z','X','Y'].forEach(function(ax){ if(cfg.chans[s+'_'+ax]) a.push({s:s,ax:ax}); }); }); return a; }
  function nSel(){ return selChans().length; }
  function shown(){ return data?data.per.filter(function(p){return viewChans[key(p.c)];}):[]; }

  function scale(q,s){ var b=q==='acc'?1.2:(q==='disp'?40:3.5); if(s==='g') b*=(q==='disp'?0.02:0.12); return b; }
  function comps(q,s,kind){ var sc=scale(q,s);
    if(kind==='env'){ var bp=rnd(7,8)*fr; return [{n:'1×',f:fr,a:rnd(0.1,0.3)*sc},{n:'BPFO',f:bp,a:rnd(0.5,1.1)*sc},{n:'2·BPFO',f:2*bp,a:rnd(0.25,0.6)*sc}]; }
    return [{n:'0.5×',f:0.5*fr,a:rnd(0.04,0.2)*sc},{n:'1×',f:fr,a:rnd(0.4,1.0)*sc},{n:'2×',f:2*fr,a:rnd(0.15,0.6)*sc},{n:'3×',f:3*fr,a:rnd(0.05,0.3)*sc}];
  }
  function binsOf(cm,fmax,nf){ var N=160,b=[]; for(var i=0;i<N;i++){ var f=fmax*i/(N-1),a=rnd(0,1)*nf; cm.forEach(function(k){ var w=fmax*0.012; a+=k.a*Math.exp(-Math.pow((f-k.f)/w,2)); }); b.push({f:f,a:a}); } return b; }
  function genChannel(c){ var fmax=parseFloat(cfg.fmax)||1000;
    var cm=comps(cfg.qty,c.s,'spec'), ecm=comps(cfg.qty,c.s,'env');
    var rms=Math.sqrt(cm.reduce(function(a,k){return a+0.5*k.a*k.a;},0)+0.02);
    var crest=rnd(1.4,1.9), peak=rms*1.414*crest, pp=peak*rnd(1.8,2.0);
    var one=cm.filter(function(k){return k.n==='1×';})[0]||cm[1];
    var bins=binsOf(cm,fmax,0.05*rms), ebins=binsOf(ecm,fmax,0.04*rms);
    var M=130,wave=[]; for(var j=0;j<M;j++){ var t=j/M*(3/fr),y=0; cm.forEach(function(k){ y+=k.a*Math.sin(2*Math.PI*k.f*t+(k.f/fr)); }); wave.push(y); }
    var bmax=Math.max.apply(null,bins.map(function(x){return x.a;})), emax=Math.max.apply(null,ebins.map(function(x){return x.a;})), wmax=Math.max.apply(null,wave.map(Math.abs));
    return {c:c,unit:uOf(cfg.qty,c.s),comps:cm,rms:rms,peak:peak,pp:pp,amp1:one.a,phase:rnd(0,360),bins:bins,ebins:ebins,wave:wave,bmax:bmax,emax:emax,wmax:wmax};
  }
  function genData(){ var per=selChans().map(genChannel); viewChans={}; per.forEach(function(p){ viewChans[key(p.c)]=true; }); return {per:per}; }
  function detVal(p){ return detector==='peak'?p.peak:(detector==='pp'?p.pp:p.rms); }
  function zoneVel(v){ return v<2.8?'g':v<7.1?'y':'r'; }
  var ZC={g:'var(--success)',y:'var(--warning)',r:'var(--danger)'}, ZN={g:'норма',y:'повышено',r:'недопустимо'};

  // ---- рисование ----
  function svg(inner,h){ return '<svg viewBox="0 0 360 '+h+'" width="100%" xmlns="http://www.w3.org/2000/svg">'+inner+'</svg>'; }
  function bandSpectrum(list,X,base,bandH,dir,src,maxKey){ if(!list.length) return '';
    var mx=Math.max.apply(null,list.map(function(p){return p[maxKey];}).concat([1e-6])), s='';
    list.forEach(function(p){ var d=''; p[src].forEach(function(b,i){ var y=base-dir*bandH*Math.min(b.a,mx)/mx; d+=(i?'L':'M')+X(b.f).toFixed(1)+' '+y.toFixed(1); }); s+='<path d="'+d+'" fill="none" stroke="'+chColor(p.c)+'" stroke-width="1.5"/>'; });
    return s;
  }
  function drawSpec(srcKey,maxKey){ var sh=shown(); if(!sh.length) return empty('Выберите каналы');
    var vib=sh.filter(function(p){return p.c.s==='a';}), gyr=sh.filter(function(p){return p.c.s==='g';});
    var L=40,Rr=352,fmax=parseFloat(cfg.fmax)||1000; function X(f){ return L+312*f/fmax; }
    var s='',H=176;
    if(vib.length&&gyr.length){ var mid=90;
      s+=bandSpectrum(vib,X,mid,78,1,srcKey,maxKey)+bandSpectrum(gyr,X,mid,72,-1,srcKey,maxKey);
      s+='<line x1="'+L+'" y1="'+mid+'" x2="'+Rr+'" y2="'+mid+'" stroke="rgba(255,255,255,0.18)"/>';
      s+='<text x="'+L+'" y="12" font-size="8" fill="#85b7eb">Вибро ('+vib[0].unit+')</text><text x="'+L+'" y="170" font-size="8" fill="#c79bff">Гиро ('+gyr[0].unit+')</text>';
    } else { var B=158; s+=bandSpectrum(sh,X,B,150,1,srcKey,maxKey);
      if(cfg.qty==='vel'&&sh[0].c.s==='a'){ var mx=Math.max.apply(null,sh.map(function(p){return p[maxKey];})); var ty=B-150*Math.min(4.5,mx)/mx; s+='<line x1="'+L+'" y1="'+ty.toFixed(1)+'" x2="'+Rr+'" y2="'+ty.toFixed(1)+'" stroke="#ef9f27" stroke-dasharray="4 3"/><text x="'+Rr+'" y="'+(ty-3).toFixed(1)+'" font-size="8" fill="#ef9f27" text-anchor="end">порог 4.5</text>'; }
    }
    for(var j=0;j<=5;j++){ var f=fmax*j/5; s+='<text x="'+X(f).toFixed(1)+'" y="'+(H-2)+'" font-size="8" fill="#86857e" text-anchor="middle">'+Math.round(f)+'</text>'; }
    return svg(s,H);
  }
  function drawWave(){ var sh=shown(); if(!sh.length) return empty('Выберите каналы');
    var vib=sh.filter(function(p){return p.c.s==='a';}), gyr=sh.filter(function(p){return p.c.s==='g';});
    var L=40,Rr=352; function band(list,cy,half){ if(!list.length) return ''; var mx=Math.max.apply(null,list.map(function(p){return p.wmax;}).concat([1e-6])),s='';
      list.forEach(function(p){ var d=''; p.wave.forEach(function(v,i){ var x=L+(Rr-L)*i/(p.wave.length-1), y=cy-half*v/mx; d+=(i?'L':'M')+x.toFixed(1)+' '+y.toFixed(1); }); s+='<path d="'+d+'" fill="none" stroke="'+chColor(p.c)+'" stroke-width="1.5"/>'; });
      s+='<line x1="'+L+'" y1="'+cy+'" x2="'+Rr+'" y2="'+cy+'" stroke="rgba(255,255,255,0.1)"/>'; return s; }
    var s='';
    if(vib.length&&gyr.length){ s+=band(vib,52,42)+band(gyr,128,42); s+='<text x="'+L+'" y="14" font-size="8" fill="#85b7eb">Вибро</text><text x="'+L+'" y="166" font-size="8" fill="#c79bff">Гиро</text>'; }
    else s+=band(sh,88,72);
    return svg(s,176);
  }
  function drawPhase(){ var sh=shown(); if(!sh.length) return empty('Выберите каналы');
    var cx=180,cy=88,R=72,s='';
    s+='<circle cx="'+cx+'" cy="'+cy+'" r="'+R+'" fill="none" stroke="rgba(255,255,255,0.12)"/><circle cx="'+cx+'" cy="'+cy+'" r="'+(R/2)+'" fill="none" stroke="rgba(255,255,255,0.07)"/>';
    s+='<line x1="'+(cx-R)+'" y1="'+cy+'" x2="'+(cx+R)+'" y2="'+cy+'" stroke="rgba(255,255,255,0.1)"/><line x1="'+cx+'" y1="'+(cy-R)+'" x2="'+cx+'" y2="'+(cy+R)+'" stroke="rgba(255,255,255,0.1)"/><text x="'+(cx+R+2)+'" y="'+(cy+3)+'" font-size="8" fill="#86857e">0°</text>';
    var mx=Math.max.apply(null,sh.map(function(p){return p.amp1;}).concat([1e-6]));
    sh.forEach(function(p){ var ph=p.phase*Math.PI/180,r=R*Math.min(p.amp1,mx)/mx,x=cx+r*Math.cos(ph),y=cy-r*Math.sin(ph);
      s+='<line x1="'+cx+'" y1="'+cy+'" x2="'+x.toFixed(1)+'" y2="'+y.toFixed(1)+'" stroke="'+chColor(p.c)+'" stroke-width="2"/><circle cx="'+x.toFixed(1)+'" cy="'+y.toFixed(1)+'" r="3.5" fill="'+chColor(p.c)+'"/>'; });
    return svg(s,180);
  }
  function drawLevel(){ var sh=shown(); if(!sh.length) return empty('Выберите каналы');
    var mx=Math.max.apply(null,sh.map(function(p){return detVal(p);}).concat([1e-6])), L=92,Rr=348, s='', H=Math.max(120, sh.length*30+16);
    sh.forEach(function(p,i){ var y=16+i*30, v=detVal(p), w=(Rr-L)*Math.min(v,mx)/mx, z=(cfg.qty==='vel'&&p.c.s==='a')?zoneVel(v):null, col=z?ZC[z].replace('var(--success)','#97c459').replace('var(--warning)','#ef9f27').replace('var(--danger)','#e24b4a'):chColor(p.c);
      s+='<text x="6" y="'+(y+13)+'" font-size="11" fill="#ececea">'+chName(p.c)+'</text>';
      s+='<rect x="'+L+'" y="'+y+'" width="'+(Rr-L)+'" height="18" rx="4" fill="rgba(255,255,255,0.05)"/><rect x="'+L+'" y="'+y+'" width="'+w.toFixed(1)+'" height="18" rx="4" fill="'+col+'"/>';
      s+='<text x="'+Rr+'" y="'+(y+13)+'" font-size="10" fill="#b4b2a9" text-anchor="end">'+v.toFixed(2)+'</text>';
    });
    return svg(s,H);
  }
  function empty(t){ return '<div style="height:150px;display:flex;align-items:center;justify-content:center;color:var(--hint);font-size:13px">'+t+'</div>'; }

  function renderCfgBar(){ var sel=selChans(), va=sel.filter(function(c){return c.s==='a';}).map(function(c){return c.ax;}), gy=sel.filter(function(c){return c.s==='g';}).map(function(c){return c.ax;}), ch=[];
    if(va.length) ch.push('Вибро '+va.join('/')); if(gy.length) ch.push('Гиро '+gy.join('/'));
    document.getElementById('cfgbar').innerHTML='<span class="cchip act"><i class="ti ti-adjustments"></i> '+(ch.join(' · ')||'нет каналов')+'</span><span class="cchip">'+QTY[cfg.qty]+'</span><span class="cchip">'+cfg.fmin+'–'+cfg.fmax+' Гц · '+cfg.lines+' лин · '+cfg.window+'</span>';
  }
  function render(){ renderCfgBar();
    var vt=document.getElementById('vtabs'), vc=document.getElementById('vchips'), vw=document.getElementById('view'), rd=document.getElementById('read');
    if(!data||!data.per.length){ vt.innerHTML=''; vc.innerHTML=''; vw.innerHTML=empty(data?'Выберите каналы в настройках':'Нажмите «Измерить»'); rd.innerHTML=''; return; }
    vt.innerHTML=VIEW.map(function(v){ return '<button class="'+(view===v[0]?'on':'')+'" onclick="setView(\''+v[0]+'\')">'+v[1]+'</button>'; }).join('');
    vc.innerHTML=data.per.map(function(p){ var on=viewChans[key(p.c)]; return '<span class="cc2'+(on?' on':'')+'" onclick="tgChan(\''+key(p.c)+'\')"><span class="cdot" style="background:'+chColor(p.c)+';opacity:'+(on?1:0.3)+'"></span>'+chName(p.c)+'</span>'; }).join('');
    if(view==='spectrum') vw.innerHTML=drawSpec('bins','bmax');
    else if(view==='envelope') vw.innerHTML=drawSpec('ebins','emax');
    else if(view==='wave') vw.innerHTML=drawWave();
    else if(view==='phase') vw.innerHTML=drawPhase();
    else vw.innerHTML=drawLevel();
    // readout
    var sh=shown(), rh='';
    if(view==='level'){ rh+='<div class="det">'+['rms','peak','pp'].map(function(d){return '<button class="'+(detector===d?'on':'')+'" onclick="setDet(\''+d+'\')">'+DET[d]+'</button>';}).join('')+'</div>'; }
    else if(view==='phase'){ sh.forEach(function(p){ rh+='<div class="crow"><span class="cn"><span class="cdot" style="background:'+chColor(p.c)+'"></span>'+chName(p.c)+'</span><span class="cf">1×</span><span class="ca">'+p.amp1.toFixed(2)+' '+p.unit+' ∠ '+p.phase.toFixed(0)+'°</span></div>'; }); }
    else if(sh.length){ var prim=sh[0], v=prim.rms, z=(cfg.qty==='vel'&&prim.c.s==='a')?zoneVel(v):null;
      rh+='<div class="big"><div><div><span class="rms">'+v.toFixed(2)+'</span> <span class="rmsu">'+prim.unit+' СКЗ</span></div>'+(z?'<div class="zone"><span class="zdot" style="background:'+ZC[z]+'"></span>'+ZN[z]+'</div>':'<div class="zone" style="color:var(--hint)"><span class="cdot" style="background:'+chColor(prim.c)+'"></span>'+chName(prim.c)+'</div>')+'</div><div style="flex:1"></div><div style="text-align:right"><div style="font-size:11px;color:var(--hint)">режим</div><div style="font-size:14px">2940 об/мин</div></div></div>';
      if(sh.length===1){ prim.comps.slice().sort(function(a,b){return b.a-a.a;}).forEach(function(c){ rh+='<div class="crow"><span class="cn">'+c.n+'</span><span class="cf">'+c.f.toFixed(1)+' Гц</span><span class="ca">'+c.a.toFixed(2)+' '+prim.unit+'</span></div>'; }); }
      else { sh.forEach(function(p){ rh+='<div class="crow"><span class="cn"><span class="cdot" style="background:'+chColor(p.c)+'"></span>'+chName(p.c)+'</span><span class="cf">СКЗ</span><span class="ca">'+p.rms.toFixed(2)+' '+p.unit+'</span></div>'; }); }
    }
    rd.innerHTML=rh;
  }
  function setView(v){ view=v; render(); }
  function setDet(d){ detector=d; render(); }
  function tgChan(k){ viewChans[k]=!viewChans[k]; render(); }
  function measure(){ if(VIEWMODE) return; if(!nSel()){ data={per:[]}; render(); return; } document.getElementById('busy').style.display='flex';
    setTimeout(function(){ data=genData(); document.getElementById('busy').style.display='none'; render(); }, 700);
  }

  // ---- настройки захвата ----
  function openCfg(){ if(VIEWMODE) return; buildCfg(); document.getElementById('sheet').classList.add('on'); document.getElementById('backdrop').classList.add('on'); }
  function closeSheet(){ document.getElementById('sheet').classList.remove('on'); document.getElementById('backdrop').classList.remove('on'); }
  function buildCfg(){ var h='<h3>Настройка захвата</h3><div class="slbl">Каналы (Вибро/Гиро × оси) — совместно или раздельно</div><div class="matrix">';
    h+='<div class="mh"></div>'+['Z','X','Y'].map(function(ax){return '<div class="mh" onclick="cfgCol(\''+ax+'\')">'+ax+'</div>';}).join('');
    [['a','Вибро'],['g','Гиро']].forEach(function(r){ h+='<div class="mrh" onclick="cfgRow(\''+r[0]+'\')">'+r[1]+'</div>'+['Z','X','Y'].map(function(ax){ var on=cfg.chans[r[0]+'_'+ax]; return '<div class="cell'+(on?' on':'')+'" onclick="cfgCell(\''+r[0]+'\',\''+ax+'\')">'+(on?'<i class="ti ti-check"></i>':'')+'</div>'; }).join(''); });
    h+='</div><div class="slbl">Величина</div><div class="chips">'+['vel','acc','disp'].map(function(q){return '<span class="chip'+(cfg.qty===q?' on':'')+'" onclick="cfg.qty=\''+q+'\';buildCfg()">'+QTY[q]+'</span>';}).join('')+'</div>';
    h+='<div class="slbl">Частотный диапазон, Гц</div><div class="g2"><div class="pf"><input id="fmin" value="'+cfg.fmin+'" placeholder="от"/></div><div class="pf"><input id="fmax" value="'+cfg.fmax+'" placeholder="до"/></div></div>';
    h+='<div class="slbl">Разрешение и окно</div><div class="g2"><div class="pf"><label>Линий</label><select id="lines">'+['400','800','1600','3200','6400','12800','25600'].map(function(l){return '<option'+(cfg.lines===l?' selected':'')+'>'+l+'</option>';}).join('')+'</select></div><div class="pf"><label>Окно</label><select id="win">'+['Hann','Hamming','Flat-top','Прямоугольное'].map(function(w){return '<option'+(cfg.window===w?' selected':'')+'>'+w+'</option>';}).join('')+'</select></div></div>';
    h+='<button class="sbtn" onclick="applyCfg()">Применить</button>';
    document.getElementById('sheet').innerHTML=h;
  }
  function cfgCell(s,ax){ var k=s+'_'+ax; cfg.chans[k]=!cfg.chans[k]; buildCfg(); }
  function cfgRow(s){ var all=['Z','X','Y'].every(function(ax){return cfg.chans[s+'_'+ax];}); ['Z','X','Y'].forEach(function(ax){ cfg.chans[s+'_'+ax]=!all; }); buildCfg(); }
  function cfgCol(ax){ var all=['a','g'].every(function(s){return cfg.chans[s+'_'+ax];}); ['a','g'].forEach(function(s){ cfg.chans[s+'_'+ax]=!all; }); buildCfg(); }
  function applyCfg(){ var g=function(id){var e=document.getElementById(id);return e?e.value:null;};
    if(g('fmin')!==null) cfg.fmin=g('fmin'); if(g('fmax')!==null) cfg.fmax=g('fmax'); if(g('lines')!==null) cfg.lines=g('lines'); if(g('win')!==null) cfg.window=g('win');
    closeSheet(); if(data&&data.per.length) data=genData(); render();
  }
  function fromComps(c){ var fmax=parseFloat(cfg.fmax)||1000, cm=c.comps||[], ecm=c.ecomps||cm, rms=c.rms||0;
    var bins=binsOf(cm,fmax,0.05*rms), ebins=binsOf(ecm,fmax,0.04*rms);
    var M=130,wave=[]; for(var j=0;j<M;j++){ var t=j/M*(3/fr),y=0; cm.forEach(function(k){ y+=k.a*Math.sin(2*Math.PI*k.f*t+(k.f/fr)); }); wave.push(y); }
    return {c:{s:c.s,ax:c.ax},unit:c.unit||uOf(cfg.qty,c.s),comps:cm,rms:rms,peak:c.peak||rms*2,pp:c.pp||rms*4,amp1:(c.amp1!=null?c.amp1:rms),phase:c.phase||0,bins:bins,ebins:ebins,wave:wave,
      bmax:Math.max.apply(null,bins.map(function(x){return x.a;}).concat([1e-6])),emax:Math.max.apply(null,ebins.map(function(x){return x.a;}).concat([1e-6])),wmax:Math.max.apply(null,wave.map(Math.abs).concat([1e-6]))};
  }
  (function initView(){ if((location.search||'').indexOf('mode=view')<0) return; VIEWMODE=true;
    var v; try{ v=JSON.parse(localStorage.getItem('nova_view')); }catch(e){}
    if(!v||!v.channels||!v.channels.length) return;
    cfg.qty=v.qty||'vel';
    data={per:v.channels.map(fromComps)};
    viewChans={}; data.per.forEach(function(p){ viewChans[key(p.c)]=true; });
    var t=document.querySelector('.ttl'); if(t) t.textContent=v.title||'Просмотр замера';
    var st=document.querySelector('.sttl'); if(st) st.textContent=v.sub||'из истории';
    var bk=document.querySelector('.hd a'); if(bk&&v.back) bk.setAttribute('href',v.back);
    var g=document.querySelector('.hd .ti-adjustments'); if(g) g.style.display='none';
    var mb=document.querySelector('.meas'); if(mb) mb.style.display='none';
  })();
  render();
</script>
</body>
</html>
