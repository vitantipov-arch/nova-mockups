<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Nova — балансировка</title>
<style>
  :root{ --bg:#141413; --primary:#1f1f1d; --secondary:#2a2a27; --surface2:#26261f; --text:#ececea; --muted:#b4b2a9; --hint:#86857e;
         --border:rgba(255,255,255,0.12); --border2:rgba(255,255,255,0.22); --info:#85b7eb; --info-bg:rgba(55,138,221,0.16); --info-bd:rgba(55,138,221,0.55);
         --ok:#97c459; --warn:#ef9f27; --danger:#e24b4a; --accent:#ff8f3d; --cV:#D2691E; --cH:#0066CC; --cA:#228B22; }
  *{box-sizing:border-box;}
  html,body{margin:0;background:var(--bg);}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;color:var(--text);display:flex;justify-content:center;min-height:100vh;}
  .screen{width:100%;max-width:560px;display:flex;flex-direction:column;min-height:100vh;}
  a{color:inherit;text-decoration:none;}
  .hd{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:.5px solid var(--border);}
  .hd .bk{font-size:22px;color:var(--muted);cursor:pointer;}
  .ttl{font-size:16px;font-weight:600;}
  .sttl{font-size:12px;color:var(--hint);margin-top:1px;}
  .body{padding:14px 16px 96px;flex:1;}
  .sec{font-size:12px;color:var(--hint);margin:16px 0 8px;font-weight:600;text-transform:uppercase;letter-spacing:.03em;}
  .sec:first-child{margin-top:2px;}
  .row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-top:1px solid var(--border);font-size:14px;}
  .row:first-of-type{border-top:none;}
  .row .k{color:var(--muted);}
  .seg{display:flex;gap:3px;background:var(--secondary);border-radius:9px;padding:3px;}
  .seg button{border:none;background:transparent;color:var(--hint);font-size:13px;font-family:inherit;border-radius:6px;padding:7px 12px;cursor:pointer;}
  .seg button.on{background:var(--primary);color:var(--text);font-weight:600;box-shadow:0 1px 2px rgba(0,0,0,.2);}
  .stp{display:flex;align-items:center;}
  .stp button{width:34px;height:34px;border:1px solid var(--border2);background:var(--secondary);color:var(--text);font-size:18px;cursor:pointer;}
  .stp button:first-child{border-radius:9px 0 0 9px;} .stp button:last-child{border-radius:0 9px 9px 0;}
  .stp .v{min-width:40px;text-align:center;font-size:15px;border-top:1px solid var(--border2);border-bottom:1px solid var(--border2);height:34px;line-height:34px;background:var(--primary);}
  .tog{width:44px;height:26px;border-radius:99px;background:var(--border2);position:relative;cursor:pointer;flex:0 0 auto;transition:.15s;}
  .tog.on{background:var(--info);} .tog .k{position:absolute;top:2.5px;left:2.5px;width:21px;height:21px;border-radius:99px;background:#fff;transition:.15s;} .tog.on .k{left:20.5px;}
  input.f{height:36px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;padding:0 10px;font-family:inherit;width:100%;}
  input.f:focus{outline:none;border-color:var(--info-bd);}
  .card{background:var(--primary);border:.5px solid var(--border);border-radius:12px;padding:13px;margin-bottom:11px;}
  .hint{font-size:11.5px;color:var(--hint);line-height:1.4;margin-top:6px;}
  .chip{display:inline-flex;align-items:center;gap:6px;background:var(--secondary);border-radius:8px;padding:6px 10px;font-size:12px;color:var(--muted);border:1px solid var(--border);}
  .actions{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;}
  .actions button{flex:1;min-width:120px;height:40px;border-radius:10px;border:1px solid var(--border2);background:var(--secondary);color:var(--text);font-size:13px;font-family:inherit;cursor:pointer;}
  .foot{position:fixed;bottom:0;left:0;right:0;display:flex;justify-content:center;background:linear-gradient(transparent,var(--bg) 34%);padding:12px 16px;}
  .foot .inner{width:100%;max-width:560px;}
  .next{width:100%;height:46px;border-radius:12px;border:none;background:var(--accent);color:#1a1206;font-size:15px;font-weight:600;font-family:inherit;cursor:pointer;}
  .next:disabled{opacity:.4;cursor:default;}
  .plrow{display:flex;gap:8px;align-items:center;margin-top:8px;}
  .plrow input{flex:1;}
  .del{width:34px;height:34px;flex:0 0 auto;border:1px solid var(--border);border-radius:8px;background:var(--secondary);color:var(--danger);cursor:pointer;font-size:14px;}
  /* таблицы */
  table.bt{width:100%;border-collapse:collapse;font-size:12.5px;}
  table.bt th{color:var(--hint);font-weight:500;padding:5px 4px;text-align:center;border-bottom:1px solid var(--border);}
  table.bt td{padding:4px;text-align:center;border-bottom:1px solid rgba(255,255,255,.05);}
  table.bt td.lc{text-align:left;color:var(--muted);white-space:nowrap;}
  table.bt input{width:62px;height:30px;text-align:center;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:12.5px;font-family:inherit;}
  table.bt input.meas{border-color:rgba(151,196,89,.5);}
  .wcell input{width:74px;}
  .measbtn{border:1px solid var(--info-bd);background:var(--info-bg);color:var(--info);border-radius:7px;height:30px;padding:0 10px;font-size:12px;font-family:inherit;cursor:pointer;white-space:nowrap;}
  .runchip{display:inline-flex;align-items:center;gap:6px;white-space:nowrap;cursor:pointer;border-radius:8px;padding:6px 10px;font-size:12px;border:1px solid var(--border);background:var(--secondary);color:var(--muted);}
  .runchip.on{border-color:var(--accent);color:var(--accent);}
  .runchip.done{border-color:rgba(151,196,89,.5);}
  .lbltag{display:inline-block;min-width:24px;text-align:center;font-weight:600;border-radius:5px;padding:1px 5px;font-size:11px;}
  select.f{height:34px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;font-family:inherit;padding:0 8px;}
  .verdict{display:inline-block;padding:3px 10px;border-radius:7px;font-size:12px;font-weight:600;}
</style>
</head>
<body>
<div class="screen">
  <div class="hd">
    <div class="bk" id="bk">‹</div>
    <div style="flex:1"><div class="ttl" id="ttl">Свободная балансировка</div><div class="sttl" id="sub">метод коэффициентов влияния</div></div>
  </div>
  <div class="body" id="body"></div>
</div>
<div class="foot"><div class="inner"><button class="next" id="next">Далее</button></div></div>

<script src="nova-balance.js?v=3"></script>
<script>
(function(){
  var polar=NovaBalance._c.polar, toPolar=NovaBalance._c.toPolar;
  function cadd(a,b){return {re:a.re+b.re,im:a.im+b.im};}
  function cmul(a,b){return {re:a.re*b.re-a.im*b.im,im:a.re*b.im+a.im*b.re};}
  function rnd(a,b){return a+Math.random()*(b-a);}
  function seededRand(seed){ var s=(seed>>>0)||1; return function(){ s=(s*1664525+1013904223)>>>0; return s/4294967296; }; }

  var DIRCOL={V:'var(--cV)',H:'var(--cH)',A:'var(--cA)'}, DIRHEX={V:'#D2691E',H:'#0066CC',A:'#228B22'};

  var S={
    step:'config', mode:'free', assetId:null, assetName:null,
    measMode:'3ch',                       // '3ch' | 'zmove'
    supports:2,
    dirs:[{key:'V',label:'В',axis:'Z',on:true},{key:'H',label:'П',axis:'Y',on:true},{key:'A',label:'О',axis:'X',on:false}],
    planes:[{id:'p1',name:'Плоскость 1'},{id:'p2',name:'Плоскость 2'}],
    target:4.5,
    runs:[], activeRun:null, calc:null, custom:null,
    tilt:0.45,                            // 3D наклон
    sessionId:null, sessionDate:null, savedSens:null, reuse:false
  };
  var truthV0=null, truthWt=null;

  // ---- производные ----
  function enabledDirs(){ return S.dirs.filter(function(d){return d.on;}); }
  function dirLabel(key){ for(var i=0;i<S.dirs.length;i++) if(S.dirs[i].key===key) return S.dirs[i].label; return key; }
  function points(){ var p=[]; for(var s=1;s<=S.supports;s++) enabledDirs().forEach(function(d){ p.push({sup:s,dir:d.key}); }); return p; }
  function ptLabel(sup,dir){ return sup+dirLabel(dir); }
  function planeIdx(id){ for(var i=0;i<S.planes.length;i++) if(S.planes[i].id===id) return i; return -1; }
  function ensureVib(run){ points().forEach(function(p){ run.vib[p.sup]=run.vib[p.sup]||{}; if(!run.vib[p.sup][p.dir]) run.vib[p.sup][p.dir]={amp:'',phase:'',src:'entered'}; }); }
  function vibFlat(run){ return points().map(function(p){ var c=run.vib[p.sup][p.dir]; return {amp:parseFloat(c.amp)||0,phase:parseFloat(c.phase)||0}; }); }
  function runFilled(run){ return points().every(function(p){ var c=run.vib[p.sup]&&run.vib[p.sup][p.dir]; return c&&c.amp!==''&&c.phase!==''; }); }
  function baseRun(){ return S.runs.filter(function(r){return r.type==='base';})[0]; }
  function trialRuns(){ return S.runs.filter(function(r){return r.type==='trial';}); }
  function runById(id){ for(var i=0;i<S.runs.length;i++) if(S.runs[i].id===id) return S.runs[i]; return null; }
  function runLabel(r){ return r.type==='base'?'Пуск №0 (базовый)':('Пуск №'+r.num+' · '+(planeName(r.plane))); }
  function planeName(id){ for(var i=0;i<S.planes.length;i++) if(S.planes[i].id===id) return S.planes[i].name; return id; }

  // ---- синтетическая «истинная» модель (демо-данные) ----
  function genTruth(){ var pts=points();
    if(!S._seed) S._seed=(S.mode==='asset')?(101+(S.assetId||0)*911):(Math.floor(rnd(1,1e6)));
    truthWt={}; S.planes.forEach(function(pl){ truthWt[pl.id]=polar(rnd(4,12), rnd(0,360)); });
    truthV0=pts.map(function(p,i){ var f={re:0,im:0}; S.planes.forEach(function(pl){ f=cadd(f, cmul(truthAij(i,planeIdx(pl.id)), truthWt[pl.id])); }); return {re:-f.re,im:-f.im}; });
  }
  function truthAij(i,j){ var r=seededRand((S._seed||1)+i*7919+j*104729); return polar(0.25+r()*0.45, r()*360); }
  function cargoStateOf(run){ if(run.type==='base') return {}; var st={}, ref=runById(run.refId); if(ref) st=JSON.parse(JSON.stringify(cargoStateOf(ref))); if(run.cargo&&run.plane){ var w=polar(parseFloat(run.cargo.mass)||0,parseFloat(run.cargo.angle)||0); st[run.plane]=st[run.plane]?cadd(st[run.plane],w):w; } return st; }
  function noise(c){ var p=toPolar(c); return polar(p.amp*rnd(0.98,1.02), p.phase+rnd(-1.8,1.8)); }
  function measureCell(run,sup,dir){ if(!truthV0) genTruth(); var pts=points(); var i=-1; pts.forEach(function(p,k){ if(p.sup===sup&&p.dir===dir) i=k; }); if(i<0) return;
    var st=cargoStateOf(run), f={re:truthV0[i].re,im:truthV0[i].im}; S.planes.forEach(function(pl){ if(st[pl.id]) f=cadd(f, cmul(truthAij(i,planeIdx(pl.id)), st[pl.id])); });
    var v=toPolar(noise(f)); run.vib[sup][dir]={amp:v.amp.toFixed(2),phase:v.phase.toFixed(0),src:'measured'}; }
  function measureSup(run,sup){ enabledDirs().forEach(function(d){ measureCell(run,sup,d.key); }); }
  function measureAll(run){ points().forEach(function(p){ measureCell(run,p.sup,p.dir); }); }

  // ============ полярный график (как BPpro: 0° сверху, 90° слева, против часовой) ============
  function polxy(cx,cy,R,amp,phaseDeg,mx){ var rad=(-phaseDeg-90)*Math.PI/180, d=R*Math.min(amp/mx,1); return [cx+d*Math.cos(rad), cy+d*Math.sin(rad)]; }
  function polarSup(run, sup, opts){ opts=opts||{}; var sz=190, cx=sz/2, cy=sz/2, R=sz/2-22;
    var vs=enabledDirs().map(function(d){ var c=run.vib[sup]&&run.vib[sup][d.key]; return {key:d.key,amp:c?parseFloat(c.amp)||0:0,phase:c?parseFloat(c.phase)||0:0}; });
    var mx=Math.max.apply(null,vs.map(function(v){return v.amp;}).concat(opts.baseVs?opts.baseVs.map(function(v){return v.amp;}):[]).concat([1e-6]));
    var s='<svg width="100%" height="'+sz+'" viewBox="0 0 '+sz+' '+sz+'" style="display:block;max-width:'+sz+'px;margin:0 auto">';
    [1,.75,.5,.25].forEach(function(f){ s+='<circle cx="'+cx+'" cy="'+cy+'" r="'+(R*f).toFixed(1)+'" fill="none" stroke="rgba(255,255,255,'+(f===1?.18:.07)+')"/>'; });
    for(var a=0;a<360;a+=30){ var p=polxy(cx,cy,R,1,a,1); s+='<line x1="'+cx+'" y1="'+cy+'" x2="'+p[0].toFixed(1)+'" y2="'+p[1].toFixed(1)+'" stroke="rgba(255,255,255,.05)"/>'; }
    s+='<text x="'+cx+'" y="10" font-size="8" fill="#86857e" text-anchor="middle">0°</text><text x="6" y="'+(cy+3)+'" font-size="8" fill="#86857e">90°</text><text x="'+(sz-4)+'" y="'+(cy+3)+'" font-size="8" fill="#86857e" text-anchor="end">270°</text><text x="'+cx+'" y="'+(sz-2)+'" font-size="8" fill="#86857e" text-anchor="middle">180°</text>';
    s+='<text x="'+cx+'" y="'+(cy-2)+'" font-size="8.5" fill="#86857e" text-anchor="middle">'+mx.toFixed(1)+'</text>';
    if(opts.baseVs) opts.baseVs.forEach(function(v){ if(v.amp<=0) return; var p=polxy(cx,cy,R,v.amp,v.phase,mx); s+='<line x1="'+cx+'" y1="'+cy+'" x2="'+p[0].toFixed(1)+'" y2="'+p[1].toFixed(1)+'" stroke="'+DIRHEX[v.key]+'" stroke-width="1.3" opacity="0.35"/>'; });
    vs.forEach(function(v){ if(v.amp<=0) return; var p=polxy(cx,cy,R,v.amp,v.phase,mx); s+='<line x1="'+cx+'" y1="'+cy+'" x2="'+p[0].toFixed(1)+'" y2="'+p[1].toFixed(1)+'" stroke="'+DIRHEX[v.key]+'" stroke-width="1.9"/><circle cx="'+p[0].toFixed(1)+'" cy="'+p[1].toFixed(1)+'" r="3" fill="'+DIRHEX[v.key]+'"/>'; });
    if(opts.baseVs) opts.baseVs.forEach(function(bv){ var cur=vs.filter(function(v){return v.key===bv.key;})[0]; if(!cur||bv.amp<=0) return; var pb=polxy(cx,cy,R,bv.amp,bv.phase,mx),pc=polxy(cx,cy,R,cur.amp,cur.phase,mx); s+='<line x1="'+pb[0].toFixed(1)+'" y1="'+pb[1].toFixed(1)+'" x2="'+pc[0].toFixed(1)+'" y2="'+pc[1].toFixed(1)+'" stroke="'+DIRHEX[bv.key]+'" stroke-width="1.3" stroke-dasharray="4 3"/>'; });
    return s+'</svg>';
  }
  function dirLegend(){ return '<div style="display:flex;gap:12px;justify-content:center;margin-top:2px;font-size:11px;color:var(--muted)">'+S.dirs.filter(function(d){return d.on;}).map(function(d){ return '<span><span style="display:inline-block;width:9px;height:9px;border-radius:2px;background:'+DIRHEX[d.key]+'"></span> '+d.label+' ('+d.axis+')</span>'; }).join('')+'</div>'; }
  function polarGrid(run, refRun){
    var h='<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:8px">';
    for(var s=1;s<=S.supports;s++){ (function(s){ var opts={}; if(refRun){ opts.baseVs=enabledDirs().map(function(d){ var c=refRun.vib[s]&&refRun.vib[s][d.key]; return {key:d.key,amp:c?parseFloat(c.amp)||0:0,phase:c?parseFloat(c.phase)||0:0}; }); }
      h+='<div class="card" style="padding:8px;margin:0"><div style="font-size:11px;color:var(--hint);text-align:center">Опора '+s+'</div>'+polarSup(run,s,opts)+'</div>';
    })(s); }
    return h+'</div>'+dirLegend()+(refRun?'<div class="hint" style="text-align:center">Тускло — '+ (refRun.type==='base'?'базовый':'опорный') +' пуск; пунктир — вектор влияния.</div>':'');
  }

  // ============ 3D изометрия влияния (приближение; на смартфоне сделаем нормально) ============
  function iso3d(run, refRun){
    var W=Math.min(520, 120+S.supports*120), H=210, cx0=60, cy=H/2, dx=(W-90)/Math.max(1,S.supports), tilt=S.tilt, R=42;
    var mx=1e-6; for(var s=1;s<=S.supports;s++) enabledDirs().forEach(function(d){ var c=run.vib[s]&&run.vib[s][d.key]; if(c) mx=Math.max(mx,parseFloat(c.amp)||0); if(refRun){var b=refRun.vib[s]&&refRun.vib[s][d.key]; if(b) mx=Math.max(mx,parseFloat(b.amp)||0);} });
    function disc(cx){ var s='<ellipse cx="'+cx+'" cy="'+cy+'" rx="'+(R*0.34).toFixed(1)+'" ry="'+(R*tilt).toFixed(1)+'" fill="none" stroke="rgba(255,255,255,.13)"/>'; s+='<ellipse cx="'+cx+'" cy="'+cy+'" rx="'+(R*0.68).toFixed(1)+'" ry="'+(R*tilt*2).toFixed(1)+'" fill="none" stroke="rgba(255,255,255,.09)"/>'; return s; }
    function vec(cx,amp,phase,col,dash){ var rad=(-phase-90)*Math.PI/180, d=R*Math.min(amp/mx,1); var x=cx+d*Math.cos(rad)*0.9, y=cy+d*Math.sin(rad)*tilt*2; return {x:x,y:y,line:'<line x1="'+cx+'" y1="'+cy+'" x2="'+x.toFixed(1)+'" y2="'+y.toFixed(1)+'" stroke="'+col+'" stroke-width="1.8"'+(dash?' stroke-dasharray="4 3" opacity="0.85"':'')+'/>'}; }
    var svg='<svg width="100%" height="'+H+'" viewBox="0 0 '+W+' '+H+'" style="display:block;max-width:'+W+'px;margin:0 auto">';
    // ось ротора
    svg+='<line x1="'+(cx0-24)+'" y1="'+cy+'" x2="'+(cx0+(S.supports-1)*dx+24)+'" y2="'+cy+'" stroke="rgba(255,255,255,.2)" stroke-width="2"/>';
    for(var s=1;s<=S.supports;s++){ (function(s){ var cx=cx0+(s-1)*dx; svg+=disc(cx);
      enabledDirs().forEach(function(d){ var c=run.vib[s]&&run.vib[s][d.key]; if(!c) return; var amp=parseFloat(c.amp)||0, ph=parseFloat(c.phase)||0; if(amp<=0) return;
        var cur=vec(cx,amp,ph,DIRHEX[d.key],false); var body=cur.line;
        if(refRun){ var b=refRun.vib[s]&&refRun.vib[s][d.key]; if(b){ var ba=parseFloat(b.amp)||0,bp=parseFloat(b.phase)||0; if(ba>0){ var bs=vec(cx,ba,bp,DIRHEX[d.key],false); body=bs.line.replace('stroke-width="1.8"','stroke-width="1.4" opacity="0.4"')+'<line x1="'+bs.x.toFixed(1)+'" y1="'+bs.y.toFixed(1)+'" x2="'+cur.x.toFixed(1)+'" y2="'+cur.y.toFixed(1)+'" stroke="'+DIRHEX[d.key]+'" stroke-width="1.4" stroke-dasharray="4 3"/>'+cur.line; } } }
        svg+=body+'<circle cx="'+cur.x.toFixed(1)+'" cy="'+cur.y.toFixed(1)+'" r="2.6" fill="'+DIRHEX[d.key]+'"/>';
      });
      svg+='<text x="'+cx+'" y="'+(cy+R*tilt*2+14)+'" font-size="9" fill="#86857e" text-anchor="middle">Опора '+s+'</text>';
    })(s); }
    svg+='</svg>';
    return '<div class="card"><div style="display:flex;justify-content:space-between;align-items:center"><div style="font-size:12px;color:var(--hint)">3D · векторы влияния (база → пробный)</div><label style="font-size:11px;color:var(--hint)">поворот <input type="range" min="10" max="90" value="'+Math.round(tilt*100)+'" data-act="tilt" style="vertical-align:middle;width:90px"></label></div>'+svg+dirLegend()+'</div>';
  }

  // ============ таблицы (как BPpro) ============
  function residualTable(resid){ // resid: [P]{amp,phase} по points()
    var dirs=enabledDirs(), pts=points();
    var h='<div class="sec">Остаточные вибрации</div><div class="card" style="overflow-x:auto"><table class="bt"><tr><th rowspan="2">Опора</th>'+dirs.map(function(d){return '<th colspan="2" style="color:'+DIRHEX[d.key]+'">'+d.label+'</th>';}).join('')+'</tr><tr>'+dirs.map(function(){return '<th>Ампл.</th><th>Фаза</th>';}).join('')+'</tr>';
    for(var s=1;s<=S.supports;s++){ (function(s){ h+='<tr><td class="lc">'+s+'</td>'+dirs.map(function(d){ var idx=-1; pts.forEach(function(p,k){ if(p.sup===s&&p.dir===d.key) idx=k; }); var r=resid[idx]||{amp:0,phase:0}; var over=r.amp>S.target;
      return '<td style="color:'+(over?'var(--warn)':'var(--text)')+'">'+r.amp.toFixed(2)+'</td><td>'+Math.round(r.phase)+'°</td>'; }).join('')+'</tr>';
    })(s); }
    return h+'</table></div>';
  }
  function weightsTable(){ // одна таблица: расчётные грузы, редактируемые (нерасчётные тут же)
    var h='<div class="sec">Корректирующие грузы</div><div class="card" style="overflow-x:auto"><table class="bt"><tr><th class="lc" style="text-align:left">Плоскость</th><th>Масса, г</th><th>Угол</th></tr>';
    S.calc.planeIds.forEach(function(pid,i){ var cw=S.custom[i];
      h+='<tr><td class="lc">'+planeName(pid)+'</td><td class="wcell"><input data-cw="mass" data-i="'+i+'" value="'+cw.mass+'" inputmode="decimal"/></td><td class="wcell"><input data-cw="angle" data-i="'+i+'" value="'+cw.angle+'" inputmode="decimal"/><span style="color:var(--hint)">°</span></td></tr>';
    });
    return h+'</table><div class="hint">Значения из расчёта; можно править — остаток пересчитается.</div></div>';
  }

  // ============ навигация / состояние кнопки ============
  function setNext(label,on){ var b=document.getElementById('next'); b.style.display=label?'':'none'; b.textContent=label||''; b.disabled=!on; }
  function stepsInfo(){ document.getElementById('ttl').textContent=(S.mode==='asset'?('Балансировка · '+(S.assetName||'')):'Свободная балансировка'); }

  // ---- CONFIG ----
  function renderConfig(){ var b='';
    if(S.mode==='asset') b+='<div class="card" style="border-color:var(--accent);background:rgba(255,143,61,.08)"><div style="font-size:12.5px;color:var(--accent)">По агрегату: '+(S.assetName||'')+(S.reuse?' · по коэффициентам':'')+'</div><div class="hint">Структура взята из агрегата — можно скорректировать.</div></div>';
    b+='<div class="sec">Метод замера</div>';
    b+='<div class="seg" style="margin-bottom:6px"><button class="'+(S.measMode==='3ch'?'on':'')+'" data-act="mm" data-v="3ch">3 канала на опору</button><button class="'+(S.measMode==='zmove'?'on':'')+'" data-act="mm" data-v="zmove">Перестановка (1 канал Z)</button></div>';
    b+='<div class="hint">'+(S.measMode==='3ch'?'Датчик на опоре снимает 3 оси разом → движемся по опорам.':'Датчик переставляется по точкам одним Z-каналом → движемся по точкам.')+'</div>';
    b+='<div class="sec">Опоры и направления</div>';
    b+='<div class="row"><span class="k">Число опор</span>'+stepper('supports',S.supports,1,20)+'</div>';
    S.dirs.forEach(function(d){ b+='<div class="row"><span class="k">'+d.label+' <span style="color:var(--hint)">('+d.axis+')</span></span><div class="tog '+(d.on?'on':'')+'" data-act="dir" data-v="'+d.key+'"><div class="k"></div></div></div>'; });
    b+='<div class="hint">Соответствие осям датчика: В≈Z, П≈Y, О≈X. Осевое (О) для дисбаланса обычно не нужно.</div>';
    b+='<div class="sec">Плоскости коррекции</div>';
    S.planes.forEach(function(pl,i){ b+='<div class="plrow"><input class="f" data-pl="'+i+'" value="'+pl.name.replace(/"/g,'&quot;')+'"/>'+(S.planes.length>1?'<button class="del" data-act="delplane" data-i="'+i+'">✕</button>':'')+'</div>'; });
    b+='<button class="chip" data-act="addplane" style="cursor:pointer;margin-top:8px">＋ Плоскость</button>';
    b+='<div class="sec">Допуск</div>';
    b+='<div class="row"><span class="k">Цель по остатку, мм/с</span><input class="f" style="width:110px" data-act2="target" value="'+S.target+'" inputmode="decimal"/></div>';
    b+='<div class="hint">Фаза измеряется по опорной метке тахометра (или вводится вручную).</div>';
    document.getElementById('body').innerHTML=b; document.getElementById('sub').textContent='конфигурация';
    setNext('Начать → базовый пуск', enabledDirs().length>0);
  }
  function stepper(key,val,min,max){ return '<div class="stp"><button data-act="dec" data-k="'+key+'" data-min="'+min+'">−</button><div class="v">'+val+'</div><button data-act="inc" data-k="'+key+'" data-max="'+max+'">＋</button></div>'; }

  // ---- RUNS (список пусков) ----
  function renderRuns(){ var b='<div class="sec">Пуски</div>';
    S.runs.forEach(function(r){ var done=runFilled(r);
      b+='<div class="card" data-act="openRun" data-id="'+r.id+'" style="cursor:pointer;display:flex;align-items:center;gap:10px"><div style="flex:1"><div style="font-size:14px;font-weight:500">'+runLabel(r)+'</div><div class="hint" style="margin-top:2px">'+(r.type==='base'?'без грузов':('груз '+(r.cargo.mass||'—')+' г ∠ '+(r.cargo.angle||'—')+'° · опорный: '+(r.refId?runShort(runById(r.refId)):'—')))+' · '+(done?'снят':'не снят')+'</div></div><span class="'+(done?'':'')+'" style="color:'+(done?'var(--ok)':'var(--hint)')+'">'+(done?'✓':'›')+'</span></div>';
    });
    b+='<button class="chip" data-act="addTrial" style="cursor:pointer">＋ Пробный пуск</button>';
    var canCalc=baseRun()&&runFilled(baseRun())&&trialRuns().some(function(r){return runFilled(r);});
    document.getElementById('body').innerHTML=b; document.getElementById('sub').textContent='пуски';
    setNext(canCalc?'К расчёту →':'Снимите пуски', canCalc);
  }
  function runShort(r){ return r?(r.type==='base'?'№0':('№'+r.num)):'—'; }

  // ---- измерение одного пуска ----
  function renderRun(){ var r=runById(S.activeRun); if(!r){ S.step='runs'; return render(); } ensureVib(r);
    var b='<div class="sec">'+runLabel(r)+'</div>';
    if(r.type==='trial'){
      b+='<div class="card"><div class="plrow" style="margin:0"><span class="k" style="flex:0 0 96px;color:var(--muted);font-size:13px">Плоскость</span><select class="f" data-act2="rplane" style="flex:1">'+S.planes.map(function(pl){return '<option value="'+pl.id+'"'+(pl.id===r.plane?' selected':'')+'>'+pl.name+'</option>';}).join('')+'</select></div>'
        +'<div class="plrow"><span class="k" style="flex:0 0 96px;color:var(--muted);font-size:13px">Опорный пуск</span><select class="f" data-act2="rref" style="flex:1">'+S.runs.filter(function(x){return x.id!==r.id;}).map(function(x){return '<option value="'+x.id+'"'+(x.id===r.refId?' selected':'')+'>'+runLabel(x)+'</option>';}).join('')+'</select></div>'
        +'<div class="plrow"><span class="k" style="flex:0 0 96px;color:var(--muted);font-size:13px">Груз, г ∠ °</span><input class="f" data-act2="rmass" value="'+(r.cargo.mass||'')+'" placeholder="масса" inputmode="decimal"/><input class="f" data-act2="rangle" value="'+(r.cargo.angle||'')+'" placeholder="угол" inputmode="decimal"/></div>'
        +'<div class="hint">Опорный «нулевой» = груз сняли; предыдущий пробный = груз оставили и добавили этот.</div></div>';
    }
    // матрица замеров
    var dirs=enabledDirs();
    b+='<div class="card" style="overflow-x:auto"><table class="bt"><tr><th class="lc" style="text-align:left">Точка</th>'+dirs.map(function(d){return '<th colspan="2" style="color:'+DIRHEX[d.key]+'">'+d.label+'</th>';}).join('')+(S.measMode==='3ch'?'<th></th>':'')+'</tr><tr><th></th>'+dirs.map(function(){return '<th>ампл</th><th>фаза</th>';}).join('')+(S.measMode==='3ch'?'<th></th>':'')+'</tr>';
    for(var s=1;s<=S.supports;s++){ (function(s){ b+='<tr><td class="lc">'+s+'</td>'+dirs.map(function(d){ var c=r.vib[s][d.key];
        return '<td><input class="'+(c.src==='measured'?'meas':'')+'" data-vib="amp" data-s="'+s+'" data-d="'+d.key+'" value="'+c.amp+'" inputmode="decimal"/></td><td><input class="'+(c.src==='measured'?'meas':'')+'" data-vib="phase" data-s="'+s+'" data-d="'+d.key+'" value="'+c.phase+'" inputmode="decimal"/></td>'; }).join('')
        +(S.measMode==='3ch'?'<td><button class="measbtn" data-act="measSup" data-s="'+s+'">Снять</button></td>':'')+'</tr>';
    })(s); }
    b+='</table>';
    if(S.measMode==='zmove'){ b+='<div style="margin-top:8px;display:flex;flex-wrap:wrap;gap:6px">'+points().map(function(p){ var c=r.vib[p.sup][p.dir]; return '<button class="measbtn" data-act="measCell" data-s="'+p.sup+'" data-d="'+p.dir+'" style="'+(c.src==='measured'?'border-color:rgba(151,196,89,.5)':'')+'">'+ptLabel(p.sup,p.dir)+'</button>'; }).join('')+'</div><div class="hint">Перестановка Z: снимаем точку за точкой.</div>'; }
    else b+='<div style="margin-top:8px"><button class="measbtn" data-act="measAll">Снять все опоры</button> <span class="hint" style="margin-left:6px">демо-данные (реального BLE в макете нет)</span></div>';
    b+='</div>';
    // визуализация
    if(runFilled(r)){ var ref=(r.type==='trial'&&r.refId)?runById(r.refId):null;
      b+=iso3d(r, ref);
      b+='<div class="sec">Полярные (по опорам)</div>'+polarGrid(r, ref);
    }
    document.getElementById('body').innerHTML=b; document.getElementById('sub').textContent='замер пуска';
    setNext('Готово', runFilled(r));
  }

  // ---- РАСЧЁТ (выбор корректируемого пуска + плоскостей) ----
  function renderCalc(){ var b='<div class="sec">Расчёт</div>';
    if(!S._calcCorrect) S._calcCorrect=baseRun()?baseRun().id:null;
    if(!S._calcPlanes) S._calcPlanes=planesWithTrials();
    b+='<div class="card"><div class="plrow" style="margin:0"><span class="k" style="flex:0 0 130px;color:var(--muted);font-size:13px">Корректировать пуск</span><select class="f" data-act2="ccorrect" style="flex:1">'+S.runs.filter(runFilled).map(function(x){return '<option value="'+x.id+'"'+(x.id===S._calcCorrect?' selected':'')+'>'+runLabel(x)+'</option>';}).join('')+'</select></div></div>';
    b+='<div class="sec">Плоскости в расчёте</div><div class="card">';
    S.planes.forEach(function(pl){ var t=trialFor(pl.id); var has=t&&runFilled(t); var on=S._calcPlanes.indexOf(pl.id)>=0&&has;
      b+='<div class="row"><span class="k">'+pl.name+(has?'':' <span style="color:var(--warn);font-size:11px">нет пробного</span>')+'</span><div class="tog '+(on?'on':'')+'" data-act="cplane" data-id="'+pl.id+'" style="'+(has?'':'opacity:.4;pointer-events:none')+'"><div class="k"></div></div></div>'; });
    b+='</div><div class="hint">Каждая плоскость берётся из своего пробного пуска (относительно его опорного).</div>';
    var ok=S._calcCorrect&&S._calcPlanes.filter(function(id){var t=trialFor(id);return t&&runFilled(t);}).length>0;
    document.getElementById('body').innerHTML=b; document.getElementById('sub').textContent='выбор для расчёта';
    setNext('Рассчитать грузы', ok);
  }
  function planesWithTrials(){ return S.planes.filter(function(pl){ var t=trialFor(pl.id); return t&&runFilled(t); }).map(function(pl){return pl.id;}); }
  function trialFor(planeId){ var ts=trialRuns().filter(function(r){return r.plane===planeId&&runFilled(r);}); return ts.length?ts[ts.length-1]:null; }
  function trialRefVib(t){ var ref=runById(t.refId)||baseRun(); return vibFlat(ref); }

  function doCalc(){ var correct=runById(S._calcCorrect)||baseRun();
    var planeIds=S._calcPlanes.filter(function(id){var t=trialFor(id);return t&&runFilled(t);});
    var columns=planeIds.map(function(id){ var t=trialFor(id); return { mass:parseFloat(t.cargo.mass)||0, angle:parseFloat(t.cargo.angle)||0, trialVib:vibFlat(t), refVib:trialRefVib(t) }; });
    var res=NovaBalance.computeColumns(vibFlat(correct), columns);
    S.calc={ correctId:correct.id, planeIds:planeIds, weights:res.weights, sens:res.sens, residual:res.residual, rms:res.rms, columns:columns };
    S.custom=res.weights.map(function(w){ return {mass:w.mass.toFixed(2), angle:w.angle.toFixed(0)}; });
    S._customRes=null;
    if(S.mode==='asset') saveSession();
    S.step='result'; render();
  }
  function recalc(){ var cw=S.custom.map(function(c){return {mass:parseFloat(c.mass)||0,angle:parseFloat(c.angle)||0};});
    S._customRes=NovaBalance.predictColumns(vibFlat(runById(S.calc.correctId)), S.calc.columns, cw);
    if(S.mode==='asset') saveSession(); renderResultOnly(); }

  // ---- РЕЗУЛЬТАТ ----
  function resultHtml(){ var resid=(S._customRes?S._customRes.residual:S.calc.residual);
    var worst=Math.max.apply(null, resid.map(function(r){return r.amp;}).concat([0]));
    var ok=worst<=S.target;
    var b=weightsTable();
    b+=residualTable(resid);
    b+='<div class="card" style="display:flex;align-items:center;justify-content:space-between"><div><div style="font-size:12px;color:var(--hint)">Макс. остаток / допуск</div><div style="font-size:15px">'+worst.toFixed(2)+' / '+S.target+' мм/с</div></div><span class="verdict" style="background:var(--'+(ok?'ok':'warn')+');color:#1a1206">'+(ok?'Баланс достигнут':'Выше допуска')+'</span></div>';
    if(!ok) b+='<div class="hint" style="margin-top:-4px">Остаток выше допуска — добавьте плоскость и пробный пуск, затем пересчитайте с её учётом.</div>';
    b+='<div class="actions"><button data-act="toRuns">← Пуски / добавить плоскость</button><button data-act="recalcMenu">Пересчитать (выбор)</button>'+(S.mode==='asset'?'<button data-act="toHome">В историю</button>':'<button data-act="restart">↺ Новая</button>')+'</div>';
    return b;
  }
  function renderResult(){ document.getElementById('body').innerHTML=resultHtml(); document.getElementById('sub').textContent='результат'; setNext('', false); }
  function renderResultOnly(){ document.getElementById('body').innerHTML=resultHtml(); }

  // ============ сессии по агрегату (этап 4) ============
  function nowStr(){ var d=new Date(); function p(n){return (n<10?'0':'')+n;} return p(d.getDate())+'.'+p(d.getMonth()+1)+'.'+d.getFullYear()+' '+p(d.getHours())+':'+p(d.getMinutes()); }
  function assetList(){ try{ return JSON.parse(localStorage.getItem('nova_list'))||[]; }catch(e){ return []; } }
  function getSessions(){ if(S.mode!=='asset') return []; var l=assetList(); return (l[S.assetId]&&l[S.assetId].balancing)||[]; }
  function latestSens(){ var ss=getSessions(); for(var i=ss.length-1;i>=0;i--){ if(ss[i].sens&&ss[i].supports===S.supports) return ss[i].sens; } return null; }
  function saveSession(){ if(S.mode!=='asset'||!S.sessionId) return; var l=assetList(), it=l[S.assetId]; if(!it) return; it.balancing=it.balancing||[];
    var resid=(S._customRes?S._customRes:{rms:S.calc?S.calc.rms:null});
    var rec={ id:S.sessionId, date:S.sessionDate, mode:S.reuse?'reuse':'trial', supports:S.supports,
      planes:(S.calc?S.calc.planeIds:S.planes.map(function(p){return p.id;})).map(function(id){return {id:id,name:planeName(id)};}),
      sens:S.calc?S.calc.sens:null, weights:S.calc?S.calc.weights:null,
      baseRms:baseRun()?rmsOf(vibFlat(baseRun())):null, residRms:S.calc?(S._customRes?S._customRes.rms:S.calc.rms):null };
    var idx=-1; for(var i=0;i<it.balancing.length;i++) if(it.balancing[i].id===S.sessionId) idx=i;
    if(idx>=0) it.balancing[idx]=rec; else it.balancing.push(rec);
    try{ localStorage.setItem('nova_list', JSON.stringify(l)); }catch(e){} }
  function rmsOf(flat){ return Math.sqrt(flat.reduce(function(a,v){return a+v.amp*v.amp;},0)/(flat.length||1)); }
  function newSession(reuse){ S.sessionId='bs'+Date.now(); S.sessionDate=nowStr(); S.reuse=!!reuse; S.runs=[]; S.calc=null; S.custom=null; S._customRes=null; S._calcCorrect=null; S._calcPlanes=null; S._seed=null; truthV0=null; addBase(); }
  function renderHome(){ var ss=getSessions(), reuse=latestSens();
    var b='<div class="sec">'+(S.assetName||'Агрегат')+'</div><div class="hint" style="margin-bottom:12px">Опоры '+S.supports+' · плоскостей '+S.planes.length+' · '+enabledDirs().map(function(d){return d.label;}).join('/')+'</div>';
    b+='<div class="sec">Новая балансировка</div>';
    b+='<div class="card" data-act="newTrial" style="cursor:pointer">С пробными пусками<div class="hint">базовый + пробные по плоскостям → грузы</div></div>';
    if(reuse) b+='<div class="card" data-act="newReuse" style="cursor:pointer">По сохранённым коэффициентам<div class="hint">только базовый пуск → грузы (без пробных)</div></div>';
    b+='<div class="sec">История ('+ss.length+')</div>';
    if(!ss.length) b+='<div class="hint">Сессий пока нет.</div>';
    else b+=ss.map(function(s,i){return {s:s,i:i};}).reverse().map(function(o){ var s=o.s, to=s.residRms, ok=(to!=null&&to<=S.target); return '<div class="card"><div style="display:flex;justify-content:space-between"><div style="font-size:12.5px;color:var(--muted)">'+s.date+' · '+(s.mode==='reuse'?'по коэфф.':'пробные')+'</div><span class="verdict" style="background:var(--'+(ok?'ok':'warn')+');color:#1a1206">'+(s.baseRms!=null?s.baseRms.toFixed(1):'—')+' → '+(to!=null?to.toFixed(1):'—')+'</span></div><div class="hint">'+(s.weights?s.weights.map(function(w,j){return (s.planes[j]?s.planes[j].name:'')+' '+w.mass.toFixed(1)+'г∠'+Math.round(w.angle)+'°';}).join(' · '):'')+'</div></div>'; }).join('');
    document.getElementById('body').innerHTML=b; document.getElementById('sub').textContent='балансировка агрегата'; setNext('',false);
  }

  // ---- пуски: создание ----
  function addBase(){ var r={id:'r'+Date.now()+Math.floor(rnd(0,999)), num:0, type:'base', refId:null, plane:null, cargo:null, vib:{}}; ensureVib(r); S.runs.push(r); }
  function addTrial(){ var n=trialRuns().length+1, defPlane=S.planes[Math.min(n-1,S.planes.length-1)].id;
    var r={id:'r'+Date.now()+Math.floor(rnd(0,999)), num:n, type:'trial', refId:baseRun().id, plane:defPlane, cargo:{mass:'',angle:''}, vib:{}}; ensureVib(r); S.runs.push(r); return r; }

  // ============ рендер + события ============
  function render(){ stepsInfo();
    if(S.step==='home') return renderHome();
    if(S.step==='config') return renderConfig();
    if(S.step==='runs') return renderRuns();
    if(S.step==='run') return renderRun();
    if(S.step==='calc') return renderCalc();
    renderResult();
  }

  document.getElementById('body').addEventListener('click', function(e){ var t=e.target.closest('[data-act]'); if(!t) return; var a=t.getAttribute('data-act');
    if(a==='mm'){ S.measMode=t.getAttribute('data-v'); render(); }
    else if(a==='inc'){ var k=t.getAttribute('data-k'); S[k]=Math.min(+t.getAttribute('data-max'),S[k]+1); render(); }
    else if(a==='dec'){ var k2=t.getAttribute('data-k'); S[k2]=Math.max(+t.getAttribute('data-min'),S[k2]-1); render(); }
    else if(a==='dir'){ var d=S.dirs.filter(function(x){return x.key===t.getAttribute('data-v');})[0]; d.on=!d.on; if(!enabledDirs().length) d.on=true; render(); }
    else if(a==='addplane'){ S.planes.push({id:'p'+Date.now(),name:'Плоскость '+(S.planes.length+1)}); render(); }
    else if(a==='delplane'){ if(S.planes.length>1) S.planes.splice(+t.getAttribute('data-i'),1); render(); }
    else if(a==='openRun'){ S.activeRun=t.getAttribute('data-id'); S.step='run'; render(); }
    else if(a==='addTrial'){ var r=addTrial(); S.activeRun=r.id; S.step='run'; render(); }
    else if(a==='measSup'){ measureSup(runById(S.activeRun),+t.getAttribute('data-s')); render(); }
    else if(a==='measCell'){ measureCell(runById(S.activeRun),+t.getAttribute('data-s'),t.getAttribute('data-d')); render(); }
    else if(a==='measAll'){ measureAll(runById(S.activeRun)); render(); }
    else if(a==='tilt'){ /* handled on input */ }
    else if(a==='cplane'){ var id=t.getAttribute('data-id'); var k=S._calcPlanes.indexOf(id); if(k>=0) S._calcPlanes.splice(k,1); else S._calcPlanes.push(id); render(); }
    else if(a==='toRuns'){ S.step='runs'; render(); }
    else if(a==='recalcMenu'){ S._calcCorrect=null; S._calcPlanes=null; S.step='calc'; render(); }
    else if(a==='toHome'){ S.step='home'; render(); }
    else if(a==='restart'){ resetFree(); render(); }
    else if(a==='newTrial'){ newSession(false); S.step='config'; render(); }
    else if(a==='newReuse'){ newSession(true); S.savedSens=latestSens(); S.step='config'; render(); }
  });
  document.getElementById('body').addEventListener('input', function(e){ var t=e.target;
    if(t.getAttribute('data-act')==='tilt'){ S.tilt=(+t.value)/100; var host=t.closest('.card'); if(host){ var r=runById(S.activeRun), ref=(r&&r.type==='trial'&&r.refId)?runById(r.refId):null; host.outerHTML=iso3d(r,ref); } return; }
    var pl=t.getAttribute('data-pl'); if(pl!==null){ S.planes[+pl].name=t.value; return; }
    var a2=t.getAttribute('data-act2');
    if(a2==='target'){ S.target=parseFloat(t.value)||0; return; }
    if(a2==='rmass'){ runById(S.activeRun).cargo.mass=t.value; return; }
    if(a2==='rangle'){ runById(S.activeRun).cargo.angle=t.value; return; }
    if(a2==='ccorrect'){ S._calcCorrect=t.value; return; }
    if(a2==='cw'){ }
    if(t.hasAttribute('data-vib')){ var r=runById(S.activeRun); var s=+t.getAttribute('data-s'),d=t.getAttribute('data-d'),f=t.getAttribute('data-vib'); r.vib[s][d][f]=t.value; r.vib[s][d].src='entered'; document.getElementById('next').disabled=!runFilled(r); return; }
    if(t.hasAttribute('data-cw')){ S.custom[+t.getAttribute('data-i')][t.getAttribute('data-cw')]=t.value; recalc(); return; }
  });
  document.getElementById('body').addEventListener('change', function(e){ var t=e.target, a2=t.getAttribute('data-act2');
    if(a2==='rplane'){ runById(S.activeRun).plane=t.value; render(); }
    else if(a2==='rref'){ runById(S.activeRun).refId=t.value; render(); }
    else if(a2==='ccorrect'){ S._calcCorrect=t.value; }
  });
  document.getElementById('next').addEventListener('click', function(){
    if(S.step==='config'){ if(!S.runs.length) addBase(); S.step='runs'; render(); }
    else if(S.step==='runs'){ S._calcCorrect=null; S._calcPlanes=null; S.step='calc'; render(); }
    else if(S.step==='run'){ S.step='runs'; render(); }
    else if(S.step==='calc'){ doCalc(); }
  });
  document.getElementById('bk').addEventListener('click', function(){
    if(S.step==='config'){ if(S.mode==='asset'){ S.step='home'; render(); } else location.href='balance-menu.html'; }
    else if(S.step==='runs'){ S.step='config'; render(); }
    else if(S.step==='run'){ S.step='runs'; render(); }
    else if(S.step==='calc'){ S.step='runs'; render(); }
    else if(S.step==='result'){ S.step='calc'; render(); }
    else if(S.step==='home'){ location.href='balance-menu.html'; }
    else location.href='balance-menu.html';
  });

  function resetFree(){ S.step='config'; S.runs=[]; S.calc=null; S.custom=null; S._customRes=null; S._calcCorrect=null; S._calcPlanes=null; S._seed=null; truthV0=null; }

  // ---- режим по агрегату: предзаполнение ----
  (function initAsset(){ var m=(location.search||'').match(/id=(\d+)/); if(!m) return; var idx=+m[1];
    var list; try{ list=JSON.parse(localStorage.getItem('nova_list'))||[]; }catch(e){ list=[]; }
    var it=list[idx]; if(!it) return; var agg; try{ agg=typeof it.agg==='string'?JSON.parse(it.agg):it.agg; }catch(e){ return; }
    S.mode='asset'; S.assetId=idx; S.assetName=(it.name||'Агрегат'); S.step='home';
    var sup=0; (agg.units||[]).forEach(function(u){ sup+=(u.supports||[]).length; }); if(sup>0) S.supports=sup;
    var planes=[]; (agg.units||[]).forEach(function(u){ (u.planes||[]).forEach(function(pl){ planes.push({id:pl.id,name:pl.name}); }); });
    if(planes.length) S.planes=planes;
  })();

  if(S.step!=='home' && !S.runs.length) addBase();
  render();
})();
</script>
