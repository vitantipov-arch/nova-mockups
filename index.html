<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Nova — макеты</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.24.0/dist/tabler-icons.min.css">
<style>
  :root{
    --bg-page:#141413; --bg-primary:#1f1f1d; --bg-secondary:#2a2a27;
    --text-primary:#ececea; --text-secondary:#b4b2a9; --text-tertiary:#86857e;
    --border:rgba(255,255,255,0.12); --border-strong:rgba(255,255,255,0.22);
    --info:#85b7eb; --info-bg:rgba(55,138,221,0.16); --info-border:rgba(55,138,221,0.55);
    --success:#97c459; --warning:#ef9f27; --danger:#e24b4a;
    --r-md:8px; --r-lg:12px; --r-xl:16px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;background:var(--bg-page);}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;color:var(--text-primary);
       display:flex;justify-content:center;min-height:100vh;}
  .screen{width:100%;max-width:480px;background:var(--bg-page);display:flex;flex-direction:column;min-height:100vh;}
  button{font-family:inherit;color:var(--text-primary);background:transparent;border:0.5px solid var(--border-strong);
         border-radius:var(--r-md);cursor:pointer;}
  button:active{transform:scale(0.98);}
  .row{display:flex;align-items:center;}
  .ti{line-height:1;}
  .field-search{display:flex;align-items:center;gap:8px;background:var(--bg-secondary);border:0.5px solid var(--border);border-radius:var(--r-md);padding:0 12px;margin-bottom:12px;}
  .field-search input{flex:1;height:40px;background:transparent;border:none;outline:none;color:var(--text-primary);font-size:14px;font-family:inherit;}
  .rowmenu{width:36px;height:36px;display:flex;align-items:center;justify-content:center;flex:0 0 auto;margin-right:6px;border:none;background:transparent;color:var(--text-tertiary);border-radius:8px;}
  .backdrop{position:fixed;inset:0;background:rgba(0,0,0,0.5);opacity:0;pointer-events:none;transition:opacity .2s;z-index:10;}
  .backdrop.on{opacity:1;pointer-events:auto;}
  .sheet{position:fixed;left:0;right:0;bottom:0;max-width:480px;margin:0 auto;background:var(--bg-primary);border-top-left-radius:18px;border-top-right-radius:18px;border-top:0.5px solid var(--border);padding:10px 12px 26px;transform:translateY(110%);transition:transform .25s;z-index:11;}
  .sheet.on{transform:translateY(0);}
  .sheet h3{font-size:13px;font-weight:500;color:var(--text-tertiary);margin:6px 8px 6px;}
  .mitem{display:flex;align-items:center;gap:13px;padding:14px 12px;border-radius:10px;cursor:pointer;font-size:15px;color:var(--text-primary);}
  .mitem:active{background:var(--bg-secondary);}
  .mitem .ti{font-size:21px;color:var(--text-secondary);}
  .mitem.danger{color:var(--danger);} .mitem.danger .ti{color:var(--danger);}
</style>
</head>
<body>
<div class="screen">

  <div class="row" style="justify-content:space-between;padding:22px 18px 18px;">
    <div class="row" style="gap:13px;">
      <svg width="40" height="40" viewBox="0 0 56 56" aria-label="Логотип Nova">
        <g stroke-width="1.7" stroke-linecap="round">
          <line x1="28" y1="28" x2="28" y2="10" stroke="#ffb24d"/>
          <line x1="28" y1="28" x2="46" y2="22" stroke="#ff5db1"/>
          <line x1="28" y1="28" x2="40" y2="44" stroke="#8a5cff"/>
          <line x1="28" y1="28" x2="16" y2="44" stroke="#4d8dff"/>
          <line x1="28" y1="28" x2="10" y2="22" stroke="#38e1d6"/>
        </g>
        <circle cx="28" cy="10" r="3" fill="#ffb24d"/>
        <circle cx="46" cy="22" r="3" fill="#ff5db1"/>
        <circle cx="40" cy="44" r="3" fill="#8a5cff"/>
        <circle cx="16" cy="44" r="3" fill="#4d8dff"/>
        <circle cx="10" cy="22" r="3" fill="#38e1d6"/>
        <circle cx="28" cy="28" r="5" fill="#ff3b3b"/>
      </svg>
      <div>
        <div style="font-size:24px;font-weight:500;line-height:1.1;letter-spacing:0.3px;">Nova</div>
        <div style="font-size:12px;color:var(--text-tertiary);">Революция в вибродиагностике</div>
      </div>
    </div>
    <i class="ti ti-settings" onclick="openSettings()" style="font-size:24px;color:var(--text-secondary);cursor:pointer;"></i>
  </div>

  <div class="row" style="justify-content:space-between;margin:0 16px;padding:14px;background:var(--bg-secondary);border-radius:var(--r-md);">
    <div class="row" style="gap:10px;">
      <i class="ti ti-bluetooth" style="font-size:21px;color:var(--text-tertiary);"></i>
      <span style="font-size:14px;color:var(--text-secondary);">Датчики не подключены</span>
    </div>
    <span style="font-size:14px;color:var(--info);">Подключить</span>
  </div>

  <div style="padding:18px 16px 8px;">
    <button onclick="newAgg()" style="width:100%;display:flex;align-items:center;gap:14px;padding:18px;text-align:left;border:2px solid var(--info-border);background:var(--info-bg);border-radius:var(--r-lg);cursor:pointer;">
      <i class="ti ti-plus" style="font-size:27px;color:var(--info);"></i>
      <span style="display:flex;flex-direction:column;">
        <span style="font-weight:500;color:var(--info);font-size:16px;">Создать агрегат</span>
        <span style="font-size:13px;color:var(--info);opacity:0.85;">Собрать агрегат из блоков</span>
      </span>
    </button>
  </div>

  <div style="padding:16px 16px 8px;">
    <div class="field-search" id="searchWrap" style="display:none;"><i class="ti ti-search" style="font-size:18px;color:var(--text-tertiary);"></i><input id="search" placeholder="Поиск по названию" oninput="render(this.value)"/></div>
    <div id="recent"></div>
  </div>

  <div style="flex:1;"></div>

  <div style="text-align:center;padding:6px 0 4px;font-size:11px;color:var(--text-tertiary);">v0.1</div>

  <div class="row" style="justify-content:space-around;padding:12px 6px 18px;border-top:0.5px solid var(--border);">
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px;color:var(--info);">
      <i class="ti ti-box" style="font-size:24px;"></i><span style="font-size:11px;">Агрегаты</span>
    </div>
    <div onclick="location.href='measure.html'" style="display:flex;flex-direction:column;align-items:center;gap:4px;color:var(--text-tertiary);cursor:pointer;">
      <i class="ti ti-activity" style="font-size:24px;"></i><span style="font-size:11px;">Измерение</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px;color:var(--text-tertiary);">
      <i class="ti ti-scale" style="font-size:24px;"></i><span style="font-size:11px;">Баланс.</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px;color:var(--text-tertiary);">
      <i class="ti ti-chart-bar" style="font-size:24px;"></i><span style="font-size:11px;">Диагност.</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px;color:var(--text-tertiary);">
      <i class="ti ti-settings" style="font-size:24px;"></i><span style="font-size:11px;">Настройки</span>
    </div>
  </div>

</div>
<div class="backdrop" id="backdrop" onclick="closeSheet()"></div>
<div class="sheet" id="sheet"></div>
<script>
  function newAgg(){ ['nova_agg','nova_defects','nova_program','nova_editId'].forEach(function(k){ localStorage.removeItem(k); }); location.href='create.html'; }
  function loadTestDb(){ var cur=[]; try{ cur=JSON.parse(localStorage.getItem('nova_list'))||[]; }catch(e){}
    if(cur.length && !confirm('Заменить текущий список ('+cur.length+') тестовой БД?')) return;
    fetch('db.json',{cache:'no-store'}).then(function(r){ if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); }).then(function(data){
      var aggs = Array.isArray(data) ? data : ((data&&data.aggregates)||[]);
      var list=aggs.map(function(e){ return { name:e.name||'Агрегат',
        agg: typeof e.agg==='string'?e.agg:JSON.stringify(e.agg||{}),
        defects: typeof e.defects==='string'?e.defects:JSON.stringify(e.defects||[]),
        program: typeof e.program==='string'?e.program:JSON.stringify(e.program||{points:[]}) }; });
      localStorage.setItem('nova_list', JSON.stringify(list));
      if(!Array.isArray(data)&&data){ if(data.opTemplates) localStorage.setItem('nova_op_templates', JSON.stringify(data.opTemplates)); if(data.methodSets) localStorage.setItem('nova_method_sets', JSON.stringify(data.methodSets)); if(data.sessions) localStorage.setItem('nova_sessions', JSON.stringify(data.sessions)); }
      location.reload();
    }).catch(function(err){ alert('Не удалось загрузить db.json (нужен http-сервер, не file://): '+err); });
  }
  function exportDb(){ var list=[]; try{ list=JSON.parse(localStorage.getItem('nova_list'))||[]; }catch(e){}
    function P(s,d){ try{ return JSON.parse(s); }catch(e){ return d; } }
    var aggs=list.map(function(it){ return { name:it.name||'Агрегат', agg:P(it.agg,{}), defects:P(it.defects,[]), program:P(it.program,{points:[]}) }; });
    var ops=getTpls('nova_op_templates'), sets=getTpls('nova_method_sets'), sess=getTpls('nova_sessions');
    var out=(ops.length||sets.length||sess.length)?{aggregates:aggs, opTemplates:ops, methodSets:sets, sessions:sess}:aggs;
    var blob=new Blob([JSON.stringify(out,null,2)],{type:'application/json'});
    var a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='db.json';
    document.body.appendChild(a); a.click(); setTimeout(function(){ URL.revokeObjectURL(a.href); a.remove(); },100);
  }
  function getList(){ try{ return JSON.parse(localStorage.getItem('nova_list'))||[]; }catch(e){ return []; } }
  function getTpls(k){ try{ return JSON.parse(localStorage.getItem(k))||[]; }catch(e){ return []; } }
  function sesW(n){ var a=n%100,b=n%10; if(a>10&&a<20) return 'сессий'; if(b===1) return 'сессия'; if(b>=2&&b<=4) return 'сессии'; return 'сессий'; }
  function saveList(l){ try{ localStorage.setItem('nova_list', JSON.stringify(l)); }catch(e){} }
  function curFilter(){ var s=document.getElementById('search'); return s?s.value:''; }
  function openSheet(html){ var s=document.getElementById('sheet'); s.innerHTML=html; s.classList.add('on'); document.getElementById('backdrop').classList.add('on'); }
  function closeSheet(){ document.getElementById('sheet').classList.remove('on'); document.getElementById('backdrop').classList.remove('on'); }
  function openSettings(){ openSheet('<h3>База данных</h3><div class="mitem" onclick="loadTestDb()"><i class="ti ti-database-import"></i> Загрузить тестовую БД</div><div class="mitem" onclick="exportDb()"><i class="ti ti-database-export"></i> Экспорт БД (db.json)</div>'); }
  function openRowMenu(i){ var list=getList(); var nm=(list[i]&&list[i].name)||'Агрегат';
    openSheet('<h3>'+nm+'</h3><div class="mitem" onclick="duplicate('+i+')"><i class="ti ti-copy"></i> Дублировать</div><div class="mitem danger" onclick="delAgg('+i+')"><i class="ti ti-trash"></i> Удалить</div>');
  }
  function duplicate(i){ var list=getList(), src=list[i]; if(!src) return;
    list.push({ name:(src.name||'Агрегат')+' (копия)', agg:src.agg, defects:src.defects, program:src.program });
    saveList(list); closeSheet(); render(curFilter());
  }
  function delAgg(i){ var list=getList(), nm=(list[i]&&list[i].name)||'агрегат';
    if(!confirm('Удалить «'+nm+'»? Действие необратимо.')) return;
    list.splice(i,1); saveList(list); closeSheet(); render(curFilter());
  }
  function render(filter){ var list=getList(), sess=[]; try{ sess=JSON.parse(localStorage.getItem('nova_sessions'))||[]; }catch(e){} filter=(filter||'').trim().toLowerCase();
    var wrap=document.getElementById('searchWrap'); if(wrap) wrap.style.display=list.length?'flex':'none';
    var el=document.getElementById('recent'); if(!el) return;
    if(!list.length){ el.innerHTML='<div style="display:flex;flex-direction:column;align-items:center;gap:12px;padding:34px 16px;border:0.5px dashed var(--border-strong);border-radius:var(--r-lg);"><i class="ti ti-box-off" style="font-size:34px;color:var(--text-tertiary);"></i><div style="font-size:14px;color:var(--text-tertiary);text-align:center;">Агрегатов пока нет.<br>Создайте первый или загрузите тестовую БД.</div><button onclick="loadTestDb()" style="margin-top:2px;padding:9px 16px;font-size:13px;color:var(--info);border:0.5px solid var(--info-border);border-radius:var(--r-md);"><i class="ti ti-database-import"></i> Загрузить тестовую БД</button></div>'; return; }
    var h='', shown=0;
    list.forEach(function(it,i){ var name=it.name||'Агрегат'; if(filter && name.toLowerCase().indexOf(filter)<0) return; shown++;
      var nv=0,ns=0; try{ var a=JSON.parse(it.agg); nv=a.units.length; a.units.forEach(function(u){ ns+=(u.supports||[]).length; }); }catch(e){}
      var nses=sess.filter(function(s){return s.aggId===i;}).length;
      h+='<div style="display:flex;align-items:center;background:var(--bg-secondary);border-radius:var(--r-md);margin-bottom:8px;">'
        +'<div onclick="location.href=\'equipment.html?id='+i+'\'" style="flex:1;display:flex;align-items:center;gap:12px;padding:14px;cursor:pointer;min-width:0;"><i class="ti ti-box" style="font-size:22px;color:var(--info);flex:0 0 auto;"></i><div style="flex:1;min-width:0;"><div style="font-size:15px;font-weight:500;color:var(--text-primary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+name+'</div><div style="font-size:12px;color:var(--text-tertiary);">'+nv+' валов · '+ns+' опор'+(nses?' · '+nses+' '+sesW(nses):'')+'</div></div></div>'
        +'<button class="rowmenu" onclick="event.stopPropagation();openRowMenu('+i+')"><i class="ti ti-dots-vertical" style="font-size:20px;"></i></button>'
        +'</div>';
    });
    el.innerHTML = shown ? h : '<div style="padding:24px;text-align:center;font-size:13px;color:var(--text-tertiary);">Ничего не найдено</div>';
  }
  render('');
</script>
</body>
</html>
