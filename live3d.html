<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Nova — 3D визуализация</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.24.0/dist/tabler-icons.min.css">
<style>
  :root{ --info:#85b7eb; --info-bg:rgba(55,138,221,0.16); --info-bd:rgba(55,138,221,0.55); }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;background:#0a0e16;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;color:#ececea;}
  canvas{display:block;position:fixed;inset:0;}
  .top{position:fixed;top:0;left:0;right:0;display:flex;align-items:center;gap:10px;padding:12px 14px;background:linear-gradient(#0a0e16cc,#0a0e1600);z-index:5;}
  .top a{color:#cfd8e6;text-decoration:none;font-size:23px;}
  .ttl{font-size:15px;font-weight:500;}
  .sttl{font-size:11px;color:#7d8aa0;}
  .panel{position:fixed;left:0;right:0;bottom:0;background:#10182699;backdrop-filter:blur(8px);border-top:0.5px solid rgba(255,255,255,0.12);padding:12px 14px calc(14px + env(safe-area-inset-bottom));z-index:5;}
  .leg{display:flex;flex-wrap:wrap;gap:10px;font-size:10.5px;color:#7d8aa0;margin-bottom:9px;}
  .leg span{display:inline-flex;align-items:center;gap:5px;}
  .ld{width:9px;height:9px;border-radius:50%;}
  .sliders{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .sl label{display:block;font-size:10px;color:#7d8aa0;margin-bottom:3px;}
  .sl input{width:100%;}
  .msg{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center;color:#9fb3cc;font-size:14px;padding:34px;z-index:6;gap:12px;}
  .msg .ti{font-size:40px;color:#5a6b86;}
</style>
</head>
<body>
<div class="top">
  <a href="journal.html"><i class="ti ti-chevron-left"></i></a>
  <div style="flex:1"><div class="ttl" id="ttl">3D визуализация</div><div class="sttl" id="sttl">движение корпусов по замеру · перетаскивай — вращение</div></div>
</div>
<div class="msg" id="msg"></div>
<div class="panel" id="panel" style="display:none">
  <div class="leg" id="leg"></div>
  <div style="display:flex;gap:6px;margin-bottom:9px">
    <button id="mRot" style="flex:1;height:32px;border-radius:8px;border:0.5px solid var(--info-bd);background:var(--info-bg);color:var(--info);font-size:12.5px;font-family:inherit;cursor:pointer">1× оборотная</button>
    <button id="mBand" style="flex:1;height:32px;border-radius:8px;border:0.5px solid rgba(255,255,255,0.22);background:transparent;color:#aebbcf;font-size:12.5px;font-family:inherit;cursor:pointer">Диапазон частот</button>
  </div>
  <div id="bandrow" style="display:none;align-items:center;gap:8px;margin-bottom:9px;font-size:12px;color:#aebbcf">
    <span>от</span><input id="fmin" type="number" style="width:64px;height:30px;background:#0a0e16;border:0.5px solid rgba(255,255,255,0.22);border-radius:7px;color:#ececea;font-size:13px;padding:0 8px;font-family:inherit"/>
    <span>до</span><input id="fmax" type="number" style="width:64px;height:30px;background:#0a0e16;border:0.5px solid rgba(255,255,255,0.22);border-radius:7px;color:#ececea;font-size:13px;padding:0 8px;font-family:inherit"/>
    <span>Гц</span>
  </div>
  <div class="sliders">
    <div class="sl"><label>Усиление: <span id="vGain">6×</span></label><input id="gain" type="range" min="1" max="20" value="6"></div>
    <div class="sl"><label>Скорость: <span id="vSlow">медл.</span></label><input id="slow" type="range" min="6" max="100" value="26"></div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script>
(function(){
  function fail(t){ var m=document.getElementById('msg'); m.style.display='flex'; m.innerHTML='<i class="ti ti-cube-off"></i>'+t; }
  if(!window.THREE){ fail('Не удалось загрузить 3D-движок (нужен интернет).'); return; }
  var sid=(location.search.match(/sid=(\d+)/)||[])[1];
  var sessions=[]; try{ sessions=JSON.parse(localStorage.getItem('nova_sessions'))||[]; }catch(e){}
  var S=sessions[sid!=null?+sid:-1]; if(!S){ fail('Сессия не найдена.'); return; }
  var pts=S.points||[];
  function ptHasAG(p){ var a=false,g=false; ((p.data&&p.data.channels)||[]).forEach(function(c){ if(c.s==='a')a=true; if(c.s==='g')g=true; }); return a&&g; }
  if(!pts.some(ptHasAG)){ fail('Нужны точки с акселерометром И гироскопом. В этой сессии таких нет.'); return; }
  var AGG=null; try{ var list=JSON.parse(localStorage.getItem('nova_list'))||[]; if(S.aggId!=null&&list[S.aggId]) AGG=JSON.parse(list[S.aggId].agg); }catch(e){}
  if(!AGG||!AGG.units||!AGG.units.length){ fail('Нет структуры агрегата.'); return; }
  var units=AGG.units, trans=AGG.trans||[], orient=AGG.orient==='v'?'v':'h';
  document.getElementById('ttl').textContent='3D · '+(S.agg||AGG.name||'');
  document.getElementById('sttl').textContent=(S.date||'')+' · '+(S.operator||'');

  // раскладка структуры (порт из session)
  var RH=92,GAPC=30,SW=50,CW=44,LINKS={rigid:{off:false},elastic:{off:false},belt:{off:true},gear:{off:true}};
  function locLayout(u){ var Lf=u.machines.filter(function(m){return (m.pos||'center')==='left';}),C=u.machines.filter(function(m){return (m.pos||'center')==='center';}),Rf=u.machines.filter(function(m){return (m.pos||'center')==='right';});
    var x=6,b1,b2; Lf.forEach(function(){x+=CW+4;}); b1=x+4; x+=(C.length?12:34); C.forEach(function(){x+=SW+4;}); b2=x+4; x+=12; Rf.forEach(function(){x+=CW+4;}); return {W:x+2,supStart:b1,supEnd:b2}; }
  function layout(){ var P=[]; units.forEach(function(u,i){ var W=locLayout(u).W,p={W:W};
    if(i===0){ p.aMin=0;p.aMax=W;p.c=0;p.dir=1;p.outA=W; }
    else { var T=trans[i-1]||{type:'elastic'},pr=P[i-1];
      if(!LINKS[T.type].off){ p.dir=pr.dir;p.c=pr.c; if(p.dir>0){p.aMin=pr.outA+GAPC;p.aMax=p.aMin+W;}else{p.aMax=pr.outA-GAPC;p.aMin=p.aMax-W;} p.outA=(p.dir>0?p.aMax:p.aMin);p.coup=true; }
      else { var bs=(T.beltDir==='up')?-1:1; p.c=pr.c+bs*RH;p.dir=(T.nextDir==='left')?-1:1; if(p.dir>0){p.aMin=pr.outA;p.aMax=pr.outA+W;}else{p.aMax=pr.outA;p.aMin=pr.outA-W;} p.outA=(p.dir>0?p.aMax:p.aMin);p.belt=true; } }
    P.push(p); }); return P; }
  var P=layout();
  var aLo=1e9,aHi=-1e9,cLo=1e9,cHi=-1e9; P.forEach(function(p){aLo=Math.min(aLo,p.aMin);aHi=Math.max(aHi,p.aMax);cLo=Math.min(cLo,p.c);cHi=Math.max(cHi,p.c);});
  var SC=0.016, aMidC=(aLo+aHi)/2, cMidC=(cLo+cHi)/2;
  function PX(a){ return (a-aMidC)*SC; } function PZ(c){ return (c-cMidC)*SC; }
  function supNum(i,k){ var n=0; for(var x=0;x<i;x++) n+=(units[x].supports||[]).length; return n+k+1; }
  var MT={motor:0x4d8dff,pump:0x38e1d6,fan:0xff5db1,comp:0xffb24d,gen:0x9b6cff};
  function unitColor(u){ var m=(u.machines||[])[0]; return (m&&MT[m.type])||0x5a6b86; }

  // замеренные амп/фаза по опоре/направлению
  var D1=(orient==='v')?'R1':'В', D2=(orient==='v')?'R2':'П';
  var FR=(parseFloat(units[0]&&units[0].rpm)||2940)/60;
  var mode='rot', fmin=0, fmax=1000;
  (function(){ var f=[]; pts.forEach(function(p){ ((p.data&&p.data.channels)||[]).forEach(function(c){ var v=c.vals&&(c.vals.vel||c.vals[Object.keys(c.vals)[0]]); if(v&&v.comps) v.comps.forEach(function(k){ f.push(k.f); }); }); }); if(f.length) fmax=Math.ceil(Math.max.apply(null,f)/50)*50; })();
  function pickChan(snum,sensor,dir){ var best=null; pts.forEach(function(p){ if(p.sup!==snum) return; ((p.data&&p.data.channels)||[]).forEach(function(c){ if(c.s!==sensor||c.dir!==dir) return; var cand={c:c,prefer:(p.dir===dir)}; if(!best||(cand.prefer&&!best.prefer)) best=cand; }); }); return best?best.c:null; }
  function dispAt(snum,sensor,dir,theta){ var c=pickChan(snum,sensor,dir); if(!c) return 0;
    if(mode==='rot') return (c.amp1||0)*Math.sin(theta+(c.phase||0)*Math.PI/180);
    var v=c.vals&&(c.vals.vel||c.vals[Object.keys(c.vals)[0]]), comps=v&&v.comps; if(!comps) return 0;
    var sum=0, ph0=(c.phase||0)*Math.PI/180; comps.forEach(function(k){ if(k.f<fmin||k.f>fmax) return; sum+=k.a*Math.sin((k.f/FR)*theta+ph0+k.f*0.03); }); return sum; }
  function supHasAG(snum){ return pts.some(function(p){ return p.sup===snum && ptHasAG(p); }); }

  // сцена
  var scene=new THREE.Scene(); scene.background=new THREE.Color(0x0a0e16); scene.fog=new THREE.Fog(0x0a0e16,18,42);
  var camera=new THREE.PerspectiveCamera(45,innerWidth/innerHeight,0.1,200);
  var renderer=new THREE.WebGLRenderer({antialias:true}); renderer.setPixelRatio(Math.min(devicePixelRatio,2)); renderer.setSize(innerWidth,innerHeight); document.body.appendChild(renderer.domElement);
  scene.add(new THREE.AmbientLight(0xb9c7dc,0.78));
  var l1=new THREE.DirectionalLight(0xffffff,0.8); l1.position.set(8,14,9); scene.add(l1);
  var l2=new THREE.DirectionalLight(0x6a86b8,0.4); l2.position.set(-8,5,-6); scene.add(l2);
  scene.add(new THREE.GridHelper(30,60,0x223048,0x141d2c));
  var matShaft=new THREE.MeshStandardMaterial({color:0xc2cede,roughness:0.3,metalness:0.85});
  var matFlange=new THREE.MeshStandardMaterial({color:0xf07a2a,roughness:0.5,metalness:0.5});
  var BY=0.95, BH=0.9, BD=0.8, STUB=0.26;

  // строим жёсткую группу на каждый вал (коробку-корпус)
  var groups=[]; var tmp=new THREE.Vector3();
  units.forEach(function(u,i){ var p=P[i], x0=PX(p.aMin), x1=PX(p.aMax), z=PZ(p.c), cx=(x0+x1)/2, len=Math.max(0.6,x1-x0);
    var g=new THREE.Group(); g.position.set(cx,BY,z); scene.add(g);
    g.add(new THREE.Mesh(new THREE.BoxGeometry(len,BH,BD), new THREE.MeshStandardMaterial({color:unitColor(u),roughness:0.55,metalness:0.4})));
    // валы чуть торчат из торцов, жёстко в группе
    [-1,1].forEach(function(dir){
      var coupled, gap=0;
      if(dir>0){ coupled=(i<units.length-1&&P[i+1]&&P[i+1].coup); if(coupled) gap=PX(P[i+1].aMin)-PX(p.aMax); }
      else { coupled=(i>0&&p.coup); if(coupled) gap=PX(p.aMin)-PX(P[i-1].aMax); }
      var ext=coupled?Math.max(0.08,Math.min(0.5,gap*0.30)):0.16;  // муфта: фланец на 30% в зазор → центр.просвет ~40%
      var st=new THREE.Mesh(new THREE.CylinderGeometry(0.07,0.07,ext,14),matShaft); st.rotation.z=Math.PI/2; st.position.set(dir*(len/2+ext/2),0,0); g.add(st);
      if(coupled){ var fl=new THREE.Mesh(new THREE.CylinderGeometry(0.24,0.24,0.06,18),matFlange); fl.rotation.z=Math.PI/2; fl.position.set(dir*(len/2+ext),0,0); g.add(fl); }
    });
    // точки измерения — на верх корпуса, только опоры с accel+гиро
    var LL=locLayout(u), ns=(u.supports||[]).length, sups=[], spheres=[];
    for(var k=0;k<ns;k++){ var snum=supNum(i,k); sups.push(snum);
      if(!supHasAG(snum)) continue;
      var abL=(ns===1?(LL.supStart+LL.supEnd)/2:LL.supStart+(LL.supEnd-LL.supStart)*k/(ns-1)); var lx=PX(p.aMin+abL)-cx;
      var sph=new THREE.Mesh(new THREE.SphereGeometry(0.08,16,16), new THREE.MeshStandardMaterial({color:0x9fd0ff,emissive:0x9fd0ff,emissiveIntensity:0.55}));
      sph.position.set(lx,BH/2+0.07,0); g.add(sph);
      var geo=new THREE.BufferGeometry(),pos=new Float32Array(90*3); geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
      var tr=new THREE.Line(geo,new THREE.LineBasicMaterial({color:0x9fd0ff,transparent:true,opacity:0.75})); tr.frustumCulled=false; scene.add(tr);
      spheres.push({m:sph,pos:pos,trail:tr});
    }
    groups.push({g:g,nx:cx,ny:BY,nz:z,sups:sups,spheres:spheres});
  });
  if(!groups.some(function(G){return G.spheres.length;})){ fail('Нет опор с accel+гиро в этой сессии.'); return; }

  document.getElementById('leg').innerHTML='<span><span class="ld" style="background:#9fd0ff"></span>точки на корпусе (accel+гиро)</span><span><span class="ld" style="background:#c2cede"></span>вал (жёстко в корпусе)</span><span><span class="ld" style="background:#f07a2a"></span>полумуфты · зазор</span>';
  document.getElementById('panel').style.display='block';

  // движение корпуса по замеру (мало, ограничено)
  var GAIN=6, slow=26, theta=0, last=performance.now();
  var BT=0.012, BR=0.05, CT=0.22, CR=0.18;
  function clamp(v,c){ return v<-c?-c:(v>c?c:v); }
  function transOf(G,th){ var n=0,y=0,z=0,x=0; G.sups.forEach(function(s){ if(!(pickChan(s,'a',D1)||pickChan(s,'a',D2)||pickChan(s,'a','О'))) return; n++; y+=dispAt(s,'a',D1,th); z+=dispAt(s,'a',D2,th); x+=dispAt(s,'a','О',th); });
    if(!n) return {x:0,y:0,z:0}; var g=GAIN*BT; return {x:clamp(g*x/n,CT),y:clamp(g*y/n,CT),z:clamp(g*z/n,CT)}; }
  function rotOf(G,th){ var n=0,rx=0,ry=0,rz=0; G.sups.forEach(function(s){ if(!(pickChan(s,'g',D1)||pickChan(s,'g',D2)||pickChan(s,'g','О'))) return; n++; ry+=dispAt(s,'g',D1,th); rz+=dispAt(s,'g',D2,th); rx+=dispAt(s,'g','О',th); });
    if(!n) return {x:0,y:0,z:0}; var g=GAIN*BR; return {x:clamp(g*rx/n,CR),y:clamp(g*ry/n,CR),z:clamp(g*rz/n,CR)}; }
  function frame(now){ requestAnimationFrame(frame); var dt=Math.min((now-last)/1000,0.05); last=now;
    theta += 2*Math.PI*dt*(slow/100*2.4);
    groups.forEach(function(G){ var t=transOf(G,theta), r=rotOf(G,theta); G.g.position.set(G.nx+t.x,G.ny+t.y,G.nz+t.z); G.g.rotation.set(r.x,r.y,r.z); });
    scene.updateMatrixWorld(true);
    groups.forEach(function(G){ G.spheres.forEach(function(s){ s.m.getWorldPosition(tmp); s.pos.copyWithin(0,3); s.pos[267]=tmp.x; s.pos[268]=tmp.y; s.pos[269]=tmp.z; s.trail.geometry.attributes.position.needsUpdate=true; }); });
    updateCam(); renderer.render(scene,camera);
  }
  groups.forEach(function(G){ G.spheres.forEach(function(s){ G.g.updateMatrixWorld(true); s.m.getWorldPosition(tmp); for(var i=0;i<90;i++){ s.pos[i*3]=tmp.x;s.pos[i*3+1]=tmp.y;s.pos[i*3+2]=tmp.z; } }); });

  var target=new THREE.Vector3(0,BY,0), cth=0.9, cph=1.0, crad=Math.max(6,(aHi-aLo)*SC*1.5);
  function updateCam(){ camera.position.set(target.x+crad*Math.sin(cph)*Math.cos(cth), target.y+crad*Math.cos(cph), target.z+crad*Math.sin(cph)*Math.sin(cth)); camera.lookAt(target); }
  var el=renderer.domElement, drag=false, lx=0, ly=0, pinch=0, tmode=0;
  el.addEventListener('mousedown',function(e){drag=true;lx=e.clientX;ly=e.clientY;});
  window.addEventListener('mouseup',function(){drag=false;});
  window.addEventListener('mousemove',function(e){ if(!drag)return; cth-=(e.clientX-lx)*0.008; cph=Math.max(0.2,Math.min(Math.PI-0.2,cph-(e.clientY-ly)*0.008)); lx=e.clientX; ly=e.clientY; });
  el.addEventListener('wheel',function(e){e.preventDefault(); crad=Math.max(3.5,Math.min(30,crad+e.deltaY*0.012));},{passive:false});
  el.addEventListener('touchstart',function(e){ if(e.touches.length===1){tmode=1;lx=e.touches[0].clientX;ly=e.touches[0].clientY;} else if(e.touches.length===2){tmode=2;pinch=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);} },{passive:false});
  el.addEventListener('touchmove',function(e){ e.preventDefault();
    if(tmode===1&&e.touches.length===1){ cth-=(e.touches[0].clientX-lx)*0.008; cph=Math.max(0.2,Math.min(Math.PI-0.2,cph-(e.touches[0].clientY-ly)*0.008)); lx=e.touches[0].clientX; ly=e.touches[0].clientY; }
    else if(tmode===2&&e.touches.length===2){ var d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY); if(pinch) crad=Math.max(3.5,Math.min(30,crad-(d-pinch)*0.02)); pinch=d; } },{passive:false});
  el.addEventListener('touchend',function(e){ if(!e.touches.length)tmode=0; else if(e.touches.length===1){tmode=1;lx=e.touches[0].clientX;ly=e.touches[0].clientY;} });
  var $=function(id){return document.getElementById(id);};
  $('gain').oninput=function(e){GAIN=+e.target.value;$('vGain').textContent=GAIN+'×';};
  $('slow').oninput=function(e){slow=+e.target.value;$('vSlow').textContent=slow<15?'оч. медл.':slow<50?'медл.':'быстро';};
  function setMode(m){ mode=m;
    $('mRot').style.background=m==='rot'?'var(--info-bg)':'transparent'; $('mRot').style.borderColor=m==='rot'?'var(--info-bd)':'rgba(255,255,255,0.22)'; $('mRot').style.color=m==='rot'?'var(--info)':'#aebbcf';
    $('mBand').style.background=m==='band'?'var(--info-bg)':'transparent'; $('mBand').style.borderColor=m==='band'?'var(--info-bd)':'rgba(255,255,255,0.22)'; $('mBand').style.color=m==='band'?'var(--info)':'#aebbcf';
    $('bandrow').style.display=m==='band'?'flex':'none'; }
  $('mRot').onclick=function(){ setMode('rot'); };
  $('mBand').onclick=function(){ setMode('band'); };
  $('fmin').value=fmin; $('fmax').value=fmax;
  $('fmin').oninput=function(e){ fmin=parseFloat(e.target.value); if(isNaN(fmin)) fmin=0; };
  $('fmax').oninput=function(e){ fmax=parseFloat(e.target.value); if(isNaN(fmax)) fmax=1e9; };
  addEventListener('resize',function(){ camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth,innerHeight); });
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
