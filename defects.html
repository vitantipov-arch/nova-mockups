<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Nova — дефекты</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.24.0/dist/tabler-icons.min.css">
<style>
  :root{ --bg:#141413; --primary:#1f1f1d; --secondary:#2a2a27; --text:#ececea; --muted:#b4b2a9; --hint:#86857e;
         --border:rgba(255,255,255,0.12); --border2:rgba(255,255,255,0.22); --info:#85b7eb; --info-bg:rgba(55,138,221,0.16); --info-bd:rgba(55,138,221,0.55); }
  *{box-sizing:border-box;}
  html,body{margin:0;background:var(--bg);}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;color:var(--text);display:flex;justify-content:center;min-height:100vh;}
  .screen{width:100%;max-width:480px;display:flex;flex-direction:column;min-height:100vh;}
  a{color:inherit;text-decoration:none;}
  .hd{display:flex;align-items:center;gap:12px;padding:16px;border-bottom:0.5px solid var(--border);}
  .hd .ti{font-size:23px;color:var(--muted);}
  .ttl{font-size:16px;font-weight:500;}
  .sttl{font-size:12px;color:var(--hint);}
  .body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px;}
  .badge{display:inline-flex;align-items:center;gap:7px;background:var(--info-bg);border:0.5px solid var(--info-bd);border-radius:99px;padding:6px 13px;font-size:12.5px;color:var(--info);margin-bottom:18px;}
  .ic{width:72px;height:72px;border-radius:20px;background:var(--secondary);display:flex;align-items:center;justify-content:center;margin-bottom:18px;}
  .ic .ti{font-size:34px;color:var(--hint);}
  .h1{font-size:18px;font-weight:500;margin-bottom:8px;}
  .p{font-size:13.5px;color:var(--muted);line-height:1.5;max-width:320px;}
  .foot{padding:14px 16px;border-top:0.5px solid var(--border);}
  .next{width:100%;height:50px;border-radius:12px;border:2px solid var(--info-bd);background:var(--info-bg);color:var(--info);font-size:16px;font-weight:500;font-family:inherit;cursor:pointer;}
</style>
</head>
<body>
<div class="screen">
  <div class="hd">
    <a href="create.html?load=1"><i class="ti ti-chevron-left"></i></a>
    <div style="flex:1;"><div class="ttl">Дефекты</div><div class="sttl" id="aggName">—</div></div>
    <i class="ti ti-flask" style="color:var(--info);"></i>
  </div>

  <div class="body">
    <div class="badge"><i class="ti ti-tool" style="font-size:15px;"></i> Модуль в разработке</div>
    <div class="ic"><i class="ti ti-bug"></i></div>
    <div class="h1">Дефекты и диагностика</div>
    <div class="p">Раздел появится вместе с алгоритмами обнаружения. По мере их добавления сюда войдут признаки дефектов и нормы по ним — как расширение критериев состояния.</div>
  </div>

  <div class="foot"><button class="next" onclick="location.href='program.html'">Далее → программа измерений</button></div>
</div>
<script>
  (function(){ var AGG; try{ AGG=JSON.parse(localStorage.getItem('nova_agg')); }catch(e){}
    document.getElementById('aggName').textContent=(AGG&&AGG.name)||'Агрегат'; })();
</script>
</body>
</html>
